<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sermon Library</title>

<style>
:root {
  --accent: #2f8f2f;
  --bg: #0f1110;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: white;
}

.layout {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  overflow-y: auto;
  border-right: 1px solid #222;
  padding: 10px;
}

.series {
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
}

.series:hover {
  background: #1a1c1a;
}

.series.active {
  background: var(--accent);
  color: black;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* PLAYER */
#player {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* EPISODES */
.episode {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.episode img {
  width: 160px;
  border-radius: 6px;
}

.episode.active {
  outline: 2px solid var(--accent);
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<div class="layout">

<div class="sidebar" id="sidebar"></div>

<div class="main">
  <div id="player"></div>
  <div id="episodes"></div>
</div>

</div>

<script>
const API_KEY = "AIzaSyCfuZ29lAwSLP8wX3KEt39TTvzKPhiTrWo";

const PLAYLISTS = [
["Livestreams","PLKqZ6zXCYxUBu3jzPCTncKPpopFcvlVyv"],
["Romans 12","PLKqZ6zXCYxUDucHCEif_ph_C9_ZWTlkXS"],
["Romans 11","PLKqZ6zXCYxUDFWTa93IQRbgUvCJ7mf9pX"],
["Romans 10","PLKqZ6zXCYxUBtim23RGn81VTGuWRiMo3n"],
["Romans 9","PLKqZ6zXCYxUAEC6h6yy7KgMsmxsUO_IMZ"],
["Romans 8","PLKqZ6zXCYxUAwR-ngWwrzH1gfr700zK1X"],
["Romans 7","PLKqZ6zXCYxUAVQsnh5AgSf7Rg5nE5FEyu"],
["Romans 6","PLKqZ6zXCYxUBFzNO-rf_2gyv2p8iHeHgo"],
["Romans 5","PLKqZ6zXCYxUAWd4W5r8-HQ6WOcm5ZcJYH"],
["Romans 4","PLKqZ6zXCYxUCy5_6q0ySkwkFaFkeXmGma"],
["Romans 3","PLKqZ6zXCYxUAuPUH-PIVDM-KWW2rMjk-4"],
["Romans 2","PLKqZ6zXCYxUCgla_YELYiU33w65J7YI9D"],
["Romans 1","PLKqZ6zXCYxUAV4_OfXycI9W8q5aQ4R9nd"],
["Romans Full","PLKqZ6zXCYxUCMOi5EgNMr7HDeaRy3gk6F"],
["Eschatology","PLKqZ6zXCYxUD_H0yLurqm1kuDG4nCEs4d"]
];

let player;
let currentList = [];
let currentIndex = 0;

function createPlayer(id) {
  player = new YT.Player('player', {
    videoId: id,
    events: {
      'onStateChange': e => {
        if (e.data === YT.PlayerState.ENDED) {
          if (currentIndex < currentList.length - 1) {
            playVideo(currentIndex + 1);
          }
        }
      }
    }
  });
}

async function fetchAllVideos(playlistId) {
  let videos = [];
  let nextPageToken = "";

  do {
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&pageToken=${nextPageToken}&key=${API_KEY}`
    );
    const data = await res.json();

    videos = videos.concat(data.items);
    nextPageToken = data.nextPageToken || "";

  } while (nextPageToken);

  return videos.reverse();
}

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");

  PLAYLISTS.forEach(([name, id], index) => {
    const div = document.createElement("div");
    div.className = "series";
    div.textContent = name;

    div.onclick = async () => {
      document.querySelectorAll(".series").forEach(s => s.classList.remove("active"));
      div.classList.add("active");

      const videos = await fetchAllVideos(id);
      loadEpisodes(videos);
    };

    sidebar.appendChild(div);

    if (index === 0) div.click();
  });
}

function loadEpisodes(videos) {
  currentList = videos;
  const container = document.getElementById("episodes");
  container.innerHTML = "";

  videos.forEach((item, i) => {
    const vid = item.snippet.resourceId.videoId;

    const div = document.createElement("div");
    div.className = "episode";

    div.innerHTML = `
      <img src="${item.snippet.thumbnails.medium.url}">
      <div>${item.snippet.title}</div>
    `;

    div.onclick = () => playVideo(i);

    container.appendChild(div);
  });

  playVideo(0);
}

function playVideo(index) {
  currentIndex = index;
  const vid = currentList[index].snippet.resourceId.videoId;

  if (!player) createPlayer(vid);
  else player.loadVideoById(vid);

  document.querySelectorAll(".episode").forEach((e, i) =>
    e.classList.toggle("active", i === index)
  );
}

renderSidebar();
</script>

</body>
</html>
