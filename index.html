<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CGBC A/V Media</title>
  <link rel="icon" type="image/jpeg" sizes="512x512" href="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228836/CGBC_Wheel_Black_Media_Fallback.jpg">
  <link rel="apple-touch-icon" href="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228836/CGBC_Wheel_Black_Media_Fallback.jpg">
  <meta name="theme-color" content="#0f0f10" />
  <meta name="apple-mobile-web-app-title" content="CGBC Media" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f0f10;
      --panel:rgba(14,14,15,.82);
      --soft:rgba(255,255,255,.045);
      --border:rgba(255,255,255,.06);
      --text:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --muted-2:rgba(255,255,255,.52);
      --accent:#8fae9d;
      --accent-ink:#102016;
      --shadow:0 10px 30px rgba(0,0,0,.24);
      --desktop-bg:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1230673/Desktop.jpg');
      --mobile-bg:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1230674/Mobile.jpg');
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,sans-serif}
    body{
      background:
        linear-gradient(180deg, rgba(11,11,12,.46) 0%, rgba(9,9,10,.64) 100%),
        var(--desktop-bg) center center/cover no-repeat fixed;
      background-blend-mode:multiply;
    }
    button,input{font:inherit}
    button{border:none;background:none;color:inherit;cursor:pointer}
    img{display:block;max-width:100%}
    a{color:inherit;text-decoration:none}
    .app{width:min(1680px,100%);margin:0 auto;padding:0 10px 16px}
    .masthead{
      position:sticky;top:0;z-index:20;
      display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:14px;
      padding:10px 6px 12px;
      background:linear-gradient(180deg, rgba(8,8,9,.94), rgba(8,8,9,.82));
      border-bottom:1px solid rgba(255,255,255,.04);
      backdrop-filter:blur(10px);
    }
    .brand{display:flex;align-items:center;gap:18px;min-width:0}
    .logo-btn{
      width:94px;height:66px;border-radius:0;display:flex;align-items:center;justify-content:center;
      background:transparent;border:none;box-shadow:none;overflow:visible;padding:0
    }
    .logo-btn img{width:100%;height:100%;object-fit:contain;transform:none;filter:drop-shadow(0 5px 12px rgba(0,0,0,.15))}
    .brand h1{margin:0;font-family:Poppins,sans-serif;font-size:clamp(22px,2.15vw,34px);line-height:1.02}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:14px}
    .top-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
    .mode-pill{
      display:grid;grid-template-columns:1fr 1fr;padding:4px;border-radius:22px;min-width:360px;
      background:linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.024));
      border:1px solid rgba(255,255,255,.085);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.075),
        0 12px 26px rgba(0,0,0,.18);
      backdrop-filter:blur(16px) saturate(1.06)
    }
    .mode-btn-shell{
      min-height:58px;padding:0 20px;display:flex;align-items:center;justify-content:center;gap:12px;border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.075);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      transition:transform .18s ease, background .18s ease, box-shadow .18s ease
    }
    .mode-btn:first-child .mode-btn-shell{border-radius:18px 8px 8px 18px}
    .mode-btn:last-child .mode-btn-shell{border-radius:8px 18px 18px 8px}
    .mode-btn.active .mode-btn-shell{
      background:linear-gradient(180deg, rgba(161,188,171,.98), rgba(143,174,157,.92));
      color:var(--accent-ink);border-color:rgba(143,174,157,.26);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.24), 0 10px 22px rgba(54,84,69,.18)
    }
    .btn-copy{display:flex;flex-direction:column;align-items:flex-start;line-height:1.02;font-family:Poppins,sans-serif}
    .btn-copy .top{font-size:15px;font-weight:700}
    .btn-copy .bottom{font-size:11px;color:rgba(255,255,255,.72)}
    .mode-btn.active .bottom{color:rgba(17,32,24,.76)}
    .mode-btn .btn-copy .top{color:rgba(255,255,255,.96)}
    .mode-btn .btn-copy .bottom{color:rgba(255,255,255,.72)}
    .mode-btn.active .btn-copy .top{color:#17241d}
    .mode-btn.active .btn-copy .bottom{color:rgba(23,36,29,.76)}
    .mode-icon{
      width:30px;height:30px;flex:0 0 30px;display:block;
      stroke:rgba(255,255,255,.96);
      stroke-width:2.15;fill:none;opacity:1;
      filter:drop-shadow(0 1px 1px rgba(0,0,0,.18))
    }
    .mode-btn.active .mode-icon{stroke:#1b2821;filter:none;opacity:1}
    .mode-btn:not(.active) .mode-icon{stroke:rgba(255,255,255,.96);opacity:1}
    .mode-btn:hover .mode-btn-shell{transform:translateY(-1px);background:rgba(255,255,255,.04)}

    .impact{display:flex;gap:12px;flex-wrap:wrap}
    .impact-pill{
      min-width:124px;padding:11px 15px;border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 10px 22px rgba(0,0,0,.14)
    }
    .impact-value{font-family:Poppins,sans-serif;font-size:20px;font-weight:800;line-height:1}
    .impact-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2)}

    .flow{display:grid;grid-template-columns:1fr;gap:16px}
    .panel{
      border-radius:24px;border:1px solid rgba(255,255,255,.07);background:linear-gradient(180deg, rgba(14,14,15,.80), rgba(14,14,15,.74));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 14px 32px rgba(0,0,0,.18);
      backdrop-filter:blur(12px);overflow:hidden
    }
    .nav-panel{display:grid;grid-template-rows:auto auto auto minmax(0,1fr);gap:0;min-height:0}
    .nav-head{padding:14px 16px 10px}
    .nav-head h2{margin:0 0 8px 0;font-family:Poppins,sans-serif;font-size:clamp(20px,2.6vw,28px);line-height:1.06}
    .eyebrow{margin:0 0 6px;font-family:Poppins,sans-serif;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);font-size:12px}
    .title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(18px,2vw,24px);line-height:1.08}


    .search-row{
      display:flex;align-items:center;gap:10px;padding:0 16px 14px;min-height:0;
      position:relative;z-index:1;
      margin-top:6px;
    }
    .search-row input{
      flex:1;min-width:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
      color:var(--text);border-radius:16px;padding:13px 14px;outline:none
    }
    .search-row input::placeholder{color:var(--muted-2)}
    .context-strip{
      display:none;
      padding:8px 14px 6px;
      min-height:96px;
      align-content:start;
    }
    .context-row{
      display:flex;
      gap:10px;
      overflow:auto hidden;
      flex-wrap:nowrap;
      min-height:88px;
      align-items:stretch;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
    }
    .context-row::-webkit-scrollbar{height:8px}
    .context-row::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:999px}
    .context-chip{
      min-width:0;
      flex:0 0 220px;
      height:88px;
      display:flex;
      gap:10px;
      align-items:center;
      padding:10px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.04);
    }
    .context-chip img{
      width:68px;height:50px;object-fit:cover;border-radius:12px;flex:0 0 68px;background:rgba(255,255,255,.05)
    }
    .context-chip.date-chip img{display:none}
    .context-chip-date{
      width:68px;height:50px;flex:0 0 68px;border-radius:12px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
    }
    .context-chip-date .mini-label{
      font-family:Poppins,sans-serif;font-size:8px;letter-spacing:.11em;text-transform:uppercase;color:rgba(255,255,255,.55);line-height:1;
    }
    .context-chip-date .mini-value{
      margin-top:3px;font-family:Poppins,sans-serif;font-size:20px;font-weight:800;line-height:1;color:rgba(255,255,255,.96);
    }
    .context-chip.square img{width:58px;height:58px;flex-basis:58px}
    .context-chip-copy{min-width:0}
    .context-chip-label{
      font-family:Poppins,sans-serif;
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted-2)
    }
    .context-chip-title{
      margin-top:2px;
      font-family:Poppins,sans-serif;
      font-size:18px;
      line-height:1.08;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .search-status{font-size:13px;color:var(--muted);white-space:nowrap}

    .path-row{
      display:flex;align-items:center;justify-content:flex-start;gap:12px;padding:12px 16px 14px;border-top:1px solid rgba(255,255,255,.05);
      min-height:0;
      flex-wrap:wrap;
    }
    .path-button{
      min-height:46px;padding:0 16px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      display:inline-flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;white-space:nowrap;max-width:100%
    }
    .path-button[disabled]{opacity:.48;cursor:default}
    .path-button span{overflow:hidden;text-overflow:ellipsis}

    .stack{display:grid;gap:12px;padding:20px 16px 16px;align-content:start;grid-auto-rows:max-content;min-height:0;overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
    .choice,.episode,.related{
      width:100%;display:flex;gap:12px;align-items:flex-start;text-align:left;padding:10px;border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 10px 20px rgba(0,0,0,.12)
    }
    .choice.root-card{
      display:block;
      padding:0;
      overflow:hidden;
    }
    .choice.root-card .thumb-square{
      width:100%;
      height:auto;
      aspect-ratio:1/1;
      flex:0 0 auto;
      border-radius:20px;
    }
    .choice.root-card .thumb-square img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .choice.root-card .copy{
      display:block;
      padding:14px 16px 16px;
    }
    .choice.root-card .thumb-wide{
      width:100%;
      height:auto;
      aspect-ratio:16/9;
      flex:0 0 auto;
      border-radius:20px;
    }
    .choice.root-card .thumb-wide img{
      object-fit:cover;
    }
    .choice.active,.episode.active{
      background:linear-gradient(180deg, rgba(143,174,157,.22), rgba(143,174,157,.11));
      border-color:rgba(143,174,157,.24)
    }
    .thumb-wide{width:132px;height:74px;flex:0 0 132px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.05)}
    .choice.branch-card .thumb-wide{width:164px;height:92px;flex-basis:164px;border-radius:18px;}
    .choice.branch-card .thumb-square{width:96px;height:96px;flex-basis:96px;border-radius:18px;}
    .thumb-square{width:86px;height:88px;flex:0 0 86px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.05)}
    .thumb-wide img,.thumb-square img{width:100%;height:100%;object-fit:cover}
    .copy{min-width:0;flex:1}
    .card-title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(16px,1.5vw,20px);line-height:1.12}
    .card-sub{margin-top:5px;color:var(--muted);font-size:14px;line-height:1.25}
    .card-metric{margin-top:7px;color:rgba(255,255,255,.80);font-size:12px;font-family:Poppins,sans-serif;font-weight:600}
    .card-meta-line{
      margin-top:6px;
      color:rgba(255,255,255,.86);
      font-size:13px;
      line-height:1.35;
    }
    .choice.date-text-card{
      align-items:center;
    }
    .choice.date-text-card .thumb-wide{
      width:132px;
      height:92px;
      flex-basis:132px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
    }
    .choice.date-text-card .thumb-wide img{display:none;}
    .date-card-text{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      width:100%;
      height:100%;
      padding:8px;
    }
    .date-card-label{
      font-family:Poppins,sans-serif;
      font-size:10px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,255,255,.55);
      line-height:1.1;
    }
    .date-card-value{
      margin-top:4px;
      font-family:Poppins,sans-serif;
      font-size:28px;
      font-weight:800;
      line-height:1;
      color:rgba(255,255,255,.96);
    }
    .date-card-subvalue{
      margin-top:4px;
      font-family:Poppins,sans-serif;
      font-size:16px;
      font-weight:700;
      line-height:1.05;
      color:rgba(255,255,255,.92);
    }
    .empty{
      margin:0 16px 16px;padding:16px;border-radius:18px;background:rgba(255,255,255,.03);color:var(--muted);
      border:1px dashed rgba(255,255,255,.10);font-size:14px;line-height:1.4
    }

    .content{display:grid;gap:16px;align-content:start;min-width:0}
    .player{padding:16px}
    .player.video-active{padding:0;background:rgba(0,0,0,.25)}
    .player.is-idle #videoShell,.player.is-idle #audioStage{display:none}
    #videoShell,#videoPlaceholder{
      width:100%;aspect-ratio:16/9;min-height:240px;border-radius:22px;overflow:hidden;background:#000;
      border:1px solid rgba(255,255,255,.06);display:none;align-items:center;justify-content:center;text-align:center;color:var(--muted)
    }
    #videoShell iframe{width:100%;height:100%;border:0;display:block}
    #audioPlaceholder{
      display:none;min-height:220px;align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--muted);
      border-radius:22px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.26)
    }
    .audio-stage{display:none;grid-template-columns:1fr;gap:14px}
    .audio-art{width:100%;aspect-ratio:1/1;max-width:380px;border-radius:24px;overflow:hidden;margin:0 auto}
    .audio-art img{width:100%;height:100%;object-fit:cover}
    .transport{
      width:100%;max-width:420px;display:grid;grid-template-columns:56px minmax(0,1fr) 56px;gap:8px;align-items:center;
      padding:6px;border-radius:999px;background:linear-gradient(180deg, rgba(21,21,21,.82), rgba(10,10,10,.58));border:1px solid rgba(255,255,255,.10);
      margin:0 auto
    }
    .transport-btn,.play-btn{
      min-height:56px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center
    }
    .play-btn{justify-content:flex-start;padding:0 12px 0 6px;gap:12px;min-width:0;background:linear-gradient(180deg, rgba(80,100,91,.24), rgba(39,49,44,.30));border-color:rgba(143,174,157,.18)}
    .play-circle{width:42px;height:42px;border-radius:999px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;flex:0 0 42px}
    .play-copy{display:flex;align-items:center;gap:4px;font-family:Poppins,sans-serif;font-size:14px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
    .audio-copy{display:flex;flex-direction:column;gap:6px}
    .audio-title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(28px,3vw,44px);line-height:1.04}
    .audio-series{color:rgba(255,255,255,.88);font-family:Poppins,sans-serif;font-size:18px}
    .detail-row{display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;color:rgba(255,255,255,.84);font-size:13px}
    .label,.meta-label{font-family:Poppins,sans-serif;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted-2)}
    .value,.meta-value{color:rgba(255,255,255,.90);font-weight:600}
    .time-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .audio-now{font-family:Poppins,sans-serif;font-size:clamp(30px,4vw,58px);line-height:.92;letter-spacing:-.05em;font-variant-numeric:tabular-nums}
    .audio-total{font-family:Poppins,sans-serif;font-size:20px;color:var(--muted);font-variant-numeric:tabular-nums;padding-bottom:5px}
    .progress-wrap{display:grid;gap:6px}
    .progress{appearance:none;width:100%;height:8px;border-radius:999px;background:rgba(255,255,255,.10);outline:none;cursor:pointer}
    .progress::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:999px;background:#d7eadf;border:2px solid rgba(17,17,17,.84)}
    .progress-times{display:flex;justify-content:space-between;gap:12px;font-family:Poppins,sans-serif;font-size:12px;color:rgba(255,255,255,.92);font-weight:600;font-variant-numeric:tabular-nums}
    #audioPlayer{display:none}
    .detail{padding:18px}
    .detail.is-idle{display:none}
    .detail-title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(24px,2.2vw,38px);line-height:1.08}
    .detail-series{font-family:Poppins,sans-serif;font-size:18px;color:rgba(255,255,255,.90);margin:8px 0 18px}
    .meta-grid{display:grid;gap:10px}
    .meta-row{display:grid;grid-template-columns:120px minmax(0,1fr);gap:12px;align-items:start}
    .detail-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    .related-wrap{display:none;gap:12px;margin-top:18px}
    .related-title{font-family:Poppins,sans-serif;font-size:16px;margin:0 0 10px}
    .related-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
    .related{flex:0 0 220px;max-width:220px}
    .related .thumb-wide{width:84px;height:48px;flex-basis:84px}
    .related .thumb-square{width:64px;height:64px;flex-basis:64px}

    
    @media (min-width:1040px){
      .brand .logo-btn img{
        content:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1235337/Desktop-White-2-2.png');
        width:278px;
        height:88px;
        object-fit:contain;
        object-position:left center;
        filter:drop-shadow(0 5px 14px rgba(0,0,0,.14));
      }
      .logo-btn{
        width:286px;
        height:88px;
        align-items:center;
        justify-content:flex-start;
      }
      .brand{gap:0px}
      .brand h1{display:none}
    }

    @media (min-width:1040px){
      .flow{grid-template-columns:minmax(360px,540px) minmax(0,1fr);align-items:start}
      .nav-panel{position:sticky;top:98px;height:calc(100vh - 118px);max-height:calc(100vh - 118px);overflow:hidden}
      .content{grid-template-rows:auto auto auto;min-width:0}
      .context-strip{display:block}
      .audio-stage{grid-template-columns:minmax(280px,360px) minmax(0,1fr);align-items:start;gap:22px}
      .audio-art{margin:0;max-width:360px}
      .transport{margin:0}
      .meta-row{grid-template-columns:140px minmax(0,1fr)}
    }
    @media (max-width:900px){
      body{
        background:
          linear-gradient(180deg, rgba(11,11,12,.96) 0%, rgba(9,9,10,.99) 100%),
          var(--mobile-bg) center/cover no-repeat fixed;
        background-blend-mode:multiply;
      }
      .app{padding:0 8px 14px}
      .brand p{display:none}
      .logo-btn{width:78px;height:58px;border-radius:0;background:transparent;border:none;box-shadow:none}
      .logo-btn img{transform:scale(1)}
      .mode-pill{min-width:0;flex:1}
      .mode-btn-shell{min-height:48px;padding:0 12px}
      .impact{width:100%;gap:8px}
      .impact-pill{flex:1 1 0;min-width:0}
      .search-row{flex-wrap:wrap}
      .search-status{width:100%}
      .path-row{gap:8px}
      .path-button{flex:1 1 calc(50% - 4px);min-width:0}
      .thumb-wide{width:108px;height:66px;flex-basis:108px}

  <script>
    // CGBC media UI rebuild: keeps the same data model, but tightens nav scrolling,

    const LIVESTREAMS = { name:'Livestreams', playlistId:'PLKqZ6zXCYxUBu3jzPCTncKPpopFcvlVyv' };
    const GUEST_SPEAKERS = { name:'CGBC Guest Speaker', playlistId:'PLKqZ6zXCYxUDfYDWUNzBJFBAQ0rr2b6NW' };
    const SHORTS = { name:'CGBC Shorts', playlistId:'PLKqZ6zXCYxUAbDMGWMPp-HjT3t64V1tnj' };

    // Beginner note: edit this list when the current pinned audio series changes.

    const BOOK_ORDER = ['Genesis','Exodus','Leviticus','Numbers','Deuteronomy','Joshua','Judges','Ruth','1 Samuel','2 Samuel','1 Kings','2 Kings','1 Chronicles','2 Chronicles','Ezra','Nehemiah','Esther','Job','Psalms','Proverbs','Ecclesiastes','Song of Solomon','Isaiah','Jeremiah','Lamentations','Ezekiel','Daniel','Hosea','Joel','Amos','Obadiah','Jonah','Micah','Nahum','Habakkuk','Zephaniah','Haggai','Zechariah','Malachi','Matthew','Mark','Luke','John','Acts','Romans','1 Corinthians','2 Corinthians','Galatians','Ephesians','Philippians','Colossians','1 Thessalonians','2 Thessalonians','1 Timothy','2 Timothy','Titus','Philemon','Hebrews','James','1 Peter','2 Peter','1 John','2 John','3 John','Jude','Revelation'];
    const BOOK_MAP = new Map(BOOK_ORDER.map((n,i)=>[n.toLowerCase(), i]));

    };

    function escapeHtml(v){return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');}
    function formatNumber(v){return new Intl.NumberFormat('en-US').format(Number(v || 0));}
    function formatCountLabel(v,s,p){const n=Number(v||0); return `${formatNumber(n)} ${n===1?s:p}`;}
    function formatClock(sec){const s=Math.max(0,Number(sec||0)); const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=Math.floor(s%60); return h>0?`${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}
    function formatDate(item){if(item?.date?.iso){try{return new Date(item.date.iso+'T12:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}catch(err){}} return item?.date?.raw || 'Unknown date';}
    function formatMonthYear(monthKey){
      try{return new Date(monthKey + '-15T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});}catch(err){return monthKey;}
    }
    function monthNameOnly(monthKey){
      try{return new Date(monthKey + '-15T12:00:00').toLocaleDateString('en-US',{month:'long'});}catch(err){return monthKey;}
    }
    function searchMetaLine(item, query){
      const q = String(query || '').trim().toLowerCase();
      const scripture = item?.scripture?.display || '';
      const series = item?.series?.name || '';
      const date = formatDate(item);
      const books = getBookTagsDisplay(item);
      const speaker = item?.speaker || '';
      if(!q) return [series, scripture, date].filter(Boolean).join(' · ');
      if(scripture.toLowerCase().includes(q)) return scripture;
      if(date.toLowerCase().includes(q)) return date;
      if(series.toLowerCase().includes(q)) return series;
      if(books.toLowerCase().includes(q)) return books;
      if(speaker.toLowerCase().includes(q)) return speaker;
      return [series, scripture, date].filter(Boolean).join(' · ');
    }
    function sortNewestFirst(a,b){const ai=a?.date?.iso||'', bi=b?.date?.iso||''; if(ai&&bi) return bi.localeCompare(ai); return (b?.title?.display||'').localeCompare(a?.title?.display||'');}
    function sortSeriesName(a,b){return String(a).localeCompare(String(b), undefined, {numeric:true,sensitivity:'base'});}
    function sortBookName(a,b){const ai=BOOK_MAP.has(String(a).toLowerCase())?BOOK_MAP.get(String(a).toLowerCase()):999; const bi=BOOK_MAP.has(String(b).toLowerCase())?BOOK_MAP.get(String(b).toLowerCase()):999; return ai!==bi?ai-bi:sortSeriesName(a,b);}
    function getBookTagsDisplay(item){const tags=Array.isArray(item?.bookTags)?item.bookTags.map(t=>t?.name).filter(Boolean):[]; return tags.length?tags.join(', '):'—';}
    function isVideoCapable(item){return !!(item?.video?.hasVideo && item?.video?.youtubeId && item?.flags?.includeInVideoTotals!==false);}
    function isAudioCapable(item){return !!item?.audio?.hasAudio;}
    function getModeItems(mode){return state.items.filter(it=>mode==='audio'?isAudioCapable(it):isVideoCapable(it));}
    function applySearch(items){
      const q=state.searchTerm.trim().toLowerCase();
      if(!q) return items.slice();
      return items.filter(item=>{
        const dateDisplay = formatDate(item);
        const iso = item?.date?.iso || '';
        let monthYear = '';
        let monthOnly = '';
        try{
          if(iso){
            const d = new Date(iso + 'T12:00:00');
            monthYear = d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
            monthOnly = d.toLocaleDateString('en-US',{month:'long'});
          }
        }catch(err){}
        const haystack = [
          item?.title?.display, item?.series?.name, item?.study?.name, item?.scripture?.display,
          item?.speaker, item?.date?.raw, item?.date?.iso, dateDisplay, monthYear, monthOnly,
          ...(Array.isArray(item?.bookTags)?item.bookTags.map(t=>t?.name):[])
        ].filter(Boolean).join(' | ').toLowerCase();
        return haystack.includes(q);
      });
    }
    function visibleItems(){return applySearch(getModeItems(state.mode));}
    function searchResultsMode(){ return state.searchTerm.trim().length > 0; }
    function getEpisodeArt(item, mode=state.mode){
      if(mode==='video') return item?.art?.episode?.wide || item?.art?.series?.wide || item?.art?.study?.wide || item?.art?.episode?.square || item?.art?.series?.square || ASSETS.fallback;
      return item?.art?.episode?.square || item?.art?.series?.square || item?.art?.study?.square || item?.art?.episode?.wide || item?.art?.series?.wide || ASSETS.fallback;
    }
    function sortOldestFirst(a,b){
      const ai=a?.date?.iso||'', bi=b?.date?.iso||'';
      if(ai && bi) return ai.localeCompare(bi);
      return (a?.title?.display||'').localeCompare(b?.title?.display||'');
    }
    function getSeriesArtFromItem(item, mode=state.mode){
      if(mode==='video') return item?.art?.series?.wide || item?.art?.episode?.wide || item?.art?.study?.wide || item?.art?.series?.square || item?.art?.episode?.square || ASSETS.fallback;
      return item?.art?.series?.square || item?.art?.episode?.square || item?.art?.study?.square || item?.art?.series?.wide || item?.art?.episode?.wide || ASSETS.fallback;
    }
    function getStudyArtFromItem(item, mode=state.mode){
      if(mode==='video') return item?.art?.study?.wide || item?.art?.series?.wide || item?.art?.episode?.wide || item?.art?.study?.square || item?.art?.series?.square || ASSETS.fallback;
      return item?.art?.study?.square || item?.art?.series?.square || item?.art?.episode?.square || item?.art?.study?.wide || item?.art?.series?.wide || ASSETS.fallback;
    }
    function getFirstEpisode(items){
      return (Array.isArray(items) ? items.slice().sort(sortOldestFirst)[0] : null) || null;
    }
    async function loadResolvedData(){
      const paths=['./library-resolved.json','./data/library-resolved.json','./public/library-resolved.json','/library-resolved.json','/data/library-resolved.json','/public/library-resolved.json'];
      let lastError=null;
      for(const path of paths){
        try{
          const res=await fetch(path,{cache:'no-store'});
          if(!res.ok) continue;
          const json=await res.json();
          if(Array.isArray(json?.items)) return json;
        }catch(err){lastError=err;}
      }
      throw lastError || new Error('library-resolved.json could not be loaded.');
    }
    async function fetchPlaylistSeries(config){
      const episodes=[]; let pageToken='';
      for(let attempt=0;attempt<6;attempt+=1){
        const qs=new URLSearchParams({part:'snippet',maxResults:'50',playlistId:config.playlistId,key:API_KEY});
        if(pageToken) qs.set('pageToken', pageToken);
        const res=await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?${qs.toString()}`);
        if(!res.ok) throw new Error(`playlistItems ${res.status}`);
        const data=await res.json();
        const rows=Array.isArray(data?.items)?data.items:[];
        rows.forEach((row,index)=>{
          const snippet=row?.snippet||{}, videoId=snippet?.resourceId?.videoId;
          if(!videoId) return;
          const thumb=snippet?.thumbnails?.maxres?.url || snippet?.thumbnails?.standard?.url || snippet?.thumbnails?.high?.url || snippet?.thumbnails?.medium?.url || snippet?.thumbnails?.default?.url || ASSETS.fallback;
          episodes.push({
            stableId:`${config.name.toLowerCase().replace(/\\s+/g,'-')}-${videoId}`,
            source:'youtube-native',
            title:{episodeName:snippet?.title||'Untitled',subtitle:'',display:snippet?.title||'Untitled'},
            series:{name:config.name,key:config.name.toLowerCase().replace(/\\s+/g,'-'),type:'native_youtube_shelf'},
            study:{name:'',key:null,type:'none'},
            scripture:{raw:'',display:'YouTube native shelf',book:null,bookKey:null,isVarious:true},
            bookTags:[],
            speaker:'CGBC',
            date:{raw:snippet?.publishedAt||'',iso:snippet?.publishedAt?String(snippet.publishedAt).slice(0,10):null,year:snippet?.publishedAt?Number(String(snippet.publishedAt).slice(0,4)):null},
            links:{episodeUrl:`https://www.youtube.com/watch?v=${videoId}`,shareUrl:`https://www.youtube.com/watch?v=${videoId}`},
            audio:{hasAudio:false,url:null,plays:0,durationSeconds:0},
            video:{hasVideo:true,youtubeId:videoId,url:`https://www.youtube.com/watch?v=${videoId}`,views:0},
            art:{episode:{square:thumb,wide:thumb},series:{square:thumb,wide:thumb},study:{square:thumb,wide:thumb}},
            memberships:{series:[config.name.toLowerCase().replace(/\\s+/g,'-')],studies:[],bibleBooks:[],byYear:[],byMonth:[]},
            presentation:{bibleBooksMode:'none'},
            flags:{isStandaloneEpisode:true,includeInAudioTotals:false,includeInVideoTotals:true},
            _sortIndex:index
          });
        });
        if(!data?.nextPageToken) break;
        pageToken=data.nextPageToken;
      }
      return episodes.sort(sortNewestFirst);
    }
    function buildBrowse(){
      const items=visibleItems();
      const browse={roots:[],current:[],books:new Map(),topical:new Map(),date:new Map()};

      items.forEach(item=>{
        const seriesKey=item?.series?.key || '';
        const seriesName=item?.series?.name || 'Untitled Series';
        const studyName=item?.study?.name || '';
        const modeHint=item?.presentation?.bibleBooksMode || 'none';
        const bookKeys=Array.isArray(item?.memberships?.bibleBooks)?item.memberships.bibleBooks:[];
        const isSpecial=/special/i.test(seriesName);

        if(CURRENT_SERIES_KEYS.has(seriesKey)){
          let row = browse.current.find(r=>r.key===seriesKey);
          if(!row){
            row={key:seriesKey,title:seriesName,meta:studyName || 'Current series',image:ASSETS.current,items:[]};
            browse.current.push(row);
          }
          row.items.push(item);
        }

        bookKeys.forEach(bookKey=>{
          if(!browse.books.has(bookKey)){
            browse.books.set(bookKey,{
              key:bookKey,
              title:item?.bookTags?.find(t=>t.key===bookKey)?.name || item?.scripture?.book || bookKey,
              image:ASSETS.books,
              seriesMap:new Map(),
              episodes:[],
              specialsByYear:new Map()
            });
          }
          const bucket=browse.books.get(bookKey);
          if(isSpecial){
            const year=String(item?.date?.year || 'Unknown');
            if(!bucket.specialsByYear.has(year)) bucket.specialsByYear.set(year, []);
            bucket.specialsByYear.get(year).push(item);
          } else if(modeHint==='series_group'){
            if(!bucket.seriesMap.has(seriesKey)){
              bucket.seriesMap.set(seriesKey,{
                key:seriesKey,
                title:seriesName,
                meta:studyName || 'Series',
                image:ASSETS.books,
                items:[]
              });
            }
            bucket.seriesMap.get(seriesKey).items.push(item);
          } else if(modeHint==='episode_only'){
            bucket.episodes.push(item);
          }
        });

        if((item?.series?.type==='topical' || item?.series?.type==='standalone') && !isSpecial){
          if(!browse.topical.has(seriesKey)){
            browse.topical.set(seriesKey,{
              key:seriesKey,
              title:seriesName,
              meta:studyName || 'Topical series',
              image:ASSETS.topicalSeries || ASSETS.fallback,
              items:[]
            });
          }
          browse.topical.get(seriesKey).items.push(item);
        }

        const year=String(item?.date?.year || '');
        const monthKey=item?.date?.iso ? item.date.iso.slice(0,7) : '';
        if(year && monthKey){
          if(!browse.date.has(year)) browse.date.set(year, new Map());
          if(!browse.date.get(year).has(monthKey)) browse.date.get(year).set(monthKey, []);
          browse.date.get(year).get(monthKey).push(item);
        }
      });

      // apply art rules after bucketing
      browse.current.forEach(row=>{
        const firstEpisode=getFirstEpisode(row.items);
        row.image=getSeriesArtFromItem(firstEpisode);
      });

      browse.books.forEach(bucket=>{
        bucket.seriesMap.forEach(row=>{
          const firstEpisode=getFirstEpisode(row.items);
          row.image=getSeriesArtFromItem(firstEpisode);
        });

        const orderedSeries = Array.from(bucket.seriesMap.values()).sort((a,b)=>sortSeriesName(a.title,b.title));
        const firstSeries = orderedSeries[0];
        if(firstSeries){
          const firstEpisode=getFirstEpisode(firstSeries.items);
          bucket.image=getStudyArtFromItem(firstEpisode);
        } else if(bucket.episodes.length){
          bucket.image=getStudyArtFromItem(getFirstEpisode(bucket.episodes));
        } else {
          const specialYears=Array.from(bucket.specialsByYear.keys()).sort((a,b)=>a.localeCompare(b));
          const firstSpecialYear=specialYears[0];
          if(firstSpecialYear){
            bucket.image=getStudyArtFromItem(getFirstEpisode(bucket.specialsByYear.get(firstSpecialYear)));
          }
        }
      });

      browse.topical.forEach(row=>{
        row.image=getSeriesArtFromItem(getFirstEpisode(row.items));
      });

      browse.current.sort((a,b)=>sortSeriesName(a.title,b.title));
      browse.roots=[
        ...(state.mode==='video' ? [
          {key:'livestreams',title:'Livestreams',meta:'Live YouTube shelf',image:ASSETS.livestreams},
          ...(browse.current.length ? [{key:'current',title:'Current',meta:formatCountLabel(browse.current.length,'series','series'),image:ASSETS.current}] : [])
        ] : []),
        ...(state.mode==='audio' ? [
          {key:'current',title:'Current',meta:formatCountLabel(browse.current.length,'series','series'),image:ASSETS.current}
        ] : []),
        {key:'books',title:'Bible Books / Studies',meta:formatCountLabel(browse.books.size,'book','books'),image:ASSETS.books},
        {key:'topical',title:'Topical Series',meta:formatCountLabel(browse.topical.size,'series','series'),image:ASSETS.topicalSeries || ASSETS.fallback},
        {key:'date',title:'Date',meta:'Year → Month',image:ASSETS.date},
        ...(state.mode==='video' ? [
          {key:'shorts',title:'Shorts',meta:'Live YouTube shelf',image:ASSETS.shorts}

      return browse;
    }
    function rootChoices(){ return buildBrowse().roots; }
    function branchChoices(){
      const browse=buildBrowse(), root=state.nav.rootKey;
      if(!root) return [];
      if(root==='livestreams') return [{key:'live-all',title:'Livestreams',meta:formatCountLabel(state.nativeShelves.livestreams.length,'video','videos'),image:ASSETS.livestreams}];
      if(root==='shorts') return [{key:'shorts-all',title:'Shorts',meta:formatCountLabel(state.nativeShelves.shorts.length,'video','videos'),image:ASSETS.shorts}];
      if(root==='current') return browse.current;
      if(root==='books'){
        return Array.from(browse.books.values()).sort((a,b)=>sortBookName(a.title,b.title)).map(bucket=>({
          key:bucket.key,
          title:bucket.title,
          meta:`${formatCountLabel(bucket.seriesMap.size,'series','series')} · ${formatCountLabel(bucket.episodes.length + Array.from(bucket.specialsByYear.values()).reduce((s,a)=>s+a.length,0),'episode','episodes')}`,
          image:bucket.image
        }));
      }
      if(root==='topical') {
        const rows = Array.from(browse.topical.values()).sort((a,b)=>(getFirstEpisode(a.items)?.date?.iso||'').localeCompare(getFirstEpisode(b.items)?.date?.iso||'') || sortSeriesName(a.title,b.title));
        if(state.mode==='video' && state.nativeShelves.guestSpeakers.length){
          rows.push({
            key:'guest-speakers-pinned',
            title:'CGBC Guest Speaker',
            meta:formatCountLabel(state.nativeShelves.guestSpeakers.length,'video','videos'),
            image:getSeriesArtFromItem(getFirstEpisode(state.nativeShelves.guestSpeakers)),
            items:state.nativeShelves.guestSpeakers.slice()
          });
        }
        return rows;
      }
      if(root==='date') return Array.from(browse.date.keys()).sort((a,b)=>b.localeCompare(a)).map(year=>({key:year,title:year,meta:formatCountLabel(browse.date.get(year).size,'month','months'),image:null,dateCardType:'year',dateCardValue:year}));
      return [];
    }
    function leafChoices(){
      const browse=buildBrowse(), root=state.nav.rootKey, branch=state.nav.branchKey;
      if(!root || !branch) return [];
      if(root==='livestreams' || root==='shorts') return [];
      if(root==='current'){
        const selected=browse.current.find(r=>r.key===branch); if(!selected) return [];
        const rows=visibleItems().filter(item=>item?.series?.key===selected.key).sort(sortNewestFirst);
        return [{key:selected.key,title:selected.title,meta:formatCountLabel(rows.length,'episode','episodes'),image:selected.image}];
      }
      if(root==='books'){
        const bucket=browse.books.get(branch); if(!bucket) return [];
        const out=[];
        Array.from(bucket.seriesMap.values()).sort((a,b)=>(getFirstEpisode(a.items)?.date?.iso||'').localeCompare(getFirstEpisode(b.items)?.date?.iso||'') || sortSeriesName(a.title,b.title)).forEach(row=>out.push({key:row.key,title:row.title,meta:formatCountLabel(row.items.length,'episode','episodes'),image:row.image || getSeriesArtFromItem(getFirstEpisode(row.items))}));
        if(bucket.episodes.length) out.push({key:`${bucket.key}__episodes`,title:'Individual Sermons',meta:formatCountLabel(bucket.episodes.length,'episode','episodes'),image:getEpisodeArt(bucket.episodes[0]||{})});
        Array.from(bucket.specialsByYear.keys()).sort((a,b)=>b.localeCompare(a)).forEach(year=>{
          const rows=bucket.specialsByYear.get(year)||[];
          out.push({key:`${bucket.key}__specials__${year}`,title:`Single Events / Sermons · ${year}`,meta:formatCountLabel(rows.length,'episode','episodes'),image:getEpisodeArt(rows[0]||{})});
        });
        return out;
      }
      if(root==='topical') return [];
      if(root==='date'){
        const yearBucket=browse.date.get(branch); if(!yearBucket) return [];
        return Array.from(yearBucket.keys()).sort((a,b)=>b.localeCompare(a)).map(monthKey=>({
          key:monthKey,
          title:new Date(monthKey+'-15T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'}),
          meta:formatCountLabel(yearBucket.get(monthKey).length,'episode','episodes'),
          image:null,
          dateCardType:'month',
          dateCardValue:monthKey
        }));
      }
      return [];
    }
    function queueItems(){
      const browse=buildBrowse(), root=state.nav.rootKey, branch=state.nav.branchKey, leaf=state.nav.leafKey;
      if(!root) return [];
      if(root==='livestreams') return state.nativeShelves.livestreams.slice();
      if(root==='shorts') return state.nativeShelves.shorts.slice();
      if(root==='current'){
        const selected=browse.current.find(r=>r.key===(leaf||branch)); if(!selected) return [];
        return visibleItems().filter(item=>item?.series?.key===selected.key).sort(sortNewestFirst);
      }
      if(root==='books'){
        const bucket=browse.books.get(branch); if(!bucket || !leaf) return [];
        if(leaf.endsWith('__episodes')) return bucket.episodes.slice().sort(sortNewestFirst);
        if(leaf.includes('__specials__')){const year=leaf.split('__specials__')[1]; return (bucket.specialsByYear.get(year)||[]).slice().sort(sortNewestFirst);}
        const row=bucket.seriesMap.get(leaf); return row ? row.items.slice().sort(sortNewestFirst) : [];
      }
      if(root==='topical'){
        if(branch==='guest-speakers-pinned') return state.nativeShelves.guestSpeakers.slice();
        const row=browse.topical.get(branch);
        return row ? row.items.slice().sort(sortNewestFirst) : [];
      }
      if(root==='date'){const yearBucket=browse.date.get(branch); if(!yearBucket || !leaf) return []; return (yearBucket.get(leaf)||[]).slice().sort(sortNewestFirst);}
      return [];
    }
    function choiceRows(){
      if(searchResultsMode()) return {rows:visibleItems().sort(sortNewestFirst), episodeLevel:true, searchResults:true};
      if(!state.nav.rootKey) return {rows:rootChoices(), episodeLevel:false};
      if(!state.nav.branchKey) return {rows:branchChoices(), episodeLevel:false};
      const leaves=leafChoices();
      if(leaves.length && !state.nav.leafKey) return {rows:leaves, episodeLevel:false};
      return {rows:queueItems(), episodeLevel:true};
    }
    function currentPathTitle(){
      const browse=buildBrowse();
      const root=browse.roots.find(r=>r.key===state.nav.rootKey);
      const branch=branchChoices().find(r=>r.key===state.nav.branchKey);
      const leaf=leafChoices().find(r=>r.key===state.nav.leafKey);

      if(root) return `Browse · ${root.title}`;
      return 'Choose a category';
    }
    function buildContextItems(){

      if(root) items.push({
        label:'Category',
        title:root.title,
        image:root.image || ASSETS.fallback,
        square:false,
        level:'root',
        dateCardType:root.dateCardType,
        dateCardValue:root.dateCardValue
      });
      if(branch) items.push({
        label:'Selection',
        title:branch.title,
        image:branch.image || ASSETS.fallback,
        square:state.mode==='audio' && state.nav.rootKey!=='date',
        level:'branch',
        dateCardType:branch.dateCardType,
        dateCardValue:branch.dateCardValue
      });
      if(leaf) items.push({
        label:'Series / Group',
        title:leaf.title,
        image:leaf.image || ASSETS.fallback,
        square:state.mode==='audio' && state.nav.rootKey!=='date',
        level:'leaf',
        dateCardType:leaf.dateCardType,
        dateCardValue:leaf.dateCardValue
      });
      return items;
    }
    function renderContextStrip(){

            }</div>`

        const title = isDateChip
          ? (item.dateCardType === 'year' ? String(item.dateCardValue || item.title || '') : monthNameOnly(String(item.dateCardValue || '')))
          : item.title;

        return `

          </button>

    function headingText(){
      if(!state.nav.rootKey) return 'Choose a category';
      if(!state.nav.branchKey) return 'Choose a path';
      if(leafChoices().length && !state.nav.leafKey) return 'Choose a selection';
      return 'Choose an episode';
    }
    function backLabel(){
      const browse=buildBrowse();

      const branch=branchChoices().find(r=>r.key===state.nav.branchKey);
      if(state.nav.leafKey) return `Back to ${branch?.title || 'selection'}`;

    function updateSearchStatus(){

      if(!state.data) return;

        els.impactPrimaryValue.textContent = formatNumber(state.data?.totals?.audioPlaysTotal || 0);
        els.impactPrimaryLabel.textContent = 'Audio Plays';
        els.impactSecondaryValue.textContent = formatNumber(state.data?.totals?.audioEpisodesTotal || state.items.length);
        els.impactSecondaryLabel.textContent = 'Audio Episodes';
      } else {
        const views=getModeItems('video').reduce((sum,item)=>sum+Number(item?.video?.views || 0),0);
        const count=getModeItems('video').length;
        els.impactPrimaryValue.textContent = formatNumber(views);
        els.impactPrimaryLabel.textContent = 'Archive Views';
        els.impactSecondaryValue.textContent = formatNumber(count);
        els.impactSecondaryLabel.textContent = 'Video Episodes';
      }
    }
    function renderChoices(){
      els.navHeading.textContent = searchResultsMode() ? 'Search Results' : headingText();

      updateSearchStatus();

      const {rows, episodeLevel, searchResults} = choiceRows();
      if(episodeLevel){
        state.activeQueue = rows.slice();

      } else {
        state.activeQueue = [];
        if(!searchResults) state.currentItem = null;

        els.choiceList.innerHTML = `<div class="empty">No items found for this path.</div>`;

      const isRootLevel = !state.nav.rootKey;

        const key = episodeLevel ? row.stableId : row.key;

        const dateCardInner = dateTextCard
          ? (row.dateCardType === 'year'
              ? `<div class="date-card-text"><div class="date-card-label">Year</div><div class="date-card-value">${escapeHtml(String(row.dateCardValue || ''))}</div></div>`
              : `<div class="date-card-text"><div class="date-card-label">Month</div><div class="date-card-value">${escapeHtml(monthNameOnly(String(row.dateCardValue || '')))}</div><div class="date-card-subvalue">${escapeHtml(String(row.title || ''))}</div></div>`)
          : `<img src="${escapeHtml(image)}" alt="${escapeHtml(title)}">`;

      } else {

      els.detailSpeaker.textContent=item?.speaker || '—';
      els.detailDate.textContent=formatDate(item);

    function renderRelated(item){

    function scrollChoiceListToTop(){

    function resetAll(options={}){

    function attachEvents(){
      document.body.addEventListener('click', (event)=>{

        if(topBtn){
          const key=topBtn.dataset.topRoot;
          state.nav={rootKey:key,branchKey:null,leafKey:null};
          state.currentItem=null;
          scrollChoiceListToTop();
          rerender();
          return;

        const btn=event.target.closest('[data-key]');
        if(!btn) return;
        const key=btn.dataset.key, episode=btn.dataset.episode==='1';

          return;
        }
        selectChoice(key);
      });

      els.backBtn.addEventListener('click', goBack);

      els.listenBtn.addEventListener('click', ()=>{ if(state.mode==='audio') return; state.mode='audio'; resetAll({ preserveSearch:true }); });
      els.watchBtn.addEventListener('click', ()=>{ if(state.mode==='video') return; state.mode='video'; resetAll({ preserveSearch:true }); });
      els.searchInput.addEventListener('input', (e)=>{ state.searchTerm=e.target.value || ''; state.nav={rootKey:null,branchKey:null,leafKey:null}; state.currentItem=null; clearMediaState(); scrollChoiceListToTop(); rerender(); });
      els.contextRow.addEventListener('click', (event)=>{
        const btn = event.target.closest('[data-context-level]');
        if(!btn) return;
        const level = btn.getAttribute('data-context-level');
        if(level==='root'){
          state.nav.branchKey=null;
          state.nav.leafKey=null;
          state.currentItem=null;
        } else if(level==='branch'){
          state.nav.leafKey=null;
          state.currentItem=null;
        } else if(level==='leaf'){
          state.currentItem=null;
        } else {
          return;
        }
        scrollChoiceListToTop();
        rerender();
      });
      window.addEventListener('resize', ()=>{ renderContextStrip(); });
      els.audioPlayBadge.addEventListener('click', ()=>{
        if(!els.audioPlayer.src) return;
        if(els.audioPlayer.paused) els.audioPlayer.play();
        else els.audioPlayer.pause();
      });
      els.miniSkipBackBtn.addEventListener('click', ()=>{ els.audioPlayer.currentTime=Math.max(0,(els.audioPlayer.currentTime||0)-30); });
      els.miniSkipForwardBtn.addEventListener('click', ()=>{ const d=Number(els.audioPlayer.duration||0); els.audioPlayer.currentTime=Math.min(d||0,(els.audioPlayer.currentTime||0)+30); });
      els.audioProgress.addEventListener('input', ()=>{ const d=Number(els.audioPlayer.duration||0); if(!d) return; els.audioPlayer.currentTime=Number(els.audioProgress.value||0); });
      els.audioPlayer.addEventListener('timeupdate', ()=>{
        const c=Number(els.audioPlayer.currentTime||0), d=Number(els.audioPlayer.duration||0);
        els.audioClockCurrent.textContent=formatClock(c);
        els.audioElapsedSmall.textContent=formatClock(c);
        els.audioRemainingSmall.textContent=formatClock(Math.max(0,d-c));
        els.audioProgress.max=d || 100;
        els.audioProgress.value=c;
      });
      els.audioPlayer.addEventListener('loadedmetadata', ()=>{
        const d=Number(els.audioPlayer.duration||0);
        els.audioClockTotal.textContent=`/ ${formatClock(d)}`;
        els.audioRemainingSmall.textContent=formatClock(d);
        els.audioProgress.max=d || 100;
      });
      ['play','pause','ended'].forEach(name=>{
        els.audioPlayer.addEventListener(name, ()=>{ els.audioPlayLabel.textContent = name==='play' ? 'Pause' : 'Tap to Play'; });
      });
    }
    async function bootstrap(){
      attachEvents();
      state.data = await loadResolvedData();
      state.items = Array.isArray(state.data?.items) ? state.data.items.slice() : [];
      try{
        const [livestreams, shorts, guestSpeakers] = await Promise.all([
          fetchPlaylistSeries(LIVESTREAMS),
          fetchPlaylistSeries(SHORTS),
          fetchPlaylistSeries(GUEST_SPEAKERS)
        ]);
        state.nativeShelves.livestreams = livestreams;
        state.nativeShelves.shorts = shorts;
        state.nativeShelves.guestSpeakers = guestSpeakers;
      }catch(err){
        console.warn('Live YouTube shelves failed to load.', err);
      }
      rerender();
    }
    bootstrap().catch(err=>{
      console.error(err);
      els.choiceList.innerHTML = `<div class="empty">Resolved data could not be loaded.</div>`;
    });
  </script>
</body>
</html>
