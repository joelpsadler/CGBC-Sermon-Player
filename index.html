<!DOCTYPE html>
<html lang="en">
<head>
  <!-- mobile cleanup build: 2026-04-29 final-video-transcript-off-copy-polish -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CGBC A\V MEDIA</title>
  <link rel="icon" type="image/jpeg" sizes="512x512" href="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228713/GCBC_ORIGWHT.png">
  <link rel="apple-touch-icon" href="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1238149/cgbc_media-player_-Web-App-icon_.jpg">
  <meta name="theme-color" content="#0f0f10" />
  <meta name="apple-mobile-web-app-title" content="CGBC A\V MEDIA" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f0f10;
      --panel:rgba(14,14,15,.82);
      --soft:rgba(255,255,255,.045);
      --border:rgba(255,255,255,.06);
      --text:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --muted-2:rgba(255,255,255,.52);
      --accent:#8fae9d;
      --accent-ink:#102016;
      --shadow:0 10px 30px rgba(0,0,0,.24);
      --desktop-bg:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1230673/Desktop.jpg');
      --mobile-bg:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1230674/Mobile.jpg');
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,sans-serif}
    body{
      background:
        linear-gradient(180deg, rgba(11,11,12,.46) 0%, rgba(9,9,10,.64) 100%),
        var(--desktop-bg) center center/cover no-repeat fixed;
      background-blend-mode:multiply;
    }
    button,input{font:inherit}
    button{border:none;background:none;color:inherit;cursor:pointer}
    img{display:block;max-width:100%}
    a{color:inherit;text-decoration:none}
    .app{width:min(1680px,100%);margin:0 auto;padding:0 10px 16px}
    .masthead{
      position:sticky;top:0;z-index:20;
      display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:18px;
      padding:10px 6px 12px;
      background:linear-gradient(180deg, rgba(8,8,9,.94), rgba(8,8,9,.82));
      border-bottom:1px solid rgba(255,255,255,.04);
      backdrop-filter:blur(10px);
    }
    .brand{display:flex;align-items:center;gap:14px;min-width:0;flex-wrap:wrap}
    .logo-btn{
      width:94px;height:66px;border-radius:0;display:flex;align-items:center;justify-content:center;
      background:transparent;border:none;box-shadow:none;overflow:visible;padding:0
    }
    .logo-btn img{width:100%;height:100%;object-fit:contain;transform:none;filter:drop-shadow(0 5px 12px rgba(0,0,0,.15))}
    .brand h1{margin:0;font-family:Poppins,sans-serif;font-size:clamp(22px,2.15vw,34px);line-height:1.02}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:14px}

    .brand-mode-wrap{display:flex;align-items:center;gap:14px;min-width:0;flex-wrap:wrap}
    .brand-copy{display:flex;flex-direction:column;justify-content:center;min-width:0}
    .brand-copy h1{margin:0;font-family:Poppins,sans-serif;font-size:clamp(22px,2.15vw,34px);line-height:1.02}
    .brand-copy p{margin:4px 0 0;color:var(--muted);font-size:14px}
    .top-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end;min-width:0}
    .mode-pill{
      display:grid;grid-template-columns:1fr 1fr;padding:4px;border-radius:22px;min-width:360px;
      background:linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.024));
      border:1px solid rgba(255,255,255,.085);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.075),
        0 12px 26px rgba(0,0,0,.18);
      backdrop-filter:blur(16px) saturate(1.06)
    }
    .mode-btn-shell{
      min-height:58px;padding:0 20px;display:flex;align-items:center;justify-content:center;gap:12px;border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.075);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      transition:transform .18s ease, background .18s ease, box-shadow .18s ease
    }
    .mode-btn:first-child .mode-btn-shell{border-radius:18px 8px 8px 18px}
    .mode-btn:last-child .mode-btn-shell{border-radius:8px 18px 18px 8px}
    .mode-btn.active .mode-btn-shell{
      background:linear-gradient(180deg, rgba(143,174,157,.20), rgba(143,174,157,.12));
      color:rgba(255,255,255,.98);border-color:rgba(143,174,157,.24);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 10px 22px rgba(0,0,0,.16)
    }
    .btn-copy{display:flex;flex-direction:column;align-items:flex-start;line-height:1.02;font-family:Poppins,sans-serif}
    .btn-copy .top{font-size:15px;font-weight:700}
    .btn-copy .bottom{font-size:11px;color:rgba(255,255,255,.72)}
    .mode-btn.active .bottom{color:rgba(255,255,255,.78)}
    .mode-btn .btn-copy .top{color:rgba(255,255,255,.96)}
    .mode-btn .btn-copy .bottom{color:rgba(255,255,255,.72)}
    .mode-btn.active .btn-copy .top{color:rgba(255,255,255,.98)}
    .mode-btn.active .btn-copy .bottom{color:rgba(255,255,255,.78)}
    .mode-icon{
      width:30px;height:30px;flex:0 0 30px;display:block;
      stroke:rgba(255,255,255,.96);
      stroke-width:2.15;fill:none;opacity:1;
      filter:drop-shadow(0 1px 1px rgba(0,0,0,.18))
    }
    .mode-btn.active .mode-icon{stroke:rgba(255,255,255,.98);filter:none;opacity:1}
    .mode-btn:not(.active) .mode-icon{stroke:rgba(255,255,255,.96);opacity:1}
    .mode-btn:hover .mode-btn-shell{transform:translateY(-1px);background:rgba(255,255,255,.04)}

    .impact{display:flex;gap:12px;flex-wrap:wrap}
    .impact-pill{
      min-width:112px;
      padding:10px 14px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 10px 22px rgba(0,0,0,.14);
      display:flex;
      align-items:baseline;
      gap:7px;
      white-space:nowrap;
    }
    .impact-value{
      font-family:Poppins,sans-serif;
      font-size:20px;
      font-weight:800;
      line-height:1;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .impact-label{
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted-2);
      white-space:nowrap;
      line-height:1;
      flex:0 0 auto;
    }

    .flow{display:grid;grid-template-columns:1fr;gap:16px}
    .panel{
      border-radius:24px;border:1px solid rgba(255,255,255,.07);background:linear-gradient(180deg, rgba(14,14,15,.80), rgba(14,14,15,.74));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 14px 32px rgba(0,0,0,.18);
      backdrop-filter:blur(12px);overflow:hidden
    }
    .nav-panel{display:grid;grid-template-rows:auto auto auto minmax(0,1fr);gap:0;min-height:0}
    .nav-head{padding:14px 16px 10px}
    .nav-head h2{margin:0 0 8px 0;font-family:Poppins,sans-serif;font-size:clamp(20px,2.6vw,28px);line-height:1.06}
    .eyebrow{margin:0 0 6px;font-family:Poppins,sans-serif;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);font-size:12px}
    .title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(18px,2vw,24px);line-height:1.08}


    .search-row{
      display:flex;align-items:center;gap:10px;padding:0 16px 14px;min-height:0;
      position:relative;z-index:1;
      margin-top:6px;
    }
    .search-row input{
      flex:1;min-width:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
      color:var(--text);border-radius:16px;padding:13px 14px;outline:none
    }
    .search-row input::placeholder{color:var(--muted-2)}
    .context-strip{
      display:none;
      padding:8px 14px 6px;
      min-height:96px;
      align-content:start;
    }
    .context-row{
      display:flex;
      gap:10px;
      overflow:auto hidden;
      flex-wrap:nowrap;
      min-height:88px;
      align-items:stretch;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
    }
    .context-row::-webkit-scrollbar{height:8px}
    .context-row::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:999px}
    .context-chip{
      min-width:0;
      flex:0 0 248px;
      height:88px;
      display:flex;
      gap:10px;
      align-items:center;
      padding:10px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.04);
    }
    .context-chip img{
      width:68px;height:50px;object-fit:cover;border-radius:12px;flex:0 0 68px;background:rgba(255,255,255,.05)
    }
    .context-chip.date-chip{
      position:relative;
      flex:0 0 148px;
      justify-content:center;
      align-items:center;
      padding:8px;
    }
    .context-chip.date-chip img{display:none}
    .context-chip.date-chip .context-chip-copy{display:none}
    .context-chip.date-chip .context-chip-badge{
      position:absolute;
      top:3px;
      left:50%;
      transform:translateX(-50%);
      margin-bottom:0;
      z-index:2;
    }
    .context-chip-date{
      width:120px;
      height:76px;
      flex:0 0 120px;
      border-radius:15px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
    }
    .context-chip-date .mini-label{
      font-family:Poppins,sans-serif;
      font-size:8px;
      letter-spacing:.10em;
      text-transform:uppercase;
      color:rgba(255,255,255,.55);
      line-height:1;
    }
    .context-chip-date .mini-value{
      margin-top:4px;
      max-width:100%;
      padding:0 8px;
      text-align:center;
      font-family:Poppins,sans-serif;
      font-size:17px;
      font-weight:800;
      line-height:1.02;
      color:rgba(255,255,255,.96);
      white-space:normal;
      overflow-wrap:anywhere;
    }
    .context-chip.square img{width:58px;height:58px;flex-basis:58px}
    .context-chip-copy{min-width:0}
    .context-chip-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:22px;
      padding:0 8px;
      border-radius:999px;
      margin-bottom:6px;
      font-family:Poppins,sans-serif;
      font-size:10px;
      letter-spacing:.10em;
      text-transform:uppercase;
      color:rgba(255,255,255,.94);
      background:linear-gradient(180deg, rgba(143,174,157,.18), rgba(143,174,157,.08));
      border:1px solid rgba(143,174,157,.22);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }
    .context-chip-label{
      font-family:Poppins,sans-serif;
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted-2)
    }
    .context-chip-title{
      margin-top:2px;
      font-family:Poppins,sans-serif;
      font-size:16px;
      line-height:1.08;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:normal;
      word-break:break-word;
      max-height:2.2em;
    }

    .search-status{font-size:13px;color:var(--muted);white-space:nowrap}
    .search-status:empty{display:none}

    .path-row{
      display:flex;align-items:center;justify-content:flex-start;gap:12px;padding:12px 16px 14px;border-top:1px solid rgba(255,255,255,.05);
      min-height:0;
      flex-wrap:wrap;
    }
    .path-button{
      min-height:46px;padding:0 16px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      display:inline-flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;white-space:nowrap;max-width:100%
    }
    .path-button[disabled]{opacity:.48;cursor:default}
    .path-button span{overflow:hidden;text-overflow:ellipsis}
    .path-btn-inner{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-width:0;width:100%}
    .path-glyph{display:inline-flex;align-items:center;justify-content:center;line-height:1;flex:0 0 auto;color:rgba(255,255,255,.98)}
    .path-glyph svg{display:block;width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .path-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .player-button{display:inline-flex}
        .mobile-context-bar{
      display:none;
      padding:0 16px 10px;
      gap:10px;
      flex-direction:column;
      align-items:stretch;
    }
    .mobile-context-chip{
      min-height:72px;
      width:100%;
      padding:12px 14px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      color:rgba(255,255,255,.92);
      font-family:Poppins,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
      gap:6px;
      overflow:hidden;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      pointer-events:none;
    }
    .mobile-context-chip.active{
      background:linear-gradient(180deg, rgba(143,174,157,.18), rgba(143,174,157,.09));
      border-color:rgba(143,174,157,.24);
      color:rgba(255,255,255,.98);
    }
    .mobile-context-label{
      color:rgba(255,255,255,.52);
      text-transform:uppercase;
      letter-spacing:.10em;
      font-size:10px;
      line-height:1;
      flex:0 0 auto;
    }
    .mobile-context-title{
      min-width:0;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:16px;
      line-height:1.08;
      display:block;
    }

    .stack{display:grid;gap:12px;padding:20px 16px 16px;align-content:start;grid-auto-rows:max-content;min-height:0;overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
    .choice,.episode,.related{
      width:100%;display:flex;gap:12px;align-items:flex-start;text-align:left;padding:10px;border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 10px 20px rgba(0,0,0,.12)
    }
    .choice.root-card{
      display:block;
      padding:0;
      overflow:hidden;
      position:relative;
    }
    .episode{position:relative}
    .episode-load-badge{
      position:absolute;
      right:10px;
      bottom:10px;
      z-index:2;
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(20,20,20,.82), rgba(12,12,12,.66));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 8px 20px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter:blur(12px);
      font-family:Poppins,sans-serif;
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,.94);
      pointer-events:none;
      opacity:.9;
    }
    .episode-load-badge svg{
      width:13px;
      height:13px;
      display:block;
      fill:currentColor;
      stroke:none;
    }
    .episode-load-badge.is-playing{
      color:#ff5c63;
      border-color:rgba(255,92,99,.24);
    }
    .episode-load-badge.is-loaded{
      color:rgba(230,236,232,.96);
    }
    .episode-load-badge.is-load{
      color:rgba(255,255,255,.94);
    }
    .episode-load-badge.is-playing span,
    .episode-load-badge.is-loaded span,
    .episode-load-badge.is-load span{
      color:rgba(255,255,255,.94);
    }
    .live-badge{
      position:absolute;
      top:12px;
      left:12px;
      z-index:2;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(24,10,10,.92), rgba(18,8,8,.84));
      border:1px solid rgba(255,110,110,.34);
      box-shadow:0 10px 22px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter:blur(12px);
      font-family:Poppins,sans-serif;
      font-size:12px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,245,245,.98);
      pointer-events:none;
    }
    .live-badge-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:#ff4d57;
      box-shadow:0 0 0 0 rgba(255,77,87,.7);
      animation:livePulse 1.6s infinite ease-out;
      flex:0 0 10px;
    }
    @keyframes livePulse{
      0%{box-shadow:0 0 0 0 rgba(255,77,87,.72)}
      70%{box-shadow:0 0 0 10px rgba(255,77,87,0)}
      100%{box-shadow:0 0 0 0 rgba(255,77,87,0)}
    }

    .current-lane-card-badge{
      position:absolute;
      right:12px;
      bottom:10px;
      z-index:3;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:26px;
      padding:0 10px;
      border-radius:999px;
      font-family:Poppins,sans-serif;
      font-size:10px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,255,255,.94);
      background:linear-gradient(180deg, rgba(143,174,157,.20), rgba(143,174,157,.09));
      border:1px solid rgba(143,174,157,.26);
      box-shadow:0 8px 18px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter:blur(12px);
      pointer-events:none;
    }
    .choice.has-current-lane-badge{position:relative;padding-bottom:42px;}
    .choice.root-card.has-current-lane-badge .copy{padding-bottom:42px;}
    .audio-series-line{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .audio-current-lane-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:24px;
      padding:0 9px;
      border-radius:999px;
      font-family:Poppins,sans-serif;
      font-size:10px;
      font-weight:800;
      letter-spacing:.10em;
      text-transform:uppercase;
      color:rgba(255,255,255,.92);
      background:linear-gradient(180deg, rgba(143,174,157,.18), rgba(143,174,157,.08));
      border:1px solid rgba(143,174,157,.24);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      white-space:nowrap;
      vertical-align:middle;
    }
    .choice.root-card .thumb-square,
    .choice.root-card .thumb-wide{
      width:100%;
      height:auto;
      aspect-ratio:16/9;
      flex:0 0 auto;
      border-radius:20px;
    }
    .choice.root-card .thumb-square img,
    .choice.root-card .thumb-wide img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .choice.root-card .copy{
      display:block;
      padding:14px 16px 16px;
    }
    .choice.active,.episode.active{
      background:linear-gradient(180deg, rgba(143,174,157,.22), rgba(143,174,157,.11));
      border-color:rgba(143,174,157,.24)
    }
    .thumb-wide{width:132px;height:74px;flex:0 0 132px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.05)}
    .choice.branch-card .thumb-wide{width:184px;height:104px;flex-basis:184px;border-radius:18px;}
    .choice.branch-card .thumb-square{width:108px;height:108px;flex-basis:108px;border-radius:18px;}
    /* Desktop Current-lane cards: use the extra badge-created vertical room for larger art. */
    .choice.branch-card.has-current-lane-badge .thumb-wide{
      width:230px;
      height:130px;
      flex-basis:230px;
    }
    .choice.branch-card.has-current-lane-badge .thumb-square{
      width:150px;
      height:150px;
      flex-basis:150px;
    }
    .thumb-square{width:86px;height:88px;flex:0 0 86px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.05)}
    .thumb-wide img,.thumb-square img{width:100%;height:100%;object-fit:cover}
    .copy{min-width:0;flex:1;width:100%;overflow:hidden}
    .card-title{
      margin:0;
      min-width:0;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      font-family:Poppins,sans-serif;
      font-size:clamp(16px,1.5vw,20px);
      line-height:1.12;

    // Beginner note: Current series normally comes from public/library-resolved.json now.
    // These fallback keys are only used if older generated data is loaded or auto-detection fails.
    const FALLBACK_CURRENT_SERIES_KEYS = ['romans-chapter-12','the-rapture'];

    function getCurrentSeriesKeys(){
      const generated = state?.data?.current?.seriesKeys;
      if(Array.isArray(generated) && generated.length){
        return new Set(generated.filter(Boolean));
      }
      return new Set(FALLBACK_CURRENT_SERIES_KEYS);
    }
    function getCurrentLaneForSeriesKey(seriesKey){
      const key = String(seriesKey || '').trim();
      if(!key) return '';
      const lanes = state?.data?.current?.lanes || {};
      for(const [laneName, laneData] of Object.entries(lanes)){
        if(String(laneData?.seriesKey || '').trim() === key) return laneName.toLowerCase();
      }
      const fallbackIndex = FALLBACK_CURRENT_SERIES_KEYS.indexOf(key);
      if(fallbackIndex === 0) return 'sunday';
      if(fallbackIndex === 1) return 'wednesday';
      return '';
    }

    function formatCurrentLaneLabel(lane, compact=false){
      const normalized = String(lane || '').toLowerCase();
      if(normalized === 'sunday') return compact ? 'SUN SERIES' : 'SUNDAY SERIES';
      if(normalized === 'wednesday') return compact ? 'WED SERIES' : 'WEDNESDAY SERIES';
      return '';
    }

    function currentSeriesCardBadgeHtml(seriesKey){
      const lane = getCurrentLaneForSeriesKey(seriesKey);
      const label = formatCurrentLaneLabel(lane, false).replace(/ SERIES$/, '');
      return label ? `<span class="current-lane-card-badge">${escapeHtml(label)}</span>` : '';
    }

    function currentAudioLaneBadgeHtml(item){
      const lane = getCurrentLaneForSeriesKey(item?.series?.key);
      const label = formatCurrentLaneLabel(lane, window.innerWidth <= 900);
      return label ? `<span class="audio-current-lane-badge">${escapeHtml(label)}</span>` : '';
    }
    // Beginner note: set this to true if you want the LIVE NOW badge forced on for testing.
    const FORCE_LIVE_BADGE_PREVIEW = false; // Beginner note: set to true only when you want to manually force the LIVE NOW badge for testing.

      const stored = window.localStorage.getItem(key);
      state.transcript.hidden = isMobileViewport() ? (stored === null ? true : stored === '1') : stored === '1';
    }catch(err){}
    function setTranscriptHidden(hidden){
      state.transcript.hidden = !!hidden;

    function normalizeSearchText(value){

    function dateObjectFromItem(item){

      const raw = String(item?.date?.raw || '');
      const m = raw.match(/\b(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})\b/);
      if(m){
        const month = Number(m[1]);
        const day = Number(m[2]);
        let year = Number(m[3]);
        if(year < 100) year += 2000;
        const d = new Date(year, month - 1, day, 12, 0, 0);
        if(!Number.isNaN(d.getTime())) return d;
      }
      return null;

    function buildDateSearchTokens(item){
      const tokens = [item?.date?.raw, item?.date?.iso, formatDate(item)];
      const d = dateObjectFromItem(item);
      if(!d) return tokens.filter(Boolean);

      const year = String(d.getFullYear());
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const mm = String(month).padStart(2, '0');
      const dd = String(day).padStart(2, '0');
      const monthLong = d.toLocaleDateString('en-US', { month:'long' });
      const monthShort = d.toLocaleDateString('en-US', { month:'short' });
      const fullDate = d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

      tokens.push(
        year, monthLong, monthShort,
        `${month}/${day}/${year}`, `${mm}/${dd}/${year}`, `${month}/${day}/${year.slice(-2)}`, `${mm}/${dd}/${year.slice(-2)}`,
        `${month}/${year}`, `${mm}/${year}`, `${year}-${mm}`,
        `${monthLong} ${year}`, `${year} ${monthLong}`, `${year}, ${monthLong}`,
        `${monthShort} ${year}`, `${year} ${monthShort}`, `${year}, ${monthShort}`,
        fullDate

    function buildSearchHaystack(item){
      return [
        item?.title?.episodeName, item?.title?.subtitle, item?.title?.display,
        item?.series?.name, item?.study?.name,
        ...(Array.isArray(item?.collections) ? item.collections.flatMap(c => [c?.name, c?.description, c?.key]) : []),

        item?.references?.raw, item?.references?.display,
        ...(Array.isArray(item?.search?.scriptureTokens) ? item.search.scriptureTokens : []),
        ...(Array.isArray(item?.references?.searchTokens) ? item.references.searchTokens : []),
        ...(Array.isArray(item?.references?.tokens) ? item.references.tokens : []),
        item?.speaker,

        ...(Array.isArray(item?.bookTags) ? item.bookTags.map(t => t?.name) : [])

    function bibleBookQueryPrefix(normalizedQuery){
      const q = String(normalizedQuery || '').trim();
      if(!q) return '';
      const books = Array.isArray(BOOK_ORDER) ? BOOK_ORDER : [];
      let best = '';
      for(const book of books){
        const normalizedBook = normalizeSearchText(book);
        if(!normalizedBook) continue;
        if(q === normalizedBook || q.startsWith(normalizedBook + ' ')){
          if(normalizedBook.length > best.length) best = normalizedBook;
        }
      }
      return best;
    }

    function isSpecificScriptureQuery(query){
      const normalized = normalizeSearchText(query);
      if(!normalized) return false;
      const bookPrefix = bibleBookQueryPrefix(normalized);
      if(!bookPrefix) return false;
      const rest = normalized.slice(bookPrefix.length).trim();
      const numbers = rest.match(/\b\d+\b/g) || [];
      return numbers.length >= 2;
    }

    function getItemSearchIndex(item){
      if(item?.__searchIndex) return item.__searchIndex;
      const haystackRaw = buildSearchHaystack(item).toLowerCase();
      const haystackNormalized = normalizeSearchText(haystackRaw);
      const scriptureParts = [
        item?.scripture?.raw,
        item?.scripture?.display,
        item?.references?.raw,
        item?.references?.display,
        ...(Array.isArray(item?.search?.scriptureTokens) ? item.search.scriptureTokens : []),
        ...(Array.isArray(item?.references?.searchTokens) ? item.references.searchTokens : []),
        ...(Array.isArray(item?.references?.tokens) ? item.references.tokens : [])
      ].filter(Boolean);
      const scriptureExact = new Set(scriptureParts.map(normalizeSearchText).filter(Boolean));
      const index = { haystackRaw, haystackNormalized, scriptureExact };
      try{ Object.defineProperty(item, '__searchIndex', { value:index, enumerable:false, configurable:true }); }
      catch(err){ item.__searchIndex = index; }

    function prepareSearchIndexes(items){

    function searchMatchesItem(item, query){
      const rawQuery = String(query || '').trim().toLowerCase();
      const normalizedQuery = normalizeSearchText(rawQuery);
      if(!normalizedQuery) return true;

      const index = getItemSearchIndex(item);

      // Beginner note: specific verse searches should be precise.
      // Example: "Romans 12:7" should not return every episode that merely contains "Romans".
      if(isSpecificScriptureQuery(rawQuery)){
        return index.scriptureExact.has(normalizedQuery);
      }

      // Fast exact/phrase check first. This helps titles and exact dates feel instant.
      if(rawQuery.length > 1 && index.haystackRaw.includes(rawQuery)) return true;
      if(normalizedQuery.length > 1 && index.haystackNormalized.includes(normalizedQuery)) return true;

      // Then use AND matching: every meaningful search word must be present.
      // This makes "2024 March" and "March 2024" work without letting one loose word flood results.
      const queryTokens = normalizedQuery.split(' ').filter(token => token.length > 1 || /^\d+$/.test(token));
      return queryTokens.length > 1 && queryTokens.every(token => index.haystackNormalized.includes(token));
    }

      if(navigator.share){
        try{
          const payload = files.length ? { title, text, url, files } : { title, text, url };
          await navigator.share(payload);
          return;
        }catch(err){
          if(err && err.name === 'AbortError') return;
        }

      try{
        await navigator.clipboard.writeText(url);
        alert('Share link copied to clipboard.');

          navigator.mediaSession.setPositionState({

      try{ navigator.mediaSession.setActionHandler('seekbackward', (details)=>{ els.audioPlayer.currentTime = Math.max(0, (els.audioPlayer.currentTime||0) - Number(details?.seekOffset || 30)); }); }catch(err){}
      try{ navigator.mediaSession.setActionHandler('seekforward', (details)=>{ els.audioPlayer.currentTime = Math.min(Number(els.audioPlayer.duration||0), (els.audioPlayer.currentTime||0) + Number(details?.seekOffset || 30)); }); }catch(err){}
      try{ navigator.mediaSession.setActionHandler('seekto', (details)=>{ if(typeof details?.seekTime === 'number') els.audioPlayer.currentTime = details.seekTime; }); }catch(err){}
      try{ navigator.mediaSession.setActionHandler('previoustrack', null); }catch(err){}

    async function loadIdleQuotes(){
      try{
        const [bank, curation] = await Promise.all([fetchFirstJson(quoteBankPaths()), fetchFirstJson(quoteCurationPaths())]);
        const rows = Array.isArray(bank?.quotes) ? bank.quotes : [];
        const reviewMap = new Map((Array.isArray(curation?.reviews)?curation.reviews:[]).filter(r=>r?.quoteId).map(r=>[r.quoteId,r]));
        const approved = [];
        for(const q of rows){
          const review = reviewMap.get(q.id);
          const status = String(review?.status || q?.curation?.status || q?.status || '').toLowerCase();
          if(status !== 'approved' && status !== 'featured') continue;
          const clone = {...q, __curatedStatus:status, __curatedText:review?.approvedText || q?.approvedText || q?.displayText || q?.expandedText || q?.text || ''};
          if(idleQuoteText(clone)) approved.push(clone);
        }
        state.idleQuotes = approved;
        if(approved.length){ state.idleQuoteIndex = Math.floor(Math.random() * approved.length); renderIdleQuote(); startIdleQuoteCycle(); }
        else renderIdleQuote();
      }catch(err){ console.warn('Idle quote wall could not load.',err); renderIdleQuote(); }

    function findTranscriptActivePosition(time){
      const segments = state.transcript.segments || [];
      if(!segments.length) return {active:null, position:-1, progress:0};

      if(pos < 0){
        for(let i=segments.length-1; i>=0; i-=1){ if(time >= segments[i].start){ pos=i; break; } }
      }
      if(pos < 0) pos = 0;
      const active = segments[pos];
      const next = segments[pos+1];
      const wordCount = String(active?.text || '').trim().split(/\s+/).filter(Boolean).length || 1;

    function animateTranscriptScrollTo(container, target){
      if(!container) return;

      if(Math.abs(distance) < 1.5) return;
      if(container.__transcriptScrollRaf) window.cancelAnimationFrame(container.__transcriptScrollRaf);
      const duration = Math.min(980, Math.max(520, Math.abs(distance) * 1.75));
      const started = performance.now();
      const ease = t => t < .5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2;
      const step = now => {
        const p = Math.min(1, (now - started) / duration);
        container.scrollTop = start + (distance * ease(p));
        if(p < 1) container.__transcriptScrollRaf = window.requestAnimationFrame(step);
        else container.__transcriptScrollRaf = null;
      };
      container.__transcriptScrollRaf = window.requestAnimationFrame(step);

      if(!container || !current) return;
      const currentEl = container.querySelector('.transcript-line[data-index="'+current.index+'"]');
      if(!currentEl) return;

      // SAFE FOLLOW LOGIC, PASS 2:
      // Do not chase the audio clock. Only glide when the active transcript line
      // leaves a wide comfortable reading band. This avoids the earlier broken
      // conveyor experiment and keeps quote/auth code untouched.
      if(container.__lastFollowIndex === current.index) return;
      container.__lastFollowIndex = current.index;

      const currentTop = currentEl.offsetTop - container.scrollTop;
      const currentCenter = currentTop + (currentEl.offsetHeight / 2);
      const minY = container.clientHeight * (isMobileViewport() ? 0.42 : 0.34);
      const maxY = container.clientHeight * (isMobileViewport() ? 0.76 : 0.70);
      if(currentCenter >= minY && currentCenter <= maxY) return;

      // Phones need the spoken line lower in the reader so it does not ride up
      // underneath the top fade while the speaker is still saying it.
      const anchorY = container.clientHeight * (isMobileViewport() ? 0.64 : 0.54);
      const target = currentEl.offsetTop - anchorY + (currentEl.offsetHeight / 2);

    /* ============================================================================
       BEGINNER NOTE: YouTube private/deleted playlist item filter
       ---------------------------------------------------------------------------
       Livestreams, Shorts, and Guest Speaker shelves come directly from YouTube
       playlists in the browser. YouTube can sometimes leave "Private video" or
       "Deleted video" placeholders in playlistItems results even after you remove
       a test stream from a playlist. This block filters those out before they can
       become cards on the site.

       Safety rules:
       - skip playlist rows titled "Private video" / "Deleted video"
       - verify every playlist video with videos.list
       - skip videos missing from videos.list
       - skip videos whose status.privacyStatus is "private"
       - skip non-embeddable videos, because the site player cannot show them
       ============================================================================ */
    function isUnavailableYoutubeTitle(title){
      const t = String(title || '').trim().toLowerCase();
      if(!t) return true;
      return (
        t === 'private video' ||
        t === 'deleted video' ||
        t.includes('private video') ||
        t.includes('deleted video') ||
        t.includes('video unavailable')
      );
    }

    function isUsableYoutubeVideoDetail(detail){
      if(!detail || !detail.id) return false;
      const title = detail?.snippet?.title || '';
      const privacyStatus = String(detail?.status?.privacyStatus || '').toLowerCase();
      const uploadStatus = String(detail?.status?.uploadStatus || '').toLowerCase();

      if(isUnavailableYoutubeTitle(title)) return false;
      if(privacyStatus === 'private') return false;
      if(['deleted','failed','rejected'].includes(uploadStatus)) return false;
      if(detail?.status && detail.status.embeddable === false) return false;

      return true;
    }

    async function fetchVideoStatistics(videoIds){
      const out = new Map();
      const ids = Array.from(new Set((videoIds || []).filter(Boolean)));
      for(let i=0;i<ids.length;i+=50){
        const batch = ids.slice(i, i+50);
        const qs = new URLSearchParams({part:'snippet,statistics,status', id:batch.join(','), key:API_KEY});
        const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?${qs.toString()}`);
        if(!res.ok) continue;
        const data = await res.json();
        const rows = Array.isArray(data?.items) ? data.items : [];
        rows.forEach(row=>{
          if(!isUsableYoutubeVideoDetail(row)) return;
          out.set(row?.id, {
            views: Number(row?.statistics?.viewCount || 0),
            title: row?.snippet?.title || '',
            thumbnailWide: pickYoutubeThumb(row?.snippet?.thumbnails || {}),
            privacyStatus: row?.status?.privacyStatus || '',
            uploadStatus: row?.status?.uploadStatus || '',
            embeddable: row?.status?.embeddable !== false
          });
        });
      }
      return out;
    }

          episodes.push({

            links:{episodeUrl:`https://www.youtube.com/watch?v=${videoId}`,shareUrl:`https://www.youtube.com/watch?v=${videoId}`},
            audio:{hasAudio:false,url:null,plays:0,durationSeconds:0},
            video:{hasVideo:true,youtubeId:videoId,url:`https://www.youtube.com/watch?v=${videoId}`,views:0},
            art:{episode:{square:thumb,wide:thumb},series:{square:thumb,wide:thumb},study:{square:thumb,wide:thumb}},
            memberships:{series:[config.name.toLowerCase().replace(/\s+/g,'-')],studies:[],bibleBooks:[],byYear:[],byMonth:[]},

          ep.art.episode.wide = detail.thumbnailWide;
          ep.art.series.wide = ep.art.series.wide || detail.thumbnailWide;
          ep.art.study.wide = ep.art.study.wide || detail.thumbnailWide;
        }
        filteredEpisodes.push(ep);
      });

      return filteredEpisodes.sort(sortNewestFirst);
    }

    function buildBrowse(){
      const items=visibleItems();
      const browse={roots:[],current:[],books:new Map(),topical:new Map(),collections:new Map(),specialSeries:new Map(),date:new Map()};

      items.forEach(item=>{
        const seriesKey=item?.series?.key || '';
        const seriesName=item?.series?.name || 'Untitled Series';
        const studyName=item?.study?.name || '';
        const modeHint=item?.presentation?.bibleBooksMode || 'none';
        const bookKeys=Array.isArray(item?.memberships?.bibleBooks)?item.memberships.bibleBooks:[];
        const isSpecial=/special/i.test(seriesName);

        if(getCurrentSeriesKeys().has(seriesKey)){
          let row = browse.current.find(r=>r.key===seriesKey);
          if(!row){
            row={key:seriesKey,title:seriesName,meta:studyName || 'Current series',image:ASSETS.current,items:[]};
            browse.current.push(row);
          }
          row.items.push(item);
        }

        bookKeys.forEach(bookKey=>{
          if(!browse.books.has(bookKey)){
            browse.books.set(bookKey,{
              key:bookKey,
              title:item?.bookTags?.find(t=>t.key===bookKey)?.name || item?.scripture?.book || bookKey,
              image:ASSETS.books,
              seriesMap:new Map(),
              episodes:[],
              specialsByYear:new Map()
            });
          }
          const bucket=browse.books.get(bookKey);
          if(isSpecial){
            const year=String(item?.date?.year || 'Unknown');
            if(!bucket.specialsByYear.has(year)) bucket.specialsByYear.set(year, []);
            bucket.specialsByYear.get(year).push(item);
          } else if(modeHint==='series_group'){
            if(!bucket.seriesMap.has(seriesKey)){
              bucket.seriesMap.set(seriesKey,{
                key:seriesKey,
                title:seriesName,
                meta:studyName || 'Series',
                image:ASSETS.books,
                items:[]
              });
            }
            bucket.seriesMap.get(seriesKey).items.push(item);
          } else if(modeHint==='episode_only'){
            bucket.episodes.push(item);
          }
        });

        const studyType = item?.study?.type || '';
        if(studyType === 'topical_study' && studyName){
          const studyKey = item?.study?.key || studyName.toLowerCase().replace(/\s+/g,'-');
          if(!browse.books.has(studyKey)){
            browse.books.set(studyKey,{
              key:studyKey,
              title:studyName,
              image:ASSETS.books,
              seriesMap:new Map(),
              episodes:[],
              specialsByYear:new Map(),
              isStudyBucket:true
            });
          }
          const studyBucket = browse.books.get(studyKey);
          if(!studyBucket.seriesMap.has(seriesKey)){
            studyBucket.seriesMap.set(seriesKey,{
              key:seriesKey,
              title:seriesName,
              meta:'Topical series',
              image:ASSETS.topicalSeries || ASSETS.fallback,
              items:[]
            });
          }
          studyBucket.seriesMap.get(seriesKey).items.push(item);
        }

        if((item?.series?.type==='topical' || item?.series?.type==='standalone') && !isSpecial){
          if(!browse.topical.has(seriesKey)){
            browse.topical.set(seriesKey,{
              key:seriesKey,
              title:seriesName,
              meta:studyName || 'Topical series',
              image:ASSETS.topicalSeries || ASSETS.fallback,
              items:[]
            });
          }
          browse.topical.get(seriesKey).items.push(item);
        }

        // Curated Collections are optional grouping layers.
        // They appear under Topical Series without duplicating the original episode.
        const itemCollections = Array.isArray(item?.collections) ? item.collections : [];
        itemCollections.forEach(collection=>{
          const collectionKey = collection?.key || '';
          if(!collectionKey) return;
          const rowKey = `collection__${collectionKey}`;
          if(!browse.collections.has(rowKey)){
            browse.collections.set(rowKey,{
              key:rowKey,
              collectionKey,
              title:collection?.name || collectionKey,
              meta:collection?.description || 'Collection',
              // Keep custom collection art separate from fallback art.
              // Beginner note: if assets/collections/<key>/square.jpg or wide.jpg exists,
              // the resolver gives us that path. If it does not exist, leave this blank
              // here so the later art pass can fall back to the first episode art.
              collectionArt:{
                square:collection?.art?.square || null,
                wide:collection?.art?.wide || null
              },
              image:null,
              items:[],
              sortOrder:Number.isFinite(Number(collection?.sortOrder)) ? Number(collection.sortOrder) : 999,
              isCollection:true
            });
          }
          browse.collections.get(rowKey).items.push(item);
        });

        // Specials are intentionally kept out of normal topical ordering, then pinned
        // to the bottom of Topical Series.
        if(isSpecial && seriesKey){
          const rowKey = `special__${seriesKey}`;
          if(!browse.specialSeries.has(rowKey)){
            browse.specialSeries.set(rowKey,{
              key:rowKey,
              seriesKey,
              title:seriesName,
              meta:'Specials',
              image:ASSETS.topicalSeries || ASSETS.fallback,
              items:[],
              isSpecialSeries:true
            });
          }
          browse.specialSeries.get(rowKey).items.push(item);
        }

        const year=String(item?.date?.year || '');
        const monthKey=item?.date?.iso ? item.date.iso.slice(0,7) : '';
        if(year && monthKey){
          if(!browse.date.has(year)) browse.date.set(year, new Map());
          if(!browse.date.get(year).has(monthKey)) browse.date.get(year).set(monthKey, []);
          browse.date.get(year).get(monthKey).push(item);
        }
      });

      // apply art rules after bucketing
      browse.current.forEach(row=>{
        const firstEpisode=getFirstEpisode(row.items);
        row.image=getSeriesArtFromItem(firstEpisode);
        row.meta = `${row.meta || ''}${row.meta ? ' · ' : ''}${formatCountLabel(row.items.length,'episode','episodes')}`;
      });

      browse.books.forEach(bucket=>{
        bucket.seriesMap.forEach(row=>{
          const firstEpisode=getFirstEpisode(row.items);
          row.image=getSeriesArtFromItem(firstEpisode);
        });

        const orderedSeries = Array.from(bucket.seriesMap.values()).sort((a,b)=>sortSeriesName(a.title,b.title));
        const firstSeries = orderedSeries[0];
        if(firstSeries){
          const firstEpisode=getFirstEpisode(firstSeries.items);
          bucket.image=getStudyArtFromItem(firstEpisode);
        } else if(bucket.episodes.length){
          bucket.image=getStudyArtFromItem(getFirstEpisode(bucket.episodes));
        } else {
          const specialYears=Array.from(bucket.specialsByYear.keys()).sort((a,b)=>a.localeCompare(b));
          const firstSpecialYear=specialYears[0];
          if(firstSpecialYear){
            bucket.image=getStudyArtFromItem(getFirstEpisode(bucket.specialsByYear.get(firstSpecialYear)));
          }
        }
      });

      browse.topical.forEach(row=>{
        row.image=getSeriesArtFromItem(getFirstEpisode(row.items));
      });

      browse.collections.forEach(row=>{
        const firstEpisode=getFirstEpisode(row.items);
        const customArt = state.mode==='video'
          ? (row.collectionArt?.wide || row.collectionArt?.square)
          : (row.collectionArt?.square || row.collectionArt?.wide);
        const episodeFallback = getEpisodeArt(firstEpisode || {}, state.mode);
        row.image = customArt || episodeFallback || ASSETS.topicalSeries || ASSETS.fallback;
        row.meta = `${row.meta || 'Collection'}${row.meta ? ' · ' : ''}${formatCountLabel(row.items.length,'episode','episodes')}`;
      });

      browse.specialSeries.forEach(row=>{
        const firstEpisode=getFirstEpisode(row.items);
        row.image=getSeriesArtFromItem(firstEpisode);
        row.meta=`${row.meta || 'Specials'} · ${formatCountLabel(row.items.length,'episode','episodes')}`;
      });

      browse.current.sort((a,b)=>sortSeriesName(a.title,b.title));
      browse.roots=[
        ...(state.mode==='video' ? [
          {key:'livestreams',title:'Livestreams',meta:'',image:ASSETS.livestreams}
        ] : []),
        {key:'current',title:'Current',meta:formatCountLabel(browse.current.length,'series','series'),image:ASSETS.current},
        {key:'books',title:'Bible Books / Studies',meta:formatCountLabel(browse.books.size,'book','books'),image:ASSETS.books},
        {key:'topical',title:'Topical Series',meta:formatCountLabel(browse.topical.size + browse.collections.size + browse.specialSeries.size,'series','series'),image:ASSETS.topicalSeries || ASSETS.fallback},
        {key:'date',title:'Date',meta:'Year → Month',image:ASSETS.date},
        ...(state.mode==='video' ? [
          {key:'shorts',title:'Shorts',meta:'',image:ASSETS.shorts}
        ] : [])
      ];
      return browse;
    }
    function rootChoices(){ return buildBrowse().roots; }
    function branchChoices(){
      const browse=buildBrowse(), root=state.nav.rootKey;
      if(!root) return [];
      if(root==='livestreams') return [{key:'live-all',title:'Livestreams',meta:formatCountLabel(state.nativeShelves.livestreams.length,'video','videos'),image:ASSETS.livestreams}];
      if(root==='shorts') return [{key:'shorts-all',title:'Shorts',meta:formatCountLabel(state.nativeShelves.shorts.length,'video','videos'),image:ASSETS.shorts}];
      if(root==='current') return browse.current;
      if(root==='books'){
        const allBuckets = Array.from(browse.books.values());
        const bookBuckets = allBuckets.filter(bucket=>!bucket.isStudyBucket).sort((a,b)=>sortBookName(a.title,b.title));
        const studyBuckets = allBuckets.filter(bucket=>bucket.isStudyBucket).sort((a,b)=>sortSeriesName(a.title,b.title));
        const mappedBooks = bookBuckets
          .filter(bucket=>bucket.key!=='current' && String(bucket.title||'').toLowerCase()!=='current')
          .map(bucket=>({
            key:bucket.key,
            title:bucket.title,
            meta:`${formatCountLabel(bucket.seriesMap.size,'series','series')} · ${formatCountLabel(bucket.episodes.length + Array.from(bucket.specialsByYear.values()).reduce((s,a)=>s+a.length,0),'episode','episodes')}`,
            image:bucket.image
          }));
        const mappedStudies = studyBuckets
          .filter(bucket=>bucket.key!=='current' && String(bucket.title||'').toLowerCase()!=='current')
          .map(bucket=>({
            key:bucket.key,
            title:bucket.title,
            meta:`${formatCountLabel(bucket.seriesMap.size,'series','series')} · ${formatCountLabel(bucket.episodes.length + Array.from(bucket.specialsByYear.values()).reduce((s,a)=>s+a.length,0),'episode','episodes')}`,
            image:bucket.image,
            isStudyBucket:true
          }));
        return mappedBooks.concat(mappedStudies);
      }
      if(root==='topical') {
        const rows = Array.from(browse.topical.values()).sort((a,b)=>(getFirstEpisode(a.items)?.date?.iso||'').localeCompare(getFirstEpisode(b.items)?.date?.iso||'') || sortSeriesName(a.title,b.title));

        const collectionRows = Array.from(browse.collections.values()).sort((a,b)=>{
          if((a.sortOrder ?? 999) !== (b.sortOrder ?? 999)) return (a.sortOrder ?? 999) - (b.sortOrder ?? 999);
          return sortSeriesName(a.title,b.title);
        });
        rows.push(...collectionRows);

        const specialRows = Array.from(browse.specialSeries.values()).sort((a,b)=>{
          const ay = Number(String(a.title||'').match(/\b(20\d{2})\b/)?.[1] || 0);
          const by = Number(String(b.title||'').match(/\b(20\d{2})\b/)?.[1] || 0);
          if(ay !== by) return by - ay;
          return sortSeriesName(a.title,b.title);
        });
        rows.push(...specialRows);

        if(state.mode==='video' && state.nativeShelves.guestSpeakers.length){
          rows.push({
            key:'guest-speakers-pinned',
            title:'CGBC Guest Speaker',
            meta:formatCountLabel(state.nativeShelves.guestSpeakers.length,'video','videos'),
            image:getSeriesArtFromItem(getFirstEpisode(state.nativeShelves.guestSpeakers)),
            items:state.nativeShelves.guestSpeakers.slice()
          });
        }
        return rows;
      }
      if(root==='date') return Array.from(browse.date.keys()).sort((a,b)=>b.localeCompare(a)).map(year=>({key:year,title:year,meta:formatCountLabel(browse.date.get(year).size,'month','months'),image:null,dateCardType:'year',dateCardValue:year}));
      return [];
    }
    function leafChoices(){
      const browse=buildBrowse(), root=state.nav.rootKey, branch=state.nav.branchKey;
      if(!root || !branch) return [];
      if(root==='livestreams' || root==='shorts') return [];
      if(root==='current'){
        return [];
      }
      if(root==='books'){
        const bucket=browse.books.get(branch); if(!bucket) return [];
        const out=[];
        Array.from(bucket.seriesMap.values()).sort((a,b)=>(getFirstEpisode(a.items)?.date?.iso||'').localeCompare(getFirstEpisode(b.items)?.date?.iso||'') || sortSeriesName(a.title,b.title)).forEach(row=>out.push({key:row.key,title:row.title,meta:formatCountLabel(row.items.length,'episode','episodes'),image:row.image || getSeriesArtFromItem(getFirstEpisode(row.items))}));
        if(bucket.episodes.length) out.push({key:`${bucket.key}__episodes`,title:'Individual Sermons',meta:formatCountLabel(bucket.episodes.length,'episode','episodes'),image:getEpisodeArt(bucket.episodes[0]||{})});
        Array.from(bucket.specialsByYear.keys()).sort((a,b)=>b.localeCompare(a)).forEach(year=>{
          const rows=bucket.specialsByYear.get(year)||[];
          out.push({key:`${bucket.key}__specials__${year}`,title:`Single Events / Sermons · ${year}`,meta:formatCountLabel(rows.length,'episode','episodes'),image:getEpisodeArt(rows[0]||{})});
        });
        return out;
      }
      if(root==='topical') return [];
      if(root==='date'){
        const yearBucket=browse.date.get(branch); if(!yearBucket) return [];
        return Array.from(yearBucket.keys()).sort((a,b)=>b.localeCompare(a)).map(monthKey=>({
          key:monthKey,
          title:new Date(monthKey+'-15T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'}),
          meta:formatCountLabel(yearBucket.get(monthKey).length,'episode','episodes'),
          image:null,
          dateCardType:'month',
          dateCardValue:monthKey
        }));
      }
      return [];
    }
    function queueItems(){
      const browse=buildBrowse(), root=state.nav.rootKey, branch=state.nav.branchKey, leaf=state.nav.leafKey;
      if(!root) return [];
      if(root==='livestreams') return state.nativeShelves.livestreams.slice().sort(sortNewestFirst);
      if(root==='shorts') return state.nativeShelves.shorts.slice().sort(sortNewestFirst);
      if(root==='current'){
        const selected=browse.current.find(r=>r.key===branch); if(!selected) return [];
        return visibleItems().filter(item=>item?.series?.key===selected.key).sort(sortNewestFirst);
      }
      if(root==='books'){
        const bucket=browse.books.get(branch); if(!bucket || !leaf) return [];
        if(leaf.endsWith('__episodes')) return bucket.episodes.slice().sort(sortOldestFirst);
        if(leaf.includes('__specials__')){const year=leaf.split('__specials__')[1]; return (bucket.specialsByYear.get(year)||[]).slice().sort(sortNewestFirst);}
        const row=bucket.seriesMap.get(leaf); return row ? row.items.slice().sort(sortOldestFirst) : [];
      }
      if(root==='topical'){
        if(branch==='guest-speakers-pinned') return state.nativeShelves.guestSpeakers.slice().sort(sortNewestFirst);
        const row=browse.topical.get(branch) || browse.collections.get(branch) || browse.specialSeries.get(branch);
        if(!row) return [];
        return row.isSpecialSeries ? row.items.slice().sort(sortNewestFirst) : row.items.slice().sort(sortOldestFirst);
      }
      if(root==='date'){const yearBucket=browse.date.get(branch); if(!yearBucket || !leaf) return []; return (yearBucket.get(leaf)||[]).slice().sort(sortNewestFirst);}
      return [];
    }
    function choiceRows(){
      if(searchResultsMode()) return {rows:visibleItems().sort(sortNewestFirst), episodeLevel:true, searchResults:true};
      if(!state.nav.rootKey) return {rows:rootChoices(), episodeLevel:false};
      if(!state.nav.branchKey) return {rows:branchChoices(), episodeLevel:false};
      const leaves=leafChoices();
      if(leaves.length && !state.nav.leafKey) return {rows:leaves, episodeLevel:false};
      return {rows:queueItems(), episodeLevel:true};
    }
    function currentPathTitle(){
      const browse=buildBrowse();
      const root=browse.roots.find(r=>r.key===state.nav.rootKey);
      const branch=branchChoices().find(r=>r.key===state.nav.branchKey);
      const leaf=leafChoices().find(r=>r.key===state.nav.leafKey);
      if(leaf) return `Episodes · ${compactSeriesLabel(leaf.title)}`;
      if(branch) return `${compactSeriesLabel(root?.title || 'Browse')} · ${compactSeriesLabel(branch.title)}`;
      if(root) return `Browse · ${root.title}`;
      return 'Choose a category';
    }
    function compactSeriesLabel(value){
      const raw = String(value || '').trim();
      if(!raw) return '';
      return raw.replace(/\bChapter\s+/i, '');
    }

    function mobileContextTitle(item){
      if(!item) return '';
      if(item.dateCardType === 'year') return String(item.dateCardValue || item.title || '');
      if(item.dateCardType === 'month') return monthNameOnly(String(item.dateCardValue || item.title || ''));
      return compactSeriesLabel(item.title || '');
    }
    function renderMobileContextBar(){
      if(!els.mobileContextBar) return;
      const items = buildContextItems();
      if(window.innerWidth > 900 || !items.length){
        els.mobileContextBar.innerHTML = '';
        els.mobileContextBar.style.display = 'none';
        return;
      }
      els.mobileContextBar.style.display = 'flex';
      els.mobileContextBar.innerHTML = items.map((item, index) => `
        <div class="mobile-context-chip ${index === items.length - 1 ? 'active' : ''}">
          <span class="mobile-context-label">${escapeHtml(item.label || 'Path')}</span>
          <span class="mobile-context-title">${escapeHtml(mobileContextTitle(item))}</span>
        </div>
      `).join('');
    }
    function buildRelatedItems(item){
      if(!item) return [];
      const baseSeries = item?.series?.key || '';
      const pool = state.activeQueue && state.activeQueue.length
        ? state.activeQueue.slice()
        : getModeItems(state.mode).slice();
      const related = pool.filter(row => row?.stableId !== item?.stableId && (baseSeries ? row?.series?.key === baseSeries : true));
      return related.slice(0, 10);
    }
    function renderRelatedRow(item){ return;

      if(!els.relatedWrap || !els.relatedRow || !els.relatedTitle){
        return;
      }
      if(!item){
        els.relatedWrap.classList.remove('is-visible');
        els.relatedRow.innerHTML = '';
        return;
      }
      const rows = buildRelatedItems(item);
      if(!rows.length){
        els.relatedWrap.classList.remove('is-visible');
        els.relatedRow.innerHTML = '';
        if(els.detailShell) els.detailShell.classList.add('is-idle');
        return;
      }
      const labelSource = compactSeriesLabel(item?.series?.name || '') || 'this selection';
      els.relatedTitle.textContent = `Related in ${labelSource}`;
      els.relatedRow.innerHTML = rows.map(row => {
        const img = getEpisodeArt(row, state.mode);
        const thumbClass = state.mode === 'video' ? 'thumb-wide' : 'thumb-square';
        const metaLine = row?.scripture?.display || formatDate(row);
        const metric = state.mode === 'audio'
          ? formatCountLabel(row?.audio?.plays || 0, 'play', 'plays')
          : formatCountLabel(row?.video?.views || 0, 'view', 'views');
        return `<button type="button" class="related" data-key="${escapeHtml(row.stableId)}" data-episode="1">
          <div class="${thumbClass}"><img src="${escapeHtml(img)}" alt="${escapeHtml(row?.title?.display || '')}"></div>
          <div class="copy">
            <h4 class="card-title">${escapeHtml(row?.title?.display || '')}</h4>
            <div class="card-meta-line">${escapeHtml(metaLine)}</div>
            <div class="card-metric">${escapeHtml(metric)}</div>
          </div>
        </button>`;
      }).join('');
      els.relatedWrap.classList.add('is-visible');
      if(els.detailShell) els.detailShell.classList.remove('is-idle');
    }
    function buildContextItems(){
      const browse=buildBrowse();
      const items=[];
      const root=browse.roots.find(r=>r.key===state.nav.rootKey);
      const branch=branchChoices().find(r=>r.key===state.nav.branchKey);
      const leaf=leafChoices().find(r=>r.key===state.nav.leafKey);
      if(root) items.push({label:'Category', title:root.title, image:root.image || ASSETS.fallback, square:state.mode==='audio', level:'root'});
      if(branch){
        const suppressTerminalDuplicate = (state.nav.rootKey === 'livestreams' || state.nav.rootKey === 'shorts') && root && String(root.title) === String(branch.title);
        if(!suppressTerminalDuplicate){
          if(state.nav.rootKey === 'date' && branch.dateCardType === 'year'){
            items.push({label:'Year', title:branch.title, image:null, square:false, level:'branch', dateCardType:'year', dateCardValue:branch.dateCardValue || branch.title});
          } else {
            items.push({label:'Selection', title:branch.title, image:branch.image || ASSETS.fallback, square:state.mode==='audio', level:'branch'});
          }
        }
      }
      if(leaf){
        if(state.nav.rootKey === 'date' && leaf.dateCardType === 'month'){
          items.push({label:'Month', title:leaf.title, image:null, square:false, level:'leaf', dateCardType:'month', dateCardValue:leaf.dateCardValue || leaf.title});
        } else {
          items.push({label:'Series / Group', title:leaf.title, image:leaf.image || ASSETS.fallback, square:state.mode==='audio', level:'leaf'});
        }
      }
      return items;
    }
    function renderContextStrip(){
      const items=buildContextItems();
      if(!items.length){
        els.contextRow.innerHTML='';
        els.contextStrip.style.display = 'none';
        return;
      }
      els.contextStrip.style.display = window.innerWidth >= 1040 ? 'block' : 'none';
      els.contextRow.innerHTML = items.map((item, index) => {
        const isDateChip = !!item.dateCardType;
        const media = isDateChip
          ? `<div class="context-chip-date">${
              item.dateCardType === 'year'
                ? `<div class="mini-label">Year</div><div class="mini-value">${escapeHtml(String(item.dateCardValue || item.title || ''))}</div>`
                : `<div class="mini-label">Month</div><div class="mini-value">${escapeHtml(monthNameOnly(String(item.dateCardValue || '')))}</div>`
            }</div>`
          : `<img src="${escapeHtml(item.image)}" alt="">`;
        const title = isDateChip
          ? (item.dateCardType === 'year' ? String(item.dateCardValue || item.title || '') : monthNameOnly(String(item.dateCardValue || '')))
          : compactSeriesLabel(item.title);
        const activeClass = index === items.length - 1 ? 'is-active' : '';
        return `
          <button type="button" class="context-chip ${activeClass} ${item.square ? 'square' : ''} ${isDateChip ? 'date-chip' : ''}" data-context-level="${escapeHtml(item.level || '')}">
            ${isDateChip
              ? `${index === items.length - 1 ? '' : `<div class="context-chip-badge">Browse</div>`}${media}`
              : `${media}
            <div class="context-chip-copy">
              ${index === items.length - 1 ? '' : `<div class="context-chip-badge">Browse</div>`}
              <div class="context-chip-label">${escapeHtml(item.label)}</div>
              <div class="context-chip-title">${escapeHtml(title)}</div>
            </div>`}
          </button>
        `;
      }).join('');
    }
    function headingText(){
      if(!state.nav.rootKey) return 'Choose a category';
      if(!state.nav.branchKey) return 'Choose a path';
      if(leafChoices().length && !state.nav.leafKey) return 'Choose a selection';
      return 'Choose an episode';
    }
    function backLabel(){
      const browse=buildBrowse();
      const root=browse.roots.find(r=>r.key===state.nav.rootKey);
      const branch=branchChoices().find(r=>r.key===state.nav.branchKey);
      if(searchResultsMode()) return '✕ Clear';
      if(state.nav.leafKey) return compactSeriesLabel(branch?.title || 'Selection');
      if(state.nav.branchKey) return compactSeriesLabel(root?.title || 'Browse');
      if(state.nav.rootKey) return 'Browse';
      return 'Back';
    }
    function updateSearchStatus(){
      const total=getModeItems(state.mode).length, shown=visibleItems().length;

      try{ navPanel.scrollIntoView({ behavior:'smooth', block:'start' }); }catch(err){}
    }
    function scrollChoiceListToTop(){
      try{ els.choiceList.scrollTop = 0; }catch(err){}
      const navPanel = document.querySelector('.nav-panel');
      if(navPanel){ try{ navPanel.scrollTop = 0; }catch(err){} }
    }
    function stopAudioPlayback(resetTime=false){
      try{
        els.audioPlayer.pause();
        if(resetTime) els.audioPlayer.currentTime = 0;
      }catch(err){}
    }
    function clearMediaState(){
      stopAudioPlayback(false);
      applyAudioNowPlaying(null);
      stopMediaSessionHeartbeat();
      els.videoShell.innerHTML='';
      els.videoShell.style.display='none';
      els.playerShell.classList.remove('video-active');
      els.videoShareHost.classList.remove('is-visible');
      els.videoShareHost.innerHTML='';
      state.playerRenderKey='';
    }
    function rerender(){
      renderChoices();
      renderPlayer();
      positionPlayerShell();
      renderContextStrip();
      renderMobileContextBar();
      updateModeUI();
      updateImpact();
      updatePlayerButton();
    }
    function resetAll(options={}){
      const { preserveSearch=false, preserveCurrent=false } = options;
      state.mobileEpisodeListOpen=false;
      state.mobilePlayerPinnedTop=false;
      state.nav={rootKey:null,branchKey:null,leafKey:null};
      if(!preserveCurrent){
        state.currentItem=null;
        state.playingContext=null;
        state.playerRenderKey='';
      }
      if(!preserveSearch){
        state.searchTerm='';
        if(els.searchInput) els.searchInput.value='';
      }
      clearMediaState();
      scrollChoiceListToTop();
      rerender();
    }
    function goBack(){
      collapseMobileTranscriptForNav();
      state.mobileEpisodeListOpen=false;
      state.mobilePlayerPinnedTop=false;
      if(searchResultsMode()){
        state.searchTerm='';
        els.searchInput.value='';
      } else if(state.nav.leafKey) state.nav.leafKey=null;
      else if(state.nav.branchKey) state.nav.branchKey=null;
      else if(state.nav.rootKey) state.nav.rootKey=null;
      scrollChoiceListToTop();
      rerender();
    }
    function selectChoice(key){
      collapseMobileTranscriptForNav();
      if(!state.nav.rootKey){
        /* ============================================================================
           EASY NOTE: Livestreams and Shorts do NOT need a middle bucket.
           Clicking them should go straight from the root card to the episode list.
           ============================================================================ */
        if(key === 'livestreams'){
          state.mobileEpisodeListOpen=false;
          state.mobilePlayerPinnedTop=false;
          state.nav.rootKey='livestreams';
          state.nav.branchKey='live-all';
          state.nav.leafKey=null;
          scrollChoiceListToTop();
          rerender();
          scrollNavIntoView();
          return;
        }
        if(key === 'shorts'){
          state.mobileEpisodeListOpen=false;
          state.mobilePlayerPinnedTop=false;
          state.nav.rootKey='shorts';
          state.nav.branchKey='shorts-all';
          state.nav.leafKey=null;
          scrollChoiceListToTop();
          rerender();
          scrollNavIntoView();
          return;
        }
        state.mobileEpisodeListOpen=false; state.mobilePlayerPinnedTop=false; state.nav.rootKey=key; state.nav.branchKey=null; state.nav.leafKey=null; scrollChoiceListToTop(); rerender(); scrollNavIntoView(); return;
      }
      if(!state.nav.branchKey){ state.mobileEpisodeListOpen=false; state.mobilePlayerPinnedTop=false; state.nav.branchKey=key; state.nav.leafKey=null; scrollChoiceListToTop(); rerender(); scrollNavIntoView(); return; }
      if(leafChoices().length && !state.nav.leafKey){ state.mobileEpisodeListOpen=false; state.mobilePlayerPinnedTop=false; state.nav.leafKey=key; scrollChoiceListToTop(); rerender(); scrollNavIntoView(); return; }
    }
    function attachEvents(){
      initMediaSessionControls();
      document.body.addEventListener('click', (event)=>{
        const openEpisodesBtn=event.target.closest('[data-open-episodes]');
        if(openEpisodesBtn){
          state.mobileEpisodeListOpen = !state.mobileEpisodeListOpen;
          renderChoices();
          return;
        }
        const topBtn=event.target.closest('[data-top-root]');
        if(topBtn){
          collapseMobileTranscriptForNav();
          const key=topBtn.dataset.topRoot;
          if(key === 'livestreams'){
            state.mobileEpisodeListOpen=false;
            state.mobilePlayerPinnedTop=false;
            state.nav={rootKey:'livestreams',branchKey:'live-all',leafKey:null};
          } else if(key === 'shorts'){
            state.mobileEpisodeListOpen=false;
            state.mobilePlayerPinnedTop=false;
            state.nav={rootKey:'shorts',branchKey:'shorts-all',leafKey:null};
          } else {
            state.mobileEpisodeListOpen=false;
            state.mobilePlayerPinnedTop=false;
            state.nav={rootKey:key,branchKey:null,leafKey:null};
          }
          scrollChoiceListToTop();
          rerender();
          return;
        }
        const btn=event.target.closest('[data-key]');
        if(!btn) return;
        const key=btn.dataset.key, episode=btn.dataset.episode==='1';
        if(episode){
          const next=state.activeQueue.find(r=>r.stableId===key);
          if(next){
            state.currentItem=next;
            state.playingContext={ mode: state.mode, nav: navSnapshot() };
            state.playerRenderKey='';
            state.mobileEpisodeListOpen=false;
            state.mobilePlayerPinnedTop=true;
            renderChoices();
            renderPlayer();
            positionPlayerShell();
            scrollPlayerIntoView();
            if(state.mode==='audio' && next?.audio?.url){ els.audioPlayer.play().catch(()=>{}); }
          }
          return;
        }
        selectChoice(key);
      });
      if(els.topBtn){
        els.topBtn.addEventListener('click', ()=>goTopPreservePlayer());
      }
      els.backBtn.addEventListener('click', ()=>{ goBack(); });
      if(els.playerBtn){
        els.playerBtn.addEventListener('click', ()=>{
          state.mobilePlayerPinnedTop = true;
          state.mobileEpisodeListOpen = false;
          if(state.playingContext){
            state.mode = state.playingContext.mode;
            state.nav = { ...state.playingContext.nav };
            rerender();
          } else {
            positionPlayerShell();
          }
          positionPlayerShell();
          if(state.currentItem){
            scrollPlayerIntoView();
          }
        });
      }
      if(els.resetBtn){
        els.resetBtn.addEventListener('click', hardResetPage);
      }
      els.logoReset.addEventListener('click', hardResetPage);
      els.playerShareLink.addEventListener('click', async (event)=>{
        event.preventDefault();
        if(!state.currentItem) return;
        await triggerShare(state.currentItem);
      });
      if(els.playerPodcastLink){
        els.playerPodcastLink.addEventListener('click', async (event)=>{
          event.preventDefault();
          if(!state.currentItem) return;
          const rssUrl = state.currentItem?.links?.episodeUrl || state.currentItem?.links?.shareUrl || state.currentItem?.episode_url || state.currentItem?.share_url || '#';
          await triggerNativeLinkShare(rssUrl, state.currentItem, 'RSS share link');
        });
      }

      document.addEventListener('visibilitychange', ()=>{
        refreshActiveMediaSession();
      });
      window.addEventListener('focus', refreshActiveMediaSession);
      window.addEventListener('pageshow', refreshActiveMediaSession);
      window.addEventListener('resume', refreshActiveMediaSession);
      window.addEventListener('pagehide', refreshActiveMediaSession);

      els.listenBtn.addEventListener('click', ()=>{
        if(state.mode==='audio') return;
        state.mode='audio';
        resetAll({ preserveSearch:true });
        rerender();
      });
      els.watchBtn.addEventListener('click', ()=>{
        if(state.mode==='video') return;
        state.mode='video';
        resetAll({ preserveSearch:true });
        rerender();
      });
      let searchInputTimer = null;
      els.searchInput.addEventListener('input', (e)=>{
        const nextValue = e.target.value || '';
        window.clearTimeout(searchInputTimer);
        searchInputTimer = window.setTimeout(()=>{
          state.searchTerm = nextValue;
          state.nav = { rootKey:null, branchKey:null, leafKey:null };
          scrollChoiceListToTop();
          rerender();
          scrollNavIntoView();
        }, 220);
      });
      els.contextRow.addEventListener('click', (event)=>{
        const btn = event.target.closest('[data-context-level]');
        if(!btn) return;
        const level = btn.getAttribute('data-context-level');
        state.mobileEpisodeListOpen=false;
        state.mobilePlayerPinnedTop=false;
        if(level==='root'){
          state.nav.branchKey=null;
          state.nav.leafKey=null;
        } else if(level==='branch'){
          state.nav.leafKey=null;
        } else if(level==='leaf'){
          state.currentItem=null;
        } else {
          return;
        }
        scrollChoiceListToTop();
        rerender();
      });
      window.addEventListener('resize', ()=>{ positionPlayerShell(); renderContextStrip(); renderMobileContextBar(); });
      window.addEventListener('scroll', ()=>{ updatePinnedVideoLayout(); }, { passive:true });
      window.addEventListener('orientationchange', ()=>{ setTimeout(()=>{ positionPlayerShell(); }, 50); });
      els.audioPlayBadge.addEventListener('click', ()=>{
        if(!els.audioPlayer.src) return;
        if(els.audioPlayer.paused) els.audioPlayer.play();
        else els.audioPlayer.pause();
      });
      els.miniSkipBackBtn.addEventListener('click', ()=>{ els.audioPlayer.currentTime=Math.max(0,(els.audioPlayer.currentTime||0)-30); });
      els.miniSkipForwardBtn.addEventListener('click', ()=>{ const d=Number(els.audioPlayer.duration||0); els.audioPlayer.currentTime=Math.min(d||0,(els.audioPlayer.currentTime||0)+30); });
      els.audioProgress.addEventListener('input', ()=>{ const d=Number(els.audioPlayer.duration||0); if(!d) return; els.audioPlayer.currentTime=Number(els.audioProgress.value||0); });
      els.audioPlayer.addEventListener('timeupdate', ()=>{
        const c=Number(els.audioPlayer.currentTime||0), d=Number(els.audioPlayer.duration||0);
        els.audioClockCurrent.textContent=formatClock(c);
        els.audioElapsedSmall.textContent=formatClock(c);
        els.audioRemainingSmall.textContent=formatClock(Math.max(0,d-c));
        els.audioProgress.max=d || 100;
        els.audioProgress.value=c;
        updateMediaSessionState();
        updateTranscriptActiveLine(c);
      });
      els.audioPlayer.addEventListener('loadedmetadata', ()=>{
        const d=Number(els.audioPlayer.duration||0);
        els.audioClockTotal.textContent=`/ ${formatClock(d)}`;
        els.audioRemainingSmall.textContent=formatClock(d);
        els.audioProgress.max=d || 100;
        updateMediaSessionState();
      });
      if(els.idleQuotePauseBtn) els.idleQuotePauseBtn.addEventListener('click', ()=>setIdleQuotePaused(!state.idleQuotePaused));
      if(els.idleQuoteNextBtn) els.idleQuoteNextBtn.addEventListener('click', nextIdleQuote);
      if(els.idleQuoteCopyBtn) els.idleQuoteCopyBtn.addEventListener('click', async ()=>{ const q=state.idleQuotes[state.idleQuoteIndex]; if(!q) return; try{ await navigator.clipboard.writeText(idleQuoteCopy(q)); alert('Quote copied.'); }catch(err){} });
      document.addEventListener('click', (event)=>{
        if(event.target.closest('[data-mobile-quote-next]')){
          event.preventDefault();
          if(state.idleQuotes.length){ state.idleQuoteIndex = Math.floor(Math.random() * state.idleQuotes.length); renderIdleQuote(); renderChoices(); }
        }
        if(event.target.closest('[data-mobile-quote-pause]')){
          event.preventDefault();
          setIdleQuotePaused(!state.idleQuotePaused);
        }
      });
      if(els.transcriptLanguage) els.transcriptLanguage.addEventListener('change', async ()=>{ state.transcript.language=els.transcriptLanguage.value; state.transcript.segments=[]; state.transcript.activeIndex=-1; await renderTranscriptPanel(); });
      if(els.transcriptFollowBtn) els.transcriptFollowBtn.addEventListener('click', ()=>{ state.transcript.mode='follow'; renderTranscriptPanel(); });
      if(els.transcriptReadBtn) els.transcriptReadBtn.addEventListener('click', ()=>{ state.transcript.mode='read'; renderTranscriptPanel(); });
      if(els.transcriptVisibilityBtn) els.transcriptVisibilityBtn.addEventListener('click', ()=>{ setTranscriptHidden(!state.transcript.hidden); renderTranscriptPanel(); });
      if(els.transcriptSearch) els.transcriptSearch.addEventListener('input', ()=>{
        state.transcript.search=els.transcriptSearch.value||'';
        if(state.transcript.search){ state.transcript.mode='read'; }
        if(els.transcriptFollowBtn) els.transcriptFollowBtn.classList.toggle('active', state.transcript.mode === 'follow');
        if(els.transcriptReadBtn) els.transcriptReadBtn.classList.toggle('active', state.transcript.mode !== 'follow');
        if(els.transcriptSubtitle) els.transcriptSubtitle.textContent = state.transcript.search ? 'Search results. Clear search or press Follow to resume.' : (state.transcript.mode === 'follow' ? 'Following along with the message.' : 'Read freely, search, or click a line to jump.');
        renderTranscriptLines();
      });
      if(els.transcriptLines) els.transcriptLines.addEventListener('click', async (event)=>{ const line=event.target.closest('.transcript-line'); if(!line) return; const t=Number(line.dataset.start||0); if(event.target.closest('[data-copy]')){ const text=line.querySelector('.transcript-text')?.textContent||''; try{ await navigator.clipboard.writeText(text); }catch(err){} return; } seekMediaTo(t); updateTranscriptActiveLine(t); });

      ['play','pause','ended','seeked','ratechange'].forEach(name=>{
        els.audioPlayer.addEventListener(name, ()=>{
          const playing = !els.audioPlayer.paused && !els.audioPlayer.ended;
          els.audioPlayLabel.textContent = playing ? 'Playing' : 'Tap to Play';
          els.audioPlayBadge.classList.toggle('is-playing', playing);
          refreshActiveMediaSession();
          if(state.currentItem?.audio?.hasAudio){
            startMediaSessionHeartbeat();
          }
          if(name === 'ended') applyAudioNowPlaying(state.currentItem);
          if(state.currentItem){
            renderChoices();
          }
        });
      });
    }
    async function bootstrap(){
      attachEvents();
      state.data = await loadResolvedData();
      state.items = Array.isArray(state.data?.items) ? state.data.items.slice() : [];
      prepareSearchIndexes(state.items);
      rerender();
      loadIdleQuotes();
      window.setInterval(()=>{
        if(shouldShowMobileFeaturedQuote() && !state.idleQuotePaused){
          state.idleQuoteIndex = Math.floor(Math.random() * state.idleQuotes.length);
          renderChoices();
        }
      }, 12000);
      applyDeepLinkFromUrl();
      try{
        const [livestreams, shorts, guestSpeakers] = await Promise.all([
          fetchPlaylistSeries(LIVESTREAMS),
          fetchPlaylistSeries(SHORTS),
          fetchPlaylistSeries(GUEST_SPEAKERS)
        ]);
        state.nativeShelves.livestreams = livestreams;
        state.nativeShelves.shorts = shorts;
        state.nativeShelves.guestSpeakers = guestSpeakers;
      }catch(err){
        console.warn('Live YouTube shelves failed to load.', err);
      }
      rerender();
      applyDeepLinkFromUrl();
    }
    bootstrap().catch(err=>{
      console.error(err);
      els.choiceList.innerHTML = `<div class="empty">Resolved data could not be loaded.</div>`;
    });
  </script>
