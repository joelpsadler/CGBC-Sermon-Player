<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGBC Sermons</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #809F90;
      --bg: #2f2f2f;
      --panel: rgba(255,255,255,0.06);
      --panel-strong: rgba(0,0,0,0.34);
      --border: rgba(255,255,255,0.08);
      --text: #f4f4f4;
      --muted: #d7d7d7;
      --shadow: 0 10px 28px rgba(0,0,0,0.30);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
    }

    .header {
      display: flex;
      justify-content: center;
      padding: 12px 18px 8px;
      border-bottom: 1px solid var(--border);
    }

    .logo-panel {
      width: min(980px, 92vw);
      padding: 6px 10px;
      border-radius: 16px;
      background: rgba(0,0,0,0.38);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .logo-panel:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.34);
    }

    .logo-panel img {
      display: block;
      width: 100%;
      height: auto;
    }

    .layout {
      display: grid;
      grid-template-columns: 290px 340px minmax(0, 1fr);
      min-height: calc(100vh - 92px);
    }

    .col {
      min-width: 0;
      overflow-y: auto;
    }

    .col-series {
      border-right: 1px solid var(--border);
      padding: 14px 12px 14px 16px;
    }

    .col-episodes {
      border-right: 1px solid var(--border);
      padding: 14px 12px;
    }

    .col-player {
      padding: 18px;
    }

    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      z-index: 2;
      background: linear-gradient(to bottom, var(--bg) 86%, transparent);
      padding-bottom: 10px;
    }

    .mode-toggle button {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .mode-toggle button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.12);
    }

    .mode-toggle button.active {
      background: rgba(128,159,144,0.40);
      color: #111;
    }

    .section-title {
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      letter-spacing: 0.02em;
      color: var(--muted);
      margin: 0 0 10px;
      text-transform: uppercase;
    }

    .series-list,
    .episodes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .series-item,
    .episode-item {
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .series-item:hover,
    .episode-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .series-item.active,
    .episode-item.active {
      background: rgba(128,159,144,0.20);
      box-shadow: 0 0 0 1px rgba(128,159,144,0.22) inset;
    }

    .series-item-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
    }

    .series-item img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }

    .series-name {
      font-size: 15px;
      line-height: 1.2;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .series-item:hover .series-name,
    .episode-item:hover .episode-title {
      transform: translateY(-2px);
      color: #fff;
    }

    .episode-item-inner {
      display: flex;
      gap: 10px;
      padding: 8px;
      align-items: flex-start;
    }

    .episode-item.audio img {
      width: 96px;
      height: 96px;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }

    .episode-item.video img {
      width: 118px;
      height: 66px;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }

    .episode-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .episode-title {
      font-size: 15px;
      color: #fff;
      line-height: 1.25;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .episode-sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.25;
    }

    .player-wrap {
      max-width: 1100px;
    }

    #player,
    #videoPlaceholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    #player {
      display: none;
      background: #1f1f1f;
      min-height: 520px;
    }

    #videoPlaceholder {
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 30px;
      min-height: 520px;
    }

    #audioPlaceholder {
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 120px;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      color: var(--muted);
      padding: 24px;
      margin-bottom: 16px;
    }

    #audioPlayer {
      width: 100%;
      display: none;
      margin-bottom: 16px;
      border-radius: 12px;
    }

    .media-art {
      display: none;
      text-align: center;
      margin-bottom: 16px;
    }

    .media-art img.art-square {
      width: min(320px, 100%);
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 18px;
      box-shadow:
        0 14px 34px rgba(0,0,0,0.42),
        0 4px 12px rgba(0,0,0,0.22);
      background: rgba(255,255,255,0.05);
    }

    .media-art img.art-wide {
      width: min(720px, 100%);
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 18px;
      box-shadow:
        0 14px 34px rgba(0,0,0,0.42),
        0 4px 12px rgba(0,0,0,0.22);
      background: rgba(255,255,255,0.05);
    }

    .meta {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .meta h2 {
      margin: 0 0 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      line-height: 1.15;
    }

    .meta .series-line {
      margin-bottom: 12px;
      font-family: 'Poppins', sans-serif;
      color: #f0f0f0;
      opacity: 0.96;
    }

    .meta p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .actions {
      margin-top: 14px;
    }

    .rss-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 14px;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .rss-button:hover {
      transform: translateY(-1px);
      background: rgba(128,159,144,0.28);
    }

    .rss-button svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 250px 300px minmax(0, 1fr);
      }
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .col-series,
      .col-episodes {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>

  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
  <div class="header">
    <div class="logo-panel" id="logoReset" title="Reset to first series">
      <img src="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1108178/TS_CGBC_Pog_wLLLL.png" alt="CGBC">
    </div>
  </div>

  <div class="layout">
    <aside class="col col-series">
      <div class="mode-toggle">
        <button id="listenBtn" class="active" type="button">Listen</button>
        <button id="watchBtn" type="button">Watch</button>
      </div>
      <h3 class="section-title">Series</h3>
      <div id="seriesList" class="series-list"></div>
    </aside>

    <section class="col col-episodes">
      <h3 class="section-title">Episodes</h3>
      <div id="episodesList" class="episodes-list"></div>
    </section>

    <main class="col col-player">
      <div class="player-wrap">
        <div id="videoPlaceholder">Choose a sermon to watch.</div>
        <div id="player"></div>

        <div id="audioPlaceholder">Choose a sermon to listen.</div>
        <div class="media-art" id="mediaArt">
          <img id="mediaArtImg" alt="Sermon artwork">
        </div>
        <audio id="audioPlayer" controls preload="none"></audio>

        <section class="meta" id="metaBox">
          <h2>Select a sermon</h2>
          <div class="series-line">Choose a series and episode.</div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const API_KEY = "PAIzaSyCfuZ29lAwSLP8wX3KEt39TTvzKPhiTrWo";
    const RSS_URL = "https://feed.podbean.com/broJacobcedargrovebaptist/feed.xml";
    const FALLBACK_IMAGE = "https://tithely-media-prod.s3.us-west-1.wasabisys.com/1108178/TS_CGBC_Pog_wLLLL.png";

    let sermonData = {};
    let seriesOrder = [];
    let currentSeries = null;
    let currentEpisodeIndex = null;
    let mode = "audio";
    let ytPlayer = null;
    let ytApiReady = false;

    const seriesListEl = document.getElementById("seriesList");
    const episodesListEl = document.getElementById("episodesList");
    const metaBoxEl = document.getElementById("metaBox");
    const playerEl = document.getElementById("player");
    const videoPlaceholderEl = document.getElementById("videoPlaceholder");
    const audioPlaceholderEl = document.getElementById("audioPlaceholder");
    const audioPlayerEl = document.getElementById("audioPlayer");
    const mediaArtEl = document.getElementById("mediaArt");
    const mediaArtImgEl = document.getElementById("mediaArtImg");
    const listenBtn = document.getElementById("listenBtn");
    const watchBtn = document.getElementById("watchBtn");
    const logoReset = document.getElementById("logoReset");

    function onYouTubeIframeAPIReady() {
      ytApiReady = true;
    }

    function htmlDecode(input) {
      const doc = new DOMParser().parseFromString(input || "", "text/html");
      return (doc.documentElement.textContent || "").trim();
    }

    function normalizeLineBreaks(input) {
      return (input || "")
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/p>\s*<p>/gi, "\n")
        .replace(/<\/div>\s*<div>/gi, "\n");
    }

    function parseDescription(rawDesc) {
      const normalized = normalizeLineBreaks(rawDesc);
      const decoded = htmlDecode(normalized);
      const lines = decoded.split("\n").map(s => s.trim()).filter(Boolean);

      const out = {
        title: "",
        series: "",
        scripture: "",
        by: "",
        date: "",
        video: "",
        extra: []
      };

      for (const line of lines) {
        const lower = line.toLowerCase();
        if (lower.startsWith("title:")) out.title = line.split(/title:/i)[1].trim();
        else if (lower.startsWith("series:")) out.series = line.split(/series:/i)[1].trim();
        else if (lower.startsWith("scripture:")) out.scripture = line.split(/scripture:/i)[1].trim();
        else if (lower.startsWith("by:")) out.by = line.split(/by:/i)[1].trim();
        else if (lower.startsWith("date:")) out.date = line.split(/date:/i)[1].trim();
        else if (lower.startsWith("video:")) out.video = line.split(/video:/i)[1].trim();
        else out.extra.push(line);
      }

      return out;
    }

    function extractYouTubeId(url) {
      if (!url) return "";
      try {
        const u = new URL(url.trim());
        if (u.hostname.includes("youtu.be")) {
          return u.pathname.replace(/^\/+/, "").trim();
        }
        const v = u.searchParams.get("v");
        if (v) return v.trim();
        if (u.pathname.includes("/shorts/")) {
          return u.pathname.split("/shorts/")[1].split("/")[0].trim();
        }
        return "";
      } catch {
        return "";
      }
    }

    function getWatchThumb(videoId) {
      return videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : FALLBACK_IMAGE;
    }

    function stopAndHideVideo() {
      if (ytPlayer) {
        try { ytPlayer.stopVideo(); } catch {}
      }
      playerEl.style.display = "none";
      videoPlaceholderEl.style.display = "none";
    }

    function stopAndHideAudio() {
      audioPlayerEl.pause();
      audioPlayerEl.removeAttribute("src");
      audioPlayerEl.load();
      audioPlayerEl.style.display = "none";
      audioPlaceholderEl.style.display = "none";
      mediaArtEl.style.display = "none";
    }

    function clearMediaState() {
      stopAndHideVideo();
      stopAndHideAudio();
    }

    function renderEmptyMeta() {
      const verb = mode === "audio" ? "listen to" : "watch";
      metaBoxEl.innerHTML = `
        <h2>Select a sermon</h2>
        <div class="series-line">Choose a series and episode to ${verb}.</div>
      `;
    }

    function renderMeta(ep, isAudio) {
      let html = `
        <h2>${ep.title || "Untitled Sermon"}</h2>
        <div class="series-line">${ep.series || currentSeries || ""}</div>
      `;

      if (ep.scripture) html += `<p><strong>Scripture:</strong> ${ep.scripture}</p>`;
      if (ep.by) html += `<p><strong>By:</strong> ${ep.by}</p>`;
      if (ep.date) html += `<p><strong>Date:</strong> ${ep.date}</p>`;
      if (ep.extra?.length) ep.extra.forEach(line => html += `<p>${line}</p>`);

      if (isAudio && ep.link) {
        html += `
          <div class="actions">
            <a class="rss-button" href="${ep.link}" target="_blank" rel="noopener noreferrer">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6.18 17.82a2.18 2.18 0 1 0 0 4.36 2.18 2.18 0 0 0 0-4.36Zm-3.27-7.64v3.27c4.15 0 7.64 3.49 7.64 7.64h3.27c0-5.93-4.98-10.91-10.91-10.91Zm0-6.55v3.27c7.75 0 14.09 6.34 14.09 14.09h3.27c0-9.55-7.81-17.36-17.36-17.36Z"/>
              </svg>
              Podcast
            </a>
          </div>
        `;
      }

      metaBoxEl.innerHTML = html;
    }

    function getSeriesCover(seriesName) {
      const items = sermonData[seriesName] || [];
      if (!items.length) return FALLBACK_IMAGE;
      const first = items[0];
      return mode === "audio"
        ? (first.seriesImage || first.img || FALLBACK_IMAGE)
        : getWatchThumb(first.videoId);
    }

    function renderSeriesList() {
      seriesListEl.innerHTML = "";
      seriesOrder.forEach(seriesName => {
        const item = document.createElement("div");
        item.className = "series-item" + (seriesName === currentSeries ? " active" : "");
        item.innerHTML = `
          <div class="series-item-inner">
            <img src="${getSeriesCover(seriesName)}" alt="">
            <div class="series-name">${seriesName}</div>
          </div>
        `;
        item.addEventListener("click", () => {
          currentSeries = seriesName;
          currentEpisodeIndex = null;
          clearMediaState();
          renderSeriesList();
          renderEpisodesList();
          renderEmptyMeta();
          if (mode === "audio") {
            audioPlaceholderEl.style.display = "flex";
          } else {
            videoPlaceholderEl.style.display = "flex";
          }
        });
        seriesListEl.appendChild(item);
      });
    }

    function renderEpisodesList() {
      episodesListEl.innerHTML = "";
      if (!currentSeries || !sermonData[currentSeries]) return;

      sermonData[currentSeries].forEach((ep, index) => {
        const row = document.createElement("div");
        row.className = `episode-item ${mode}` + (index === currentEpisodeIndex ? " active" : "");

        const thumb = mode === "audio"
          ? (ep.img || ep.seriesImage || FALLBACK_IMAGE)
          : getWatchThumb(ep.videoId);

        row.innerHTML = `
          <div class="episode-item-inner">
            <img src="${thumb}" alt="">
            <div class="episode-copy">
              <div class="episode-title">${ep.title || "Untitled Sermon"}</div>
              <div class="episode-sub">${ep.scripture || ep.date || ""}</div>
            </div>
          </div>
        `;

        row.addEventListener("click", () => {
          currentEpisodeIndex = index;
          renderEpisodesList();
          if (mode === "audio") playAudio(ep);
          else playVideo(ep);
        });

        episodesListEl.appendChild(row);
      });
    }

    function playAudio(ep) {
      stopAndHideVideo();

      audioPlaceholderEl.style.display = "none";
      audioPlayerEl.style.display = "block";
      mediaArtEl.style.display = "block";
      mediaArtImgEl.src = ep.img || ep.seriesImage || FALLBACK_IMAGE;
      mediaArtImgEl.className = "art-square";

      audioPlayerEl.src = ep.audio;
      audioPlayerEl.load();

      renderMeta(ep, true);
    }

    function ensureYouTubePlayer(videoId) {
      if (!ytApiReady || !videoId) return;

      if (!ytPlayer) {
        ytPlayer = new YT.Player("player", {
          videoId,
          playerVars: { autoplay: 0, rel: 0 }
        });
      } else {
        ytPlayer.loadVideoById(videoId);
      }
    }

    function playVideo(ep) {
      stopAndHideAudio();

      if (!ep.videoId) {
        videoPlaceholderEl.style.display = "flex";
        videoPlaceholderEl.textContent = "No video is available for this sermon yet.";
        renderMeta(ep, false);
        return;
      }

      playerEl.style.display = "block";
      videoPlaceholderEl.style.display = "none";

      ensureYouTubePlayer(ep.videoId);
      renderMeta(ep, false);
    }

    async function loadRSSData() {
      const xmlText = await fetch(RSS_URL).then(r => r.text());
      const xml = new DOMParser().parseFromString(xmlText, "text/xml");
      const items = Array.from(xml.querySelectorAll("item"));
      const grouped = {};

      items.forEach(item => {
        const rawDescription = item.querySelector("description")?.textContent || "";
        const parsed = parseDescription(rawDescription);
        const series = parsed.series || "Other Sermons";

        const enclosure = item.querySelector("enclosure");
        const audioUrl = enclosure ? enclosure.getAttribute("url") : "";
        const itemLink = item.querySelector("link")?.textContent?.trim() || "";

        let itemImage = "";
        const itunesImages = item.getElementsByTagName("itunes:image");
        if (itunesImages && itunesImages[0]) {
          itemImage = itunesImages[0].getAttribute("href") || "";
        }

        const videoId = extractYouTubeId(parsed.video);

        if (!grouped[series]) grouped[series] = [];
        grouped[series].push({
          title: parsed.title || item.querySelector("title")?.textContent?.split("|")[0]?.trim() || "Untitled Sermon",
          series,
          scripture: parsed.scripture || "",
          by: parsed.by || "",
          date: parsed.date || "",
          video: parsed.video || "",
          videoId,
          audio: audioUrl,
          img: itemImage,
          link: itemLink,
          extra: parsed.extra || []
        });
      });

      Object.keys(grouped).forEach(series => {
        const firstImage = grouped[series].find(x => x.img)?.img || FALLBACK_IMAGE;
        grouped[series] = grouped[series].map(ep => ({
          ...ep,
          seriesImage: firstImage
        }));
      });

      sermonData = grouped;
      seriesOrder = Object.keys(sermonData);
      currentSeries = seriesOrder[0] || null;
    }

    function setMode(nextMode) {
      mode = nextMode;
      listenBtn.classList.toggle("active", mode === "audio");
      watchBtn.classList.toggle("active", mode === "video");

      currentEpisodeIndex = null;

      stopAndHideVideo();
      stopAndHideAudio();

      if (mode === "audio") {
        videoPlaceholderEl.style.display = "none";
        audioPlaceholderEl.style.display = "flex";
      } else {
        audioPlaceholderEl.style.display = "none";
        videoPlaceholderEl.style.display = "flex";
      }

      renderSeriesList();
      renderEpisodesList();
      renderEmptyMeta();
    }

    function resetHome() {
      currentSeries = seriesOrder[0] || null;
      currentEpisodeIndex = null;
      clearMediaState();
      if (mode === "audio") {
        audioPlaceholderEl.style.display = "flex";
      } else {
        videoPlaceholderEl.style.display = "flex";
      }
      renderSeriesList();
      renderEpisodesList();
      renderEmptyMeta();
    }

    listenBtn.addEventListener("click", () => setMode("audio"));
    watchBtn.addEventListener("click", () => setMode("video"));
    logoReset.addEventListener("click", resetHome);

    (async function init() {
      await loadRSSData();
      audioPlaceholderEl.style.display = "flex";
      renderSeriesList();
      renderEpisodesList();
      renderEmptyMeta();
    })();
  </script>
</body>
</html>
