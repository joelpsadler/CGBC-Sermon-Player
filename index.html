<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sermon Library</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #111;
  color: white;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

select {
  padding: 12px;
  width: 100%;
  margin-bottom: 15px;
  font-size: 16px;
  border-radius: 6px;
}

.toggle {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.toggle button {
  flex: 1;
  padding: 12px;
  cursor: pointer;
  font-size: 16px;
  border: none;
  border-radius: 6px;
}

.active-toggle {
  background: #e50914;
  color: white;
}

#nowPlaying {
  font-size: 18px;
  margin-bottom: 10px;
}

#player {
  width: 100%;
  aspect-ratio: 16/9;
  margin-bottom: 25px;
  border-radius: 10px;
  overflow: hidden;
}

#playlist {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.video-item {
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.video-item:hover {
  transform: scale(1.05);
}

.video-item.active {
  outline: 3px solid #e50914;
  border-radius: 6px;
}

.video-item img {
  width: 100%;
  border-radius: 6px;
}

.video-item p {
  font-size: 14px;
  margin-top: 6px;
}

#podcast {
  display: none;
}
</style>
</head>

<body>
<div class="container">

<h2>Sermon Library</h2>

<select id="seriesSelect"></select>

<div class="toggle">
  <button id="videoBtn" class="active-toggle">Watch Video</button>
  <button id="audioBtn">Listen Audio</button>
</div>

<div id="videoSection">
  <div id="nowPlaying"></div>
  <div id="player"></div>
  <div id="playlist"></div>
</div>

<div id="podcast">
  <iframe src="https://www.podbean.com/player-v2/?i=9ecaf-109ee67-pbblog-playlist&share=1"
          width="100%" height="500" style="border:none;"></iframe>
</div>

</div>

<script>
const API_KEY = "AIzaSyCfuZ29lAwSLP8wX3KEt39TTvzKPhiTrWo";

const PLAYLISTS = [
  { name: "🔴 Livestreams", id: "PLKqZ6zXCYxUBu3jzPCTncKPpopFcvlVyv" },
  { name: "📖 Romans 12 (Current)", id: "PLKqZ6zXCYxUDucHCEif_ph_C9_ZWTlkXS" },
  { name: "Romans", id: "PLKqZ6zXCYxUCMOi5EgNMr7HDeaRy3gk6F" },
  { name: "Specials", id: "PLKqZ6zXCYxUCPWCiVCLNS4UdwNDGWsep0" },
  { name: "Guest Speakers", id: "PLKqZ6zXCYxUDfYDWUNzBJFBAQ0rr2b6NW" },
  { name: "All Sermons", id: "PLKqZ6zXCYxUBM36Qy41u3YnnsXET8v4XJ" }
];

let videos = [];
let currentIndex = 0;

const select = document.getElementById("seriesSelect");

PLAYLISTS.forEach(p => {
  const opt = document.createElement("option");
  opt.value = p.id;
  opt.textContent = p.name;
  select.appendChild(opt);
});

async function loadPlaylist(id) {
  document.getElementById("playlist").innerHTML = "Loading...";

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=20&playlistId=${id}&key=${API_KEY}`
  );

  const data = await res.json();
  videos = data.items.reverse();

  renderVideos();
}

function renderVideos() {
  const container = document.getElementById("playlist");
  container.innerHTML = "";

  videos.forEach((item, index) => {
    const vid = item.snippet.resourceId.videoId;

    const div = document.createElement("div");
    div.className = "video-item";

    div.innerHTML = `
      <img src="${item.snippet.thumbnails.medium.url}">
      <p>${item.snippet.title}</p>
    `;

    div.onclick = () => playVideo(index);

    container.appendChild(div);
  });

  playVideo(0);
}

function playVideo(index) {
  currentIndex = index;
  const video = videos[index];
  const vid = video.snippet.resourceId.videoId;

  document.getElementById("player").innerHTML =
    `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" allowfullscreen></iframe>`;

  document.getElementById("nowPlaying").textContent =
    "Now Playing: " + video.snippet.title;

  highlightActive();
}

function highlightActive() {
  document.querySelectorAll(".video-item").forEach((el, i) => {
    el.classList.toggle("active", i === currentIndex);
  });
}

select.onchange = () => loadPlaylist(select.value);

document.getElementById("videoBtn").onclick = () => {
  document.getElementById("videoSection").style.display = "block";
  document.getElementById("podcast").style.display = "none";
};

document.getElementById("audioBtn").onclick = () => {
  document.getElementById("videoSection").style.display = "none";
  document.getElementById("podcast").style.display = "block";
};

loadPlaylist(PLAYLISTS[0].id);
</script>

</body>
</html>
