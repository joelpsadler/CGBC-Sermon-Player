<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CGBC Sermons</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #809F90;
  --bg: #2f2f2f;
  --glass: rgba(255,255,255,0.05);
}

body {
  margin: 0;
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  padding: 20px 0;
}

.logo-panel {
  padding: 14px 40px;
  border-radius: 18px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 18px rgba(0,0,0,0.6);
  cursor: pointer;
}

.logo-panel img {
  height: 85px;
}

/* LAYOUT */
.layout {
  display: flex;
  height: calc(100vh - 120px);
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  padding: 10px;
  overflow-y: auto;
}

.toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.toggle button {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
}

.toggle .active {
  background: var(--accent);
  color: black;
}

.series {
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.series:hover {
  background: rgba(255,255,255,0.06);
  transform: translateY(-2px);
}

.series.active {
  background: rgba(128,159,144,0.25);
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* PLAYER */
#player {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 14px;
  margin-bottom: 15px;
}

#audioPlayer {
  width: 100%;
  margin-bottom: 15px;
}

/* ART */
.art {
  text-align: center;
  margin-bottom: 15px;
}

.art img {
  width: 260px;
  border-radius: 14px;
}

/* META */
.meta {
  background: var(--glass);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* EPISODES */
.episode {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.episode img {
  width: 160px;
  border-radius: 10px;
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<div class="header">
  <div class="logo-panel" id="logo">
    <img src="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1108178/TS_CGBC_Pog_wLLLL.png">
  </div>
</div>

<div class="layout">

<div class="sidebar">

<div class="toggle">
  <button id="listenBtn" class="active">Listen</button>
  <button id="watchBtn">Watch</button>
</div>

<div id="seriesList"></div>

</div>

<div class="main">

<div id="player"></div>

<div class="art" id="art" style="display:none;">
  <img id="artImg">
</div>

<audio id="audioPlayer" controls style="display:none;"></audio>

<div class="meta" id="meta"></div>
<div id="episodes"></div>

</div>

</div>

<script>

const API_KEY = "AIzaSyCfuZ29lAwSLP8wX3KEt39TTvzKPhiTrWo";
const RSS = "https://feed.podbean.com/broJacobcedargrovebaptist/feed.xml";

let data = {};
let currentSeries = null;
let mode = "audio";
let player;

/* PARSE RSS */
async function loadData(){
  let txt = await fetch(RSS).then(r=>r.text());
  let xml = new DOMParser().parseFromString(txt,"text/xml");

  xml.querySelectorAll("item").forEach(item=>{
    let desc = item.querySelector("description").textContent;

    let get = key => (desc.match(new RegExp(key+":\\s*(.*)"))||[])[1];

    let series = get("Series");
    let video = get("Video");

    if(!series) return;

    if(!data[series]) data[series] = [];

    data[series].push({
      title: get("Title"),
      scripture: get("Scripture"),
      speaker: get("by"),
      date: get("Date"),
      audio: item.querySelector("enclosure").getAttribute("url"),
      img: item.getElementsByTagName("itunes:image")[0]?.getAttribute("href"),
      video: video
    });
  });

  buildSeries();
}

/* SERIES */
function buildSeries(){
  seriesList.innerHTML="";
  Object.keys(data).forEach(s=>{
    let d=document.createElement("div");
    d.className="series";
    d.innerText=s;
    d.onclick=()=>selectSeries(s,d);
    seriesList.appendChild(d);
  });

  selectSeries(Object.keys(data)[0], seriesList.firstChild);
}

/* SELECT SERIES */
function selectSeries(s,el){
  document.querySelectorAll(".series").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  currentSeries=s;
  renderEpisodes();
}

/* EPISODES */
function renderEpisodes(){
  episodes.innerHTML="";
  data[currentSeries].forEach(ep=>{
    let d=document.createElement("div");
    d.className="episode";

    let thumb = mode==="audio"
      ? ep.img
      : `https://img.youtube.com/vi/${extractID(ep.video)}/hqdefault.jpg`;

    d.innerHTML=`<img src="${thumb}"><div>${ep.title}</div>`;
    d.onclick=()=>play(ep);

    episodes.appendChild(d);
  });
}

/* PLAY */
function play(ep){
  let metaHTML = `
    <h3>${ep.title}</h3>
    <p>${ep.scripture}</p>
    <p>${ep.speaker}</p>
    <p>${ep.date}</p>
  `;
  meta.innerHTML=metaHTML;

  if(mode==="audio"){
    playerDiv.style.display="none";
    audioPlayer.style.display="block";
    art.style.display="block";

    audioPlayer.src = ep.audio;
    artImg.src = ep.img;
  } else {
    audioPlayer.style.display="none";
    art.style.display="none";
    playerDiv.style.display="block";

    let id = extractID(ep.video);

    if(!player){
      player = new YT.Player('player',{videoId:id});
    } else {
      player.loadVideoById(id);
    }
  }
}

/* MODE */
listenBtn.onclick=()=>{mode="audio";listenBtn.classList.add("active");watchBtn.classList.remove("active");renderEpisodes();};
watchBtn.onclick=()=>{mode="video";watchBtn.classList.add("active");listenBtn.classList.remove("active");renderEpisodes();};

/* YT ID */
function extractID(url){
  return url?.split("v=")[1]?.split("&")[0];
}

/* RESET */
logo.onclick=()=>buildSeries();

/* INIT */
loadData();

</script>

</body>
</html>
