<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CGBC Sermons</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #809F90;
  --bg: #414141;
  --panel: rgba(255,255,255,0.05);
}

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 12px 20px;
}

.header img {
  height: 50px;
}

/* LAYOUT */
.layout {
  display: flex;
  height: calc(100vh - 74px);
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  overflow-y: auto;
  padding: 10px;
}

.series {
  padding: 12px;
  margin-bottom: 6px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.25s;
}

.series:hover {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(6px);
}

.series.active {
  background: rgba(128,159,144,0.25);
  box-shadow: 0 0 10px rgba(128,159,144,0.5);
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* TOGGLE */
.toggle {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.toggle button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

.toggle .active {
  background: rgba(128,159,144,0.4);
}

/* PLAYER */
#player {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 14px;
  margin-bottom: 15px;
}

#audioPlayer {
  width: 100%;
  margin-bottom: 15px;
}

/* META */
.meta {
  background: var(--panel);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  backdrop-filter: blur(8px);
}

.meta h2 {
  font-family: 'Poppins';
  margin: 0 0 5px;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.actions a {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  text-decoration: none;
  color: white;
  font-size: 14px;
  transition: 0.2s;
}

.actions a:hover {
  background: rgba(128,159,144,0.4);
}

/* EPISODES */
.episode {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  padding: 6px;
  border-radius: 10px;
  transition: 0.2s;
}

.episode:hover {
  background: rgba(255,255,255,0.05);
}

.episode img {
  width: 160px;
  border-radius: 10px;
}

.episode.active {
  box-shadow: 0 0 8px rgba(128,159,144,0.6);
}

/* MOBILE */
@media(max-width:800px){
  .sidebar {
    position: absolute;
    left: -260px;
    top: 74px;
    height: calc(100vh - 74px);
    background: #333;
    transition: 0.3s;
  }
  .sidebar.open {
    left: 0;
  }
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<div class="header">
  <img src="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1073708/TS_CGBC_Pog.png">
</div>

<div class="layout">

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="toggle">
  <button id="watchBtn" class="active">Watch</button>
  <button id="listenBtn">Listen</button>
</div>

<div id="player"></div>
<audio id="audioPlayer" controls style="display:none;"></audio>

<div class="meta" id="meta"></div>
<div id="episodes"></div>

</div>
</div>

<script>

const API_KEY = "AIzaSyCfuZ29lAwSLP8wX3KEt39TTvzKPhiTrWo";

const RSS = "https://feed.podbean.com/broJacobcedargrovebaptist/feed.xml";

const PLAYLISTS = [/* SAME LIST YOU JUST ADDED */];

let mode = "video";
let player, currentList=[], currentIndex=0, audioData={};

/* SIDEBAR */
const sidebar = document.getElementById("sidebar");
PLAYLISTS.forEach(p=>{
  let d=document.createElement("div");
  d.className="series";
  d.innerText=p.name;
  d.onclick=()=>loadPlaylist(p.id,d);
  sidebar.appendChild(d);
});

/* TOGGLE */
watchBtn.onclick=()=>{mode="video";watchBtn.classList.add("active");listenBtn.classList.remove("active");renderEpisodes();};
listenBtn.onclick=()=>{mode="audio";listenBtn.classList.add("active");watchBtn.classList.remove("active");renderEpisodes();};

/* LOAD VIDEO */
async function loadPlaylist(id,el){
  document.querySelectorAll(".series").forEach(s=>s.classList.remove("active"));
  el.classList.add("active");

  let res=await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${id}&key=${API_KEY}`);
  let data=await res.json();
  currentList=data.items;

  renderEpisodes();
  playVideo(0);
}

/* VIDEO */
function playVideo(i){
  currentIndex=i;
  document.getElementById("audioPlayer").style.display="none";
  document.getElementById("player").style.display="block";

  let vid=currentList[i];

  if(!player){
    player=new YT.Player('player',{videoId:vid.snippet.resourceId.videoId});
  } else {
    player.loadVideoById(vid.snippet.resourceId.videoId);
  }

  renderMeta(vid.snippet.description);
}

/* AUDIO LOAD */
async function loadAudio(){
  let txt=await fetch(RSS).then(r=>r.text());
  let xml=new DOMParser().parseFromString(txt,"text/xml");
  let items=[...xml.querySelectorAll("item")];

  items.forEach(item=>{
    let title=item.querySelector("title").textContent;
    let series=title.split("|")[1]?.trim() || "Other";

    if(!audioData[series]) audioData[series]=[];

    audioData[series].push({
      title:title.split("|")[0],
      audio:item.querySelector("enclosure").getAttribute("url"),
      desc:item.querySelector("description").textContent,
      img:item.querySelector("itunes\\:image")?.getAttribute("href"),
      link:item.querySelector("link").textContent
    });
  });
}

/* AUDIO */
function playAudio(ep){
  document.getElementById("player").style.display="none";
  let a=document.getElementById("audioPlayer");
  a.style.display="block";
  a.src=ep.audio;

  renderMeta(ep.desc, ep.link);
}

/* META */
function renderMeta(desc,link=""){
  let html="";
  desc.split("\n").forEach(l=>{
    if(l.includes(":")) html+=`<p>${l}</p>`;
  });

  html+=`
  <div class="actions">
    <a href="https://podcasts.apple.com/us/podcast/cgbc-lebanon-tn/id1713109744" target="_blank">Apple</a>
    <a href="https://open.spotify.com/show/6pK9I8y22hRcmwYLkGR8YI" target="_blank">Spotify</a>
    <a href="${link}" target="_blank">Podcast</a>
  </div>
  `;

  meta.innerHTML=html;
}

/* EPISODES */
function renderEpisodes(){
  let el=episodes;
  el.innerHTML="";

  if(mode==="video"){
    currentList.forEach((v,i)=>{
      let d=document.createElement("div");
      d.className="episode";
      d.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}"><div>${v.snippet.title}</div>`;
      d.onclick=()=>playVideo(i);
      el.appendChild(d);
    });
  } else {
    let active=document.querySelector(".series.active")?.innerText;
    let list=audioData[active]||[];

    list.forEach(ep=>{
      let d=document.createElement("div");
      d.className="episode";
      d.innerHTML=`<img src="${ep.img}"><div>${ep.title}</div>`;
      d.onclick=()=>playAudio(ep);
      el.appendChild(d);
    });
  }
}

/* INIT */
loadAudio();
loadPlaylist(PLAYLISTS[0].id, sidebar.firstChild);

</script>

</body>
</html>
