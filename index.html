<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CGBC Sermons - Top Nav Pass</title>
  <link rel="icon" type="image/jpeg" sizes="512x512" href="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228836/CGBC_Wheel_Black_Media_Fallback.jpg">
  <link rel="apple-touch-icon" href="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228836/CGBC_Wheel_Black_Media_Fallback.jpg">
  <meta name="theme-color" content="#0f0f10" />
  <meta name="apple-mobile-web-app-title" content="CGBC Media" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f0f10;
      --panel:rgba(14,14,15,.82);
      --soft:rgba(255,255,255,.045);
      --border:rgba(255,255,255,.06);
      --text:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --muted-2:rgba(255,255,255,.52);
      --accent:#8fae9d;
      --accent-ink:#102016;
      --shadow:0 10px 30px rgba(0,0,0,.24);
      --desktop-bg:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1230673/Desktop.jpg');
      --mobile-bg:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1230674/Mobile.jpg');
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,sans-serif}
    body{
      background:
        linear-gradient(180deg, rgba(11,11,12,.96) 0%, rgba(9,9,10,.99) 100%),
        var(--desktop-bg) center/cover no-repeat fixed;
      background-blend-mode:multiply;
    }
    button,input{font:inherit}
    button{border:none;background:none;color:inherit;cursor:pointer}
    img{display:block;max-width:100%}
    a{color:inherit;text-decoration:none}
    .app{width:min(1680px,100%);margin:0 auto;padding:0 10px 16px}
    .masthead{
      position:sticky;top:0;z-index:20;
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      padding:10px 4px 12px;
      background:linear-gradient(180deg, rgba(8,8,9,.97), rgba(8,8,9,.89));
      border-bottom:1px solid rgba(255,255,255,.05);
      backdrop-filter:blur(12px);
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo-btn{
      width:92px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);box-shadow:var(--shadow);overflow:hidden
    }
    .logo-btn img{width:100%;height:100%;object-fit:contain;transform:scale(1.12)}
    .brand h1{margin:0;font-family:Poppins,sans-serif;font-size:clamp(20px,2vw,31px);line-height:1.02}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:14px}
    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .mode-pill{
      display:grid;grid-template-columns:1fr 1fr;padding:2px;border-radius:20px;min-width:318px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)
    }
    .mode-btn-shell{
      min-height:54px;padding:0 18px;display:flex;align-items:center;justify-content:center;border-radius:18px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)
    }
    .mode-btn:first-child .mode-btn-shell{border-radius:18px 8px 8px 18px}
    .mode-btn:last-child .mode-btn-shell{border-radius:8px 18px 18px 8px}
    .mode-btn.active .mode-btn-shell{
      background:linear-gradient(180deg, rgba(143,174,157,.88), rgba(118,147,131,.66));
      color:var(--accent-ink);border-color:rgba(143,174,157,.20)
    }
    .btn-copy{display:flex;flex-direction:column;align-items:flex-start;line-height:1.02;font-family:Poppins,sans-serif}
    .btn-copy .top{font-size:14px;font-weight:700}
    .btn-copy .bottom{font-size:11px;color:var(--muted)}
    .mode-btn.active .bottom{color:rgba(17,32,24,.72)}
    .impact{display:flex;gap:10px;flex-wrap:wrap}
    .impact-pill{
      min-width:120px;padding:10px 14px;border-radius:18px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06)
    }
    .impact-value{font-family:Poppins,sans-serif;font-size:20px;font-weight:800;line-height:1}
    .impact-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2)}

    .flow{display:grid;grid-template-columns:1fr;gap:16px}
    .panel{
      border-radius:24px;border:1px solid var(--border);background:var(--panel);box-shadow:var(--shadow);
      backdrop-filter:blur(10px);overflow:hidden
    }
    .nav-panel{display:grid;gap:0}
    .nav-head{padding:16px 16px 12px}
    .eyebrow{margin:0 0 6px;font-family:Poppins,sans-serif;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);font-size:12px}
    .title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(18px,2vw,24px);line-height:1.08}

    .top-strip-wrap{padding:0 16px 14px}
    .top-strip{
      display:flex;gap:14px;overflow-x:auto;padding-bottom:4px;
      scroll-snap-type:x proximity;
    }
    .top-strip::-webkit-scrollbar{height:8px}
    .top-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:999px}
    .top-card{
      flex:0 0 clamp(240px,28vw,340px);
      scroll-snap-align:start;
      display:grid;gap:10px;
      text-align:left;
      padding:0;
      background:none;
      border:none;
    }
    .top-card-image{
      width:100%;
      aspect-ratio:16/9;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      position:relative;
      box-shadow:var(--shadow);
    }
    .top-card-image img{width:100%;height:100%;object-fit:cover}
    .top-card.active .top-card-image{
      outline:2px solid rgba(143,174,157,.5);
      outline-offset:0;
    }
    .top-card-copy{padding:0 4px}
    .top-card-title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(18px,1.7vw,24px);line-height:1.08}
    .top-card-sub{margin-top:4px;color:var(--muted);font-size:14px;line-height:1.25}

    .search-row{display:flex;align-items:center;gap:10px;padding:0 16px 16px}
    .search-row input{
      flex:1;min-width:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
      color:var(--text);border-radius:16px;padding:13px 14px;outline:none
    }
    .search-row input::placeholder{color:var(--muted-2)}
    .search-status{font-size:13px;color:var(--muted);white-space:nowrap}

    .path-row{
      display:flex;align-items:center;justify-content:flex-start;gap:12px;padding:10px 16px 14px;border-top:1px solid rgba(255,255,255,.05)
    }
    .path-button{
      min-height:46px;padding:0 16px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      display:inline-flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;white-space:nowrap;max-width:100%
    }
    .path-button[disabled]{opacity:.48;cursor:default}
    .path-button span{overflow:hidden;text-overflow:ellipsis}

    .stack{display:grid;gap:12px;padding:0 16px 16px}
    .choice,.episode,.related{
      width:100%;display:flex;gap:12px;align-items:flex-start;text-align:left;padding:12px;border-radius:20px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)
    }
    .choice.active,.episode.active{
      background:linear-gradient(180deg, rgba(143,174,157,.22), rgba(143,174,157,.11));
      border-color:rgba(143,174,157,.24)
    }
    .thumb-wide{width:132px;height:74px;flex:0 0 132px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.05)}
    .thumb-square{width:86px;height:82px;flex:0 0 86px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.05)}
    .thumb-wide img,.thumb-square img{width:100%;height:100%;object-fit:cover}
    .copy{min-width:0;flex:1}
    .card-title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(16px,1.5vw,20px);line-height:1.12}
    .card-sub{margin-top:5px;color:var(--muted);font-size:14px;line-height:1.25}
    .card-metric{margin-top:7px;color:rgba(255,255,255,.80);font-size:12px;font-family:Poppins,sans-serif;font-weight:600}
    .empty{
      margin:0 16px 16px;padding:16px;border-radius:18px;background:rgba(255,255,255,.03);color:var(--muted);
      border:1px dashed rgba(255,255,255,.10);font-size:14px;line-height:1.4
    }

    .content{display:grid;gap:16px}
    .player{padding:16px}
    .player.video-active{padding:0;background:rgba(0,0,0,.25)}
    .player.is-idle #videoShell,.player.is-idle #audioStage{display:none}
    #videoShell,#videoPlaceholder{
      width:100%;aspect-ratio:16/9;min-height:240px;border-radius:22px;overflow:hidden;background:#000;
      border:1px solid rgba(255,255,255,.06);display:none;align-items:center;justify-content:center;text-align:center;color:var(--muted)
    }
    #videoShell iframe{width:100%;height:100%;border:0;display:block}
    #audioPlaceholder{
      display:none;min-height:220px;align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--muted);
      border-radius:22px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.26)
    }
    .audio-stage{display:none;grid-template-columns:1fr;gap:14px}
    .audio-art{width:100%;aspect-ratio:1/1;max-width:380px;border-radius:24px;overflow:hidden;margin:0 auto}
    .audio-art img{width:100%;height:100%;object-fit:cover}
    .transport{
      width:100%;max-width:420px;display:grid;grid-template-columns:56px minmax(0,1fr) 56px;gap:8px;align-items:center;
      padding:6px;border-radius:999px;background:linear-gradient(180deg, rgba(21,21,21,.82), rgba(10,10,10,.58));border:1px solid rgba(255,255,255,.10);
      margin:0 auto
    }
    .transport-btn,.play-btn{
      min-height:56px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center
    }
    .play-btn{justify-content:flex-start;padding:0 12px 0 6px;gap:12px;min-width:0;background:linear-gradient(180deg, rgba(80,100,91,.24), rgba(39,49,44,.30));border-color:rgba(143,174,157,.18)}
    .play-circle{width:42px;height:42px;border-radius:999px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;flex:0 0 42px}
    .play-copy{display:flex;align-items:center;gap:4px;font-family:Poppins,sans-serif;font-size:14px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
    .audio-copy{display:flex;flex-direction:column;gap:6px}
    .audio-title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(28px,3vw,44px);line-height:1.04}
    .audio-series{color:rgba(255,255,255,.88);font-family:Poppins,sans-serif;font-size:18px}
    .detail-row{display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;color:rgba(255,255,255,.84);font-size:13px}
    .label,.meta-label{font-family:Poppins,sans-serif;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted-2)}
    .value,.meta-value{color:rgba(255,255,255,.90);font-weight:600}
    .time-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .audio-now{font-family:Poppins,sans-serif;font-size:clamp(30px,4vw,58px);line-height:.92;letter-spacing:-.05em;font-variant-numeric:tabular-nums}
    .audio-total{font-family:Poppins,sans-serif;font-size:20px;color:var(--muted);font-variant-numeric:tabular-nums;padding-bottom:5px}
    .progress-wrap{display:grid;gap:6px}
    .progress{appearance:none;width:100%;height:8px;border-radius:999px;background:rgba(255,255,255,.10);outline:none;cursor:pointer}
    .progress::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:999px;background:#d7eadf;border:2px solid rgba(17,17,17,.84)}
    .progress-times{display:flex;justify-content:space-between;gap:12px;font-family:Poppins,sans-serif;font-size:12px;color:rgba(255,255,255,.92);font-weight:600;font-variant-numeric:tabular-nums}
    #audioPlayer{display:none}
    .detail{padding:18px}
    .detail.is-idle{display:none}
    .detail-title{margin:0;font-family:Poppins,sans-serif;font-size:clamp(24px,2.2vw,38px);line-height:1.08}
    .detail-series{font-family:Poppins,sans-serif;font-size:18px;color:rgba(255,255,255,.90);margin:8px 0 18px}
    .meta-grid{display:grid;gap:10px}
    .meta-row{display:grid;grid-template-columns:120px minmax(0,1fr);gap:12px;align-items:start}
    .detail-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    .related-wrap{display:none;gap:12px;margin-top:18px}
    .related-title{font-family:Poppins,sans-serif;font-size:16px;margin:0 0 10px}
    .related-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:2px}
    .related{flex:0 0 220px;max-width:220px}
    .related .thumb-wide{width:84px;height:48px;flex-basis:84px}
    .related .thumb-square{width:64px;height:64px;flex-basis:64px}

    @media (min-width:1040px){
      .flow{grid-template-columns:minmax(360px,560px) minmax(0,1fr)}
      .nav-panel{position:sticky;top:98px;max-height:calc(100vh - 118px);overflow:auto}
      .audio-stage{grid-template-columns:minmax(280px,360px) minmax(0,1fr);align-items:start;gap:22px}
      .audio-art{margin:0;max-width:360px}
      .transport{margin:0}
      .meta-row{grid-template-columns:140px minmax(0,1fr)}
      .top-card{flex-basis:320px}
    }
    @media (max-width:900px){
      body{
        background:
          linear-gradient(180deg, rgba(11,11,12,.96) 0%, rgba(9,9,10,.99) 100%),
          var(--mobile-bg) center/cover no-repeat fixed;
        background-blend-mode:multiply;
      }
      .app{padding:0 8px 14px}
      .brand p{display:none}
      .logo-btn{width:78px;height:58px;border-radius:0;background:transparent;border:none;box-shadow:none}
      .logo-btn img{transform:scale(1)}
      .mode-pill{min-width:0;flex:1}
      .mode-btn-shell{min-height:48px;padding:0 12px}
      .impact{width:100%;gap:8px}
      .impact-pill{flex:1 1 0;min-width:0}
      .search-row{flex-wrap:wrap}
      .search-status{width:100%}
      .thumb-wide{width:108px;height:66px;flex-basis:108px}
      .thumb-square{width:78px;height:78px;flex-basis:78px}
      .meta-row{grid-template-columns:100px minmax(0,1fr)}
      .top-card{flex-basis:280px}
    }
  </style>
</head>
<body class="mode-audio">
  <div class="app">
    <header class="masthead">
      <div class="brand">
        <button class="logo-btn" id="logoReset" type="button" title="Reset navigation">
          <img src="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228713/GCBC_ORIGWHT.png" alt="CGBC logo">
        </button>
        <div>
          <h1>CGBC Sermons</h1>
          
        </div>
      </div>
      <div class="top-actions">
        <div class="mode-pill">
          <button class="mode-btn active" id="listenBtn" type="button"><span class="mode-btn-shell"><span class="btn-copy"><span class="top">Listen</span><span class="bottom">Audio</span></span></span></button>
          <button class="mode-btn" id="watchBtn" type="button"><span class="mode-btn-shell"><span class="btn-copy"><span class="top">Watch</span><span class="bottom">Video</span></span></span></button>
        </div>
        <div class="impact">
          <div class="impact-pill"><div class="impact-value" id="impactPrimaryValue">—</div><div class="impact-label" id="impactPrimaryLabel">Plays</div></div>
          <div class="impact-pill"><div class="impact-value" id="impactSecondaryValue">—</div><div class="impact-label" id="impactSecondaryLabel">Episodes</div></div>
        </div>
      </div>
    </header>

    <main class="flow">
      <section class="panel nav-panel">
        <div class="nav-head">
          <p class="eyebrow">Browse</p>
          <h2 class="title" id="navHeading"></h2>
        </div>
        <div class="top-strip-wrap">
          <div class="top-strip" id="topStrip"></div>
        </div>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="Search title, scripture, series, book, date">
          <div class="search-status" id="searchStatus">All items</div>
        </div>
        <div class="path-row">
          <button type="button" class="path-button" id="backBtn"><span>Back</span></button>
        </div>
        <div class="stack" id="choiceList"></div>
      </section>

      <section class="content">
        <section class="panel player is-idle" id="playerShell">
          <div id="videoPlaceholder">Select an episode to watch.</div>
          <div id="videoShell"></div>
          <div id="audioPlaceholder">Select an episode to listen.</div>

          <div class="audio-stage" id="audioStage">
            <div>
              <div class="audio-art"><img id="audioFeatureArt" alt="Sermon artwork"></div>
              <div class="transport">
                <button class="transport-btn" id="miniSkipBackBtn" type="button">−30</button>
                <button class="play-btn" id="audioPlayBadge" type="button">
                  <span class="play-circle">▶</span>
                  <span class="play-copy"><span id="audioPlayLabel">Tap to Play</span></span>
                </button>
                <button class="transport-btn" id="miniSkipForwardBtn" type="button">+30</button>
              </div>
            </div>
            <div class="audio-copy">
              <h3 class="audio-title" id="audioFeatureTitle"></h3>
              <div class="audio-series" id="audioFeatureSeries"></div>
              <div class="detail-row"><span class="label">Scripture</span><span class="value" id="audioFeatureScripture"></span></div>
              <div class="detail-row"><span class="label">Speaker</span><span class="value" id="audioFeatureSpeaker"></span></div>
              <div class="detail-row"><span class="label">Date</span><span class="value" id="audioFeatureDate"></span></div>
              <div class="time-row">
                <div class="audio-now" id="audioClockCurrent">00:00</div>
                <div class="audio-total" id="audioClockTotal">/ 00:00</div>
              </div>
              <div class="progress-wrap">
                <input id="audioProgress" class="progress" type="range" min="0" max="100" step="0.1" value="0" aria-label="Audio progress">
                <div class="progress-times"><span id="audioElapsedSmall">00:00</span><span id="audioRemainingSmall">00:00</span></div>
              </div>
            </div>
          </div>
          <audio id="audioPlayer" preload="metadata"></audio>
        </section>

        <section class="panel detail is-idle" id="detailShell">
          <h2 class="detail-title" id="detailTitle"></h2>
          <div class="detail-series" id="detailSeries"></div>
          <div class="meta-grid">
            <div class="meta-row"><div class="meta-label">Scripture</div><div class="meta-value" id="detailScripture"></div></div>
            <div class="meta-row"><div class="meta-label">Speaker</div><div class="meta-value" id="detailSpeaker"></div></div>
            <div class="meta-row"><div class="meta-label">Date</div><div class="meta-value" id="detailDate"></div></div>
            <div class="meta-row"><div class="meta-label">Book Tags</div><div class="meta-value" id="detailBookTags"></div></div>
            <div class="meta-row"><div class="meta-label">Audio Plays</div><div class="meta-value" id="detailAudioPlays"></div></div>
            <div class="meta-row"><div class="meta-label">Video Views</div><div class="meta-value" id="detailVideoViews"></div></div>
          </div>
          <div class="detail-actions">
            <a id="episodePageLink" class="path-button" href="#" target="_blank" rel="noopener noreferrer"><span>Open</span></a>
            <a id="shareLink" class="path-button" href="#" target="_blank" rel="noopener noreferrer"><span>Share</span></a>
          </div>
          <div class="related-wrap" id="relatedWrap">
            <h3 class="related-title">More from this selection</h3>
            <div class="related-row" id="relatedRow"></div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script>
    const ASSETS = {
      fallback:'https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228836/CGBC_Wheel_Black_Media_Fallback.jpg',
      current:'https://tithely-media-prod.s3.us-west-1.wasabisys.com/1234669/Current.jpg',
      livestreams:'https://tithely-media-prod.s3.us-west-1.wasabisys.com/1234668/Livestreams.jpg',
      books:'https://tithely-media-prod.s3.us-west-1.wasabisys.com/1234671/Search-Books.jpg',
      date:'https://tithely-media-prod.s3.us-west-1.wasabisys.com/1234670/Serach-Date.jpg',
      shorts:'https://tithely-media-prod.s3.us-west-1.wasabisys.com/1234699/shorts.jpg',
      topicalSeries:'https://tithely-media-prod.s3.us-west-1.wasabisys.com/1234786/Search-Series.jpg'
    };
    const LIVESTREAMS = { name:'Livestreams', playlistId:'PLKqZ6zXCYxUBu3jzPCTncKPpopFcvlVyv' };
    const GUEST_SPEAKERS = { name:'CGBC Guest Speaker', playlistId:'PLKqZ6zXCYxUDfYDWUNzBJFBAQ0rr2b6NW' };
    const SHORTS = { name:'CGBC Shorts', playlistId:'PLKqZ6zXCYxUAbDMGWMPp-HjT3t64V1tnj' };

    function buildBrowse(){

            bucket.specialsByYear.get(year).push(item);

        if((item?.series?.type==='topical' || item?.series?.type==='standalone') && !isSpecial){
          if(!browse.topical.has(seriesKey)){

    function renderChoices(){
      els.navHeading.textContent = headingText();
      els.backBtn.disabled = !state.nav.rootKey && !state.nav.branchKey && !state.nav.leafKey;
      els.backBtn.querySelector('span').textContent = backLabel();
      updateSearchStatus();
      renderTopStrip();

      const {rows, episodeLevel} = choiceRows();
      if(episodeLevel){
        state.activeQueue = rows.slice();
        if(!state.activeQueue.find(it=>it.stableId===state.currentItem?.stableId)) state.currentItem = state.activeQueue[0] || null;
      } else {
        state.activeQueue = [];
        state.currentItem = null;
      }
      if(!rows.length){
        els.choiceList.innerHTML = `<div class="empty">No items found for this path.</div>`;
        return;
      }
      const activeKey = episodeLevel ? state.currentItem?.stableId : (state.nav.leafKey || state.nav.branchKey);
      els.choiceList.innerHTML = rows.map(row => {
        const thumbClass = episodeLevel ? (state.mode==='video' ? 'thumb-wide' : 'thumb-square') : 'thumb-wide';
        const image = episodeLevel ? getEpisodeArt(row) : (row.image || ASSETS.fallback);
        const title = episodeLevel ? (row?.title?.display || '') : (row.title || '');
        const sub = episodeLevel ? (row?.series?.name || '') : (row.meta || '');
        const metric = episodeLevel ? `${formatCountLabel(state.mode==='audio' ? (row?.audio?.plays || 0) : (row?.video?.views || 0), state.mode==='audio' ? 'play' : 'view', state.mode==='audio' ? 'plays' : 'views')} · ${formatDate(row)}` : '';
        const key = episodeLevel ? row.stableId : row.key;
        const cls = episodeLevel ? 'episode' : 'choice';
        return `<button type="button" class="${cls} ${activeKey===key ? 'active' : ''}" data-key="${escapeHtml(key)}" data-episode="${episodeLevel ? '1' : '0'}">
          <div class="${thumbClass}"><img src="${escapeHtml(image)}" alt=""></div>
          <div class="copy">
            <h3 class="card-title">${escapeHtml(title)}</h3>
            <div class="card-sub">${escapeHtml(sub)}</div>
            ${metric ? `<div class="card-metric">${escapeHtml(metric)}</div>` : ''}
          </div>
        </button>`;
      }).join('');
    }
    function renderPlayer(){
      const item=state.currentItem;
      const idle=!item;
      els.playerShell.classList.toggle('is-idle', idle);
      els.detailShell.classList.toggle('is-idle', idle);
      if(!item) return;

      if(state.mode==='video' && item?.video?.hasVideo && item?.video?.youtubeId){
        els.playerShell.classList.add('video-active');
        els.videoPlaceholder.style.display='none';
        els.audioPlaceholder.style.display='none';
        els.audioStage.style.display='none';
        els.videoShell.style.display='flex';
        els.videoShell.innerHTML=`<iframe src="https://www.youtube.com/embed/${encodeURIComponent(item.video.youtubeId)}?rel=0&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
      } else {
        els.playerShell.classList.remove('video-active');
        els.videoShell.innerHTML='';
        els.videoShell.style.display='none';
        els.videoPlaceholder.style.display='none';
        els.audioPlaceholder.style.display='none';
        els.audioStage.style.display='grid';
        els.audioFeatureArt.src=getEpisodeArt(item,'audio');
        els.audioFeatureTitle.textContent=item?.title?.display || '';
        els.audioFeatureSeries.textContent=item?.series?.name || '';
        els.audioFeatureScripture.textContent=item?.scripture?.display || '—';
        els.audioFeatureSpeaker.textContent=item?.speaker || '—';
        els.audioFeatureDate.textContent=formatDate(item);
        const dur=Number(item?.audio?.durationSeconds || 0);
        els.audioClockCurrent.textContent='00:00';
        els.audioClockTotal.textContent=`/ ${formatClock(dur)}`;
        els.audioElapsedSmall.textContent='00:00';
        els.audioRemainingSmall.textContent=formatClock(dur);
        els.audioProgress.value=0;
        els.audioProgress.max=dur || 100;
        if(item?.audio?.url){
          if(els.audioPlayer.src !== item.audio.url) els.audioPlayer.src=item.audio.url;
        } else {
          els.audioPlayer.removeAttribute('src');
          els.audioPlayer.load();
        }
      }

      els.detailTitle.textContent=item?.title?.display || '';
      els.detailSeries.textContent=item?.series?.name || '';
      els.detailScripture.textContent=item?.scripture?.display || '—';
      els.detailSpeaker.textContent=item?.speaker || '—';
      els.detailDate.textContent=formatDate(item);
      els.detailBookTags.textContent=getBookTagsDisplay(item);
      els.detailAudioPlays.textContent=formatCountLabel(item?.audio?.plays || 0,'play','plays');
      els.detailVideoViews.textContent=formatCountLabel(item?.video?.views || 0,'view','views');
      const shareUrl=item?.links?.shareUrl || item?.links?.episodeUrl || '#';
      const openUrl=item?.links?.episodeUrl || item?.video?.url || item?.audio?.url || '#';
      els.episodePageLink.href=openUrl;
      els.shareLink.href=shareUrl;
      renderRelated(item);
    }
    function renderRelated(item){
      const rows=state.activeQueue.filter(r=>r.stableId!==item?.stableId).slice(0,8);
      if(!rows.length){
        els.relatedWrap.style.display='none';
        els.relatedRow.innerHTML='';
        return;
      }
      els.relatedWrap.style.display='block';
      els.relatedRow.innerHTML=rows.map(row=>{
        const thumbClass = state.mode==='video' ? 'thumb-wide' : 'thumb-square';
        return `<button type="button" class="related" data-key="${escapeHtml(row.stableId)}" data-episode="1">
          <div class="${thumbClass}"><img src="${escapeHtml(getEpisodeArt(row))}" alt=""></div>
          <div class="copy">
            <h3 class="card-title">${escapeHtml(row?.title?.episodeName || row?.title?.display || '')}</h3>
            <div class="card-sub">${escapeHtml(row?.series?.name || '')}</div>
          </div>
        </button>`;
      }).join('');
    }
    function scrollChoiceListToTop(){
      try{ els.choiceList.scrollTop = 0; }catch(err){}
      const navPanel = document.querySelector('.nav-panel');
      if(navPanel){ try{ navPanel.scrollTop = 0; }catch(err){} }
    }
    function rerender(){
      renderChoices();
      renderPlayer();
      updateModeUI();
      updateImpact();
    }
    function resetAll(){ state.nav={rootKey:null,branchKey:null,leafKey:null}; state.currentItem=null; scrollChoiceListToTop(); rerender(); }
    function goBack(){
      if(state.nav.leafKey) state.nav.leafKey=null;
      else if(state.nav.branchKey) state.nav.branchKey=null;
      else if(state.nav.rootKey) state.nav.rootKey=null;
      scrollChoiceListToTop();
      rerender();
    }
    function selectChoice(key){
      if(!state.nav.rootKey){ state.nav.rootKey=key; state.nav.branchKey=null; state.nav.leafKey=null; scrollChoiceListToTop(); rerender(); return; }
      if(!state.nav.branchKey){ state.nav.branchKey=key; state.nav.leafKey=null; scrollChoiceListToTop(); rerender(); return; }
      if(leafChoices().length && !state.nav.leafKey){ state.nav.leafKey=key; scrollChoiceListToTop(); rerender(); return; }
    }
    function attachEvents(){
      document.body.addEventListener('click', (event)=>{
        const topBtn=event.target.closest('[data-top-root]');
        if(topBtn){
          const key=topBtn.dataset.topRoot;
          state.nav={rootKey:key,branchKey:null,leafKey:null};
          state.currentItem=null;
          scrollChoiceListToTop();
          rerender();
          return;
        }
        const btn=event.target.closest('[data-key]');
        if(!btn) return;
        const key=btn.dataset.key, episode=btn.dataset.episode==='1';
        if(episode){
          const next=state.activeQueue.find(r=>r.stableId===key);
          if(next){ state.currentItem=next; renderChoices(); renderPlayer(); }
          return;
        }
        selectChoice(key);
      });
      els.backBtn.addEventListener('click', goBack);
      els.logoReset.addEventListener('click', resetAll);
      els.listenBtn.addEventListener('click', ()=>{ if(state.mode==='audio') return; state.mode='audio'; resetAll(); });
      els.watchBtn.addEventListener('click', ()=>{ if(state.mode==='video') return; state.mode='video'; resetAll(); });
      els.searchInput.addEventListener('input', (e)=>{ state.searchTerm=e.target.value || ''; resetAll(); });
      els.audioPlayBadge.addEventListener('click', ()=>{
        if(!els.audioPlayer.src) return;
        if(els.audioPlayer.paused) els.audioPlayer.play();
        else els.audioPlayer.pause();
      });
      els.miniSkipBackBtn.addEventListener('click', ()=>{ els.audioPlayer.currentTime=Math.max(0,(els.audioPlayer.currentTime||0)-30); });
      els.miniSkipForwardBtn.addEventListener('click', ()=>{ const d=Number(els.audioPlayer.duration||0); els.audioPlayer.currentTime=Math.min(d||0,(els.audioPlayer.currentTime||0)+30); });
      els.audioProgress.addEventListener('input', ()=>{ const d=Number(els.audioPlayer.duration||0); if(!d) return; els.audioPlayer.currentTime=Number(els.audioProgress.value||0); });
      els.audioPlayer.addEventListener('timeupdate', ()=>{
        const c=Number(els.audioPlayer.currentTime||0), d=Number(els.audioPlayer.duration||0);
        els.audioClockCurrent.textContent=formatClock(c);
        els.audioElapsedSmall.textContent=formatClock(c);
        els.audioRemainingSmall.textContent=formatClock(Math.max(0,d-c));
        els.audioProgress.max=d || 100;
        els.audioProgress.value=c;
      });
      els.audioPlayer.addEventListener('loadedmetadata', ()=>{
        const d=Number(els.audioPlayer.duration||0);
        els.audioClockTotal.textContent=`/ ${formatClock(d)}`;
        els.audioRemainingSmall.textContent=formatClock(d);
        els.audioProgress.max=d || 100;
      });
      ['play','pause','ended'].forEach(name=>{
        els.audioPlayer.addEventListener(name, ()=>{ els.audioPlayLabel.textContent = name==='play' ? 'Pause' : 'Tap to Play'; });
      });
    }
    async function bootstrap(){
      attachEvents();
      state.data = await loadResolvedData();
      state.items = Array.isArray(state.data?.items) ? state.data.items.slice() : [];
      try{
        const [livestreams, shorts, guestSpeakers] = await Promise.all([
          fetchPlaylistSeries(LIVESTREAMS),
          fetchPlaylistSeries(SHORTS),
          fetchPlaylistSeries(GUEST_SPEAKERS)
        ]);
        state.nativeShelves.livestreams = livestreams;
        state.nativeShelves.shorts = shorts;
        state.nativeShelves.guestSpeakers = guestSpeakers;
      }catch(err){
        console.warn('Live YouTube shelves failed to load.', err);
      }
      rerender();
    }
    bootstrap().catch(err=>{
      console.error(err);
      els.choiceList.innerHTML = `<div class="empty">Resolved data could not be loaded.</div>`;
    });
  </script>
</body>
</html>
