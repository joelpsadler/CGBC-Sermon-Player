  <script id="mobile-transcript-final-cleanup-script">
    (function(){
      const MOBILE_MQ = window.matchMedia('(max-width:900px)');
      const playSvg = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>';
      const pauseSvg = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h4v14H7zM13 5h4v14h-4z"></path></svg>';

      function isMobile(){ return MOBILE_MQ.matches; }
      function isRootCategoryView(){
        try{ return isMobile() && !state.nav.rootKey && !state.nav.branchKey && !state.nav.leafKey && !searchResultsMode(); }
        catch(err){ return false; }
      }
      function currentMobileQuote(){
        try{ return state.idleQuotes && state.idleQuotes.length ? state.idleQuotes[state.idleQuoteIndex] : null; }
        catch(err){ return null; }
      }
      function mobileQuoteCardHtml(){
        if(!isRootCategoryView()) return '';
        const q = currentMobileQuote();
        if(!q) return '';
        const text = idleQuoteText(q);
        if(!text) return '';
        const scaleClass = text.length > 210 ? ' long' : text.length > 130 ? ' medium' : '';
        const speaker = idleQuoteSpeaker(q);
        const title = idleQuoteTitle(q);
        const date = idleQuoteDate(q);
        const start = idleQuoteStart(q);
        const link = idleQuoteSiteDeepLink(q);
        const episodeLink = idleQuoteEpisodeLink(q, false);
        const episodeItem = idleQuoteEpisodeItem(q);
        const art = episodeItem ? getEpisodeArt(episodeItem, 'video') : (q?.episode?.art || q?.art || ASSETS.fallback);
        const pauseLabel = state.idleQuotePaused ? 'Resume' : 'Pause';
        const icon = state.idleQuotePaused ? playSvg : pauseSvg;
        return `<section class="mobile-featured-quotes${scaleClass}" data-mobile-featured-quotes="1">
          <p class="mobile-featured-eyebrow">Featured Quotes</p>
          <div class="mobile-featured-quote-text">${escapeHtml(text)}</div>
          <div class="mobile-featured-meta">
            ${speaker ? `<a href="${escapeHtml(link)}">${escapeHtml(speaker)}</a>` : ''}
            ${title ? `<span>${escapeHtml(title)}</span>` : ''}
            ${date ? `<span>${escapeHtml(formatDate({date:{iso:date,raw:date}}))}</span>` : ''}
            <span>${escapeHtml(formatClock(start))}</span>
          </div>
          <div class="mobile-featured-controls">
            <button type="button" class="mobile-featured-btn" data-mobile-quote-pause="1" aria-label="${escapeHtml(pauseLabel)}">${icon}</button>
            <button type="button" class="mobile-featured-btn primary" data-mobile-quote-next="1">Next</button>
            <button type="button" class="mobile-featured-btn" data-mobile-quote-copy="1">Copy</button>
            <a class="mobile-featured-episode-card" href="${escapeHtml(episodeLink)}" aria-label="Open full episode">
              <span class="mobile-featured-episode-label">${playSvg}<span>Episode</span></span>
              <img src="${escapeHtml(art || ASSETS.fallback)}" alt="">
            </a>
          </div>
        </section>`;
      }
      function appendMobileQuoteCard(){
        try{
          if(!els.choiceList) return;
          const old = els.choiceList.querySelector('[data-mobile-featured-quotes="1"]');
          if(old) old.remove();
          const html = mobileQuoteCardHtml();
          if(!html) return;
          els.choiceList.insertAdjacentHTML('beforeend', html);
        }catch(err){ console.warn('Mobile featured quote card failed.', err); }
      }

      if(typeof renderChoices === 'function'){
        const baseRenderChoices = renderChoices;
        renderChoices = function(){
          baseRenderChoices.apply(this, arguments);
          appendMobileQuoteCard();
        };
      }
      if(typeof renderIdleQuote === 'function'){
        const baseRenderIdleQuote = renderIdleQuote;
        renderIdleQuote = function(){
          baseRenderIdleQuote.apply(this, arguments);
          appendMobileQuoteCard();
        };
      }
      if(typeof setIdleQuotePaused === 'function'){
        const baseSetIdleQuotePaused = setIdleQuotePaused;
        setIdleQuotePaused = function(value){
          baseSetIdleQuotePaused.apply(this, arguments);
          appendMobileQuoteCard();
        };
      }

      document.addEventListener('click', function(event){
        const pauseBtn = event.target.closest && event.target.closest('[data-mobile-quote-pause]');
        if(pauseBtn){
          event.preventDefault();
          event.stopPropagation();
          if(typeof setIdleQuotePaused === 'function') setIdleQuotePaused(!state.idleQuotePaused);
          return;
        }
        const nextBtn = event.target.closest && event.target.closest('[data-mobile-quote-next]');
        if(nextBtn){
          event.preventDefault();
          event.stopPropagation();
          if(typeof nextIdleQuote === 'function') nextIdleQuote();
          appendMobileQuoteCard();
          return;
        }
        const copyBtn = event.target.closest && event.target.closest('[data-mobile-quote-copy]');
        if(copyBtn){
          event.preventDefault();
          event.stopPropagation();
          const q = currentMobileQuote();
          if(q){
            const text = (typeof idleQuoteCopy === 'function') ? idleQuoteCopy(q) : idleQuoteText(q);
            if(navigator.clipboard && text){ navigator.clipboard.writeText(text).catch(function(){}); }
          }
        }
      }, true);

      function wrapSearchInput(input){
        if(!input || input.dataset.clearWrapped === 'true') return;
        input.dataset.clearWrapped = 'true';
        const wrap = document.createElement('span');
        wrap.className = 'search-wrap';
        input.parentNode.insertBefore(wrap, input);
        wrap.appendChild(input);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'search-clear-btn';
        btn.setAttribute('aria-label', 'Clear search');
        btn.textContent = '×';
        wrap.appendChild(btn);
        function sync(){ wrap.classList.toggle('has-value', !!input.value); }
        input.addEventListener('input', sync);
        input.addEventListener('change', sync);
        btn.addEventListener('click', function(ev){
          ev.preventDefault();
          input.value = '';
          input.dispatchEvent(new Event('input', {bubbles:true}));
          input.dispatchEvent(new Event('change', {bubbles:true}));
          input.focus();
          sync();
        });
        sync();
      }
      function setupSearchClears(){
        wrapSearchInput(document.getElementById('searchInput'));
        wrapSearchInput(document.getElementById('transcriptSearch'));
      }
      if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupSearchClears);
      else setupSearchClears();
    })();
  </script>

  <script id="mobile-auto-info-polish-script">
    (function(){
      const mq = window.matchMedia('(max-width:900px)');
      const NOTE_TEXT = 'Auto translations are not human verified, they are a tool and can make mistakes. Use actual audio or video file for accuracy when required.';
      function ensureMobileAutoBadge(){
        if(!mq.matches) return;
        const eyebrow = document.querySelector('.transcript-panel .transcript-title-block .eyebrow');
        if(!eyebrow || eyebrow.querySelector('.mobile-auto-badge')) return;
        const badge = document.createElement('span');
        badge.className = 'mobile-auto-badge';
        badge.innerHTML = '<span class="mobile-auto-gear" aria-hidden="true">⚙</span><span>Auto</span><button type="button" class="mobile-auto-info-btn" aria-label="About auto transcripts">i</button>';
        eyebrow.appendChild(badge);
      }
      function toggleAutoNote(btn){
        const panel = btn && btn.closest ? btn.closest('.transcript-panel') : document.querySelector('.transcript-panel');
        if(!panel) return;
        const existing = panel.querySelector('.mobile-auto-note');
        if(existing){ existing.remove(); return; }
        const note = document.createElement('div');
        note.className = 'mobile-auto-note';
        note.innerHTML = '<button type="button" class="mobile-auto-note-close" aria-label="Close auto transcript note">×</button><span>'+NOTE_TEXT+'</span>';
        const head = panel.querySelector('.transcript-head');
        if(head && head.parentNode){ head.insertAdjacentElement('afterend', note); }
      }
      document.addEventListener('click', function(event){
        const info = event.target.closest && event.target.closest('.mobile-auto-info-btn');
        if(info){ event.preventDefault(); event.stopPropagation(); toggleAutoNote(info); return; }
        const close = event.target.closest && event.target.closest('.mobile-auto-note-close');
        if(close){ event.preventDefault(); const note = close.closest('.mobile-auto-note'); if(note) note.remove(); }
      }, true);
      const observer = new MutationObserver(ensureMobileAutoBadge);
      observer.observe(document.documentElement, {childList:true, subtree:true});
      window.addEventListener('resize', ensureMobileAutoBadge, {passive:true});
      document.addEventListener('DOMContentLoaded', ensureMobileAutoBadge);
      setTimeout(ensureMobileAutoBadge, 200);
      setTimeout(ensureMobileAutoBadge, 1000);
    })();
  </script>


  <script id="final-video-off-mobile-quote-copy-pass">
    (function(){
      const mq = window.matchMedia('(max-width:900px)');
      const COPY_LABEL = 'Copy';
      function isMobile(){ return mq.matches; }
      function hardHideVideoTranscript(){
        try{
          const panel = document.getElementById('transcriptPanel');
          if(window.state && state.mode === 'video' && panel){
            panel.classList.remove('is-visible');
            panel.classList.remove('is-video-search-only');
            panel.style.display = 'none';
          } else if(panel){
            panel.style.display = '';
          }
          document.querySelectorAll('.episode .subtitle-badge.transcript-available-badge').forEach(function(badge){
            if(window.state && state.mode === 'video') badge.remove();
          });
        }catch(err){}
      }
      if(typeof renderTranscriptPanel === 'function'){
        const baseRenderTranscriptPanel = renderTranscriptPanel;
        renderTranscriptPanel = async function(){
          if(window.state && state.mode === 'video'){
            const panel = document.getElementById('transcriptPanel');
            if(panel){
              panel.classList.remove('is-visible');
              panel.classList.remove('is-video-search-only');
              panel.style.display = 'none';
            }
            if(typeof stopTranscriptClock === 'function') stopTranscriptClock();
            return;
          }
          const result = await baseRenderTranscriptPanel.apply(this, arguments);
          const panel = document.getElementById('transcriptPanel');
          if(panel) panel.style.display = '';
          return result;
        };
      }
      if(typeof renderPlayer === 'function'){
        const baseRenderPlayer = renderPlayer;
        renderPlayer = function(){
          const result = baseRenderPlayer.apply(this, arguments);
          setTimeout(hardHideVideoTranscript, 0);
          return result;
        };
      }
      if(typeof renderChoices === 'function'){
        const baseRenderChoicesFinal = renderChoices;
        renderChoices = function(){
          const result = baseRenderChoicesFinal.apply(this, arguments);
          setTimeout(hardHideVideoTranscript, 0);
          return result;
        };
      }
      function addCopyToMobileQuoteCards(){
        if(!isMobile()) return;
        document.querySelectorAll('[data-mobile-featured-quotes="1"]').forEach(function(card){
          const controls = card.querySelector('.mobile-featured-controls, .mobile-featured-actions');
          if(!controls || controls.querySelector('[data-mobile-quote-copy]')) return;
          const next = controls.querySelector('[data-mobile-quote-next]');
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'mobile-featured-btn';
          btn.setAttribute('data-mobile-quote-copy','1');
          btn.textContent = COPY_LABEL;
          if(next && next.nextSibling) controls.insertBefore(btn, next.nextSibling);
          else if(next) controls.insertBefore(btn, next.nextElementSibling);
          else controls.appendChild(btn);
        });
      }
      if(typeof renderIdleQuote === 'function'){
        const baseRenderIdleQuoteFinal = renderIdleQuote;
        renderIdleQuote = function(){
          const result = baseRenderIdleQuoteFinal.apply(this, arguments);
          setTimeout(addCopyToMobileQuoteCards, 0);
          return result;
        };
      }
      const mo = new MutationObserver(function(){ addCopyToMobileQuoteCards(); hardHideVideoTranscript(); });
      mo.observe(document.documentElement, { childList:true, subtree:true });
      document.addEventListener('click', function(event){
        const copy = event.target.closest && event.target.closest('[data-mobile-quote-copy]');
        if(copy){
          event.preventDefault();
          event.stopPropagation();
          try{
            const q = window.state && state.idleQuotes && state.idleQuotes.length ? state.idleQuotes[state.idleQuoteIndex] : null;
            const text = q ? ((typeof idleQuoteCopy === 'function') ? idleQuoteCopy(q) : (typeof idleQuoteText === 'function' ? idleQuoteText(q) : '')) : '';
            if(navigator.clipboard && text) navigator.clipboard.writeText(text).catch(function(){});
          }catch(err){}
        }
      }, true);
      document.addEventListener('DOMContentLoaded', function(){ setTimeout(function(){ hardHideVideoTranscript(); addCopyToMobileQuoteCards(); }, 250); });
      window.addEventListener('resize', function(){ setTimeout(function(){ hardHideVideoTranscript(); addCopyToMobileQuoteCards(); }, 150); }, {passive:true});
    })();
  </script>
<script id="final-last-mile-video-off-copy-link-polish-script">
(function(){
  function hideVideoTranscriptNow(){
    try{
      if(!(window.state && state.mode === 'video')) return;
      var panel = document.getElementById('transcriptPanel');
      if(panel){
        panel.classList.remove('is-visible','is-collapsed','is-video-search-only','is-audio-only-notice');
        panel.style.display = 'none';
        panel.setAttribute('hidden','hidden');
      }
      document.querySelectorAll('.subtitle-badge.transcript-available-badge').forEach(function(node){ node.remove(); });
      if(typeof stopTranscriptClock === 'function') stopTranscriptClock();
    }catch(err){}
  }
  if(typeof idleQuoteCopy === 'function' && typeof idleQuoteEpisodeLink === 'function'){
    idleQuoteCopy = function(q){
      var quote = (typeof idleQuoteText === 'function') ? idleQuoteText(q) : '';
      var speaker = (typeof idleQuoteSpeaker === 'function') ? idleQuoteSpeaker(q) : '';
      var title = (typeof idleQuoteTitle === 'function') ? idleQuoteTitle(q) : '';
      var date = (typeof idleQuoteDate === 'function') ? idleQuoteDate(q) : '';
      var dateText = '';
      try{ dateText = date && typeof formatDate === 'function' ? formatDate({date:{iso:date,raw:date}}) : ''; }catch(err){}
      var timeText = '';
      try{ timeText = typeof formatClock === 'function' && typeof idleQuoteStart === 'function' ? formatClock(idleQuoteStart(q)) : ''; }catch(err){}
      var meta = [speaker, title, dateText, timeText].filter(Boolean).join(' • ');
      var link = idleQuoteEpisodeLink(q, false);
      return [quote, meta ? '— ' + meta : '', link].filter(Boolean).join('\n');
    };
  }
  if(typeof renderTranscriptPanel === 'function'){
    var baseRenderTranscriptPanelLastMile = renderTranscriptPanel;
    renderTranscriptPanel = async function(){
      if(window.state && state.mode === 'video'){
        hideVideoTranscriptNow();
        return;
      }
      var panel = document.getElementById('transcriptPanel');
      if(panel){ panel.removeAttribute('hidden'); panel.style.display = ''; }
      return await baseRenderTranscriptPanelLastMile.apply(this, arguments);
    };
  }
  if(typeof renderPlayer === 'function'){
    var baseRenderPlayerLastMile = renderPlayer;
    renderPlayer = function(){
      var result = baseRenderPlayerLastMile.apply(this, arguments);
      setTimeout(hideVideoTranscriptNow, 0);
      setTimeout(hideVideoTranscriptNow, 80);
      return result;
    };
  }
  if(typeof renderChoices === 'function'){
    var baseRenderChoicesLastMile = renderChoices;
    renderChoices = function(){
      var result = baseRenderChoicesLastMile.apply(this, arguments);
      setTimeout(hideVideoTranscriptNow, 0);
      return result;
    };
  }
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(hideVideoTranscriptNow, 100); });
  try{ new MutationObserver(hideVideoTranscriptNow).observe(document.documentElement, {childList:true, subtree:true}); }catch(err){}
})();
</script>
