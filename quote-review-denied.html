uted);font-size:14px}.quote-card{border-radius:24px;border:1px solid var(--border);background:rgba(255,255,255,.035);padding:18px;display:grid;gap:14px}.context-line{color:rgba(255,255,255,.55);font-size:16px;line-height:1.45}.context-line:empty{display:none}.quote-main{color:rgba(255,255,255,.96);font-family:Poppins,sans-serif;font-size:clamp(26px,2.8vw,42px);font-weight:800;line-height:1.12;text-align:center;padding:8px 6px}.meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;color:var(--muted);font-size:13px}.pill{display:inline-flex;align-items:center;min-height:28px;padding:0 10px;border-radius:999px;background:rgba(255,255,255,.055);border:1px solid var(--border);font-family:Poppins,sans-serif;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.78)}textarea{width:100%;min-height:118px;resize:vertical;border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.24);color:var(--text);padding:14px;outline:none;line-height:1.45}.review-actions{display:grid;gap:10px}.review-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.divider{width:1px;height:34px;background:rgba(255,255,255,.18);flex:0 0 1px}.media-shell{width:100%;aspect-ratio:16/9;border-radius:22px;border:1px solid var(--border);background:rgba(0,0,0,.36);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:14px}.media-shell iframe{width:100%;height:100%;border:0;display:block}.time-row{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-family:Poppins,sans-serif;font-size:13px}.note{padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--muted);font-size:13px;line-height:1.45}.list-panel{display:grid;gap:14px}.toolbar{display:grid;grid-template-columns:minmax(0,1fr) minmax(230px,340px) auto;gap:12px;padding:16px 22px;border-bottom:1px solid rgba(255,255,255,.07);align-items:end}.search,.episode-select{height:46px;border-radius:16px;border:1px solid var(--border);background:rgba(0,0,0,.32);color:var(--text);padding:0 14px;outline:none;min-width:0;width:100%}.cards{display:grid;gap:12px;padding:16px 22px 22px}.quote-item{display:grid;grid-template-columns:150px minmax(0,1fr);gap:14px;border-radius:24px;border:1px solid var(--border);background:rgba(255,255,255,.035);padding:14px}.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:16px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.06)}.item-body{display:grid;gap:10px;min-width:0}.item-title{margin:0;font-family:Poppins,sans-serif;font-size:18px;line-height:1.15}.item-quote{margin:0;color:rgba(255,255,255,.88);line-height:1.5}.item-actions{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:12px;color:var(--muted)}.empty{padding:28px;border-radius:24px;background:rgba(255,255,255,.035);border:1px solid var(--border);color:var(--muted);text-align:center}.export-panel{position:fixed;right:18px;bottom:18px;z-index:9999;width:min(620px,calc(100vw - 36px));max-height:min(680px,calc(100vh - 36px));display:grid;gap:10px;padding:14px;border-radius:22px;background:rgba(10,10,11,.96);border:1px solid rgba(255,255,255,.16);box-shadow:0 24px 80px rgba(0,0,0,.45);backdrop-filter:blur(18px);color:#f4f4f4;overflow:auto}.export-panel textarea{height:260px;font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;border-radius:14px}.export-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:10000;display:none;max-width:min(720px,calc(100vw - 28px));padding:12px 16px;border-radius:999px;background:rgba(12,12,13,.94);border:1px solid rgba(255,255,255,.12);box-shadow:0 14px 32px rgba(0,0,0,.30);color:rgba(255,255,255,.88);font-size:13px}.toast.is-visible{display:block}@media(max-width:980px){.review-grid{grid-template-columns:1fr}.brand img{width:150px;height:54px}.toolbar,.filters{grid-temp </style></head><body><div class="page"><header class="topbar"><div class="brand"><a href="index.html" aria-label="Back to CGBC media"><img src="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1235337/Desktop-White-2-2.png" alt="CGBC A\V Media"></a><div><p class="eyebrow">Hidden Review Desk</p><h1>Denied Quotes</h1></div></div><nav class="nav-actions" aria-label="Quote tools navigation"><a class="back-link" href="quote-review.html">Quote Review</a><a class="back-link" href="quote-review-approved.html">Approved Quotes</a><a class="back-link" href="approved-quotes-random.html">Quote Wall</a><a class="back-link" href="index.html">Back to Media</a></nav></header><section class="gate" id="gate"><p class="eyebrow">Private review</p><h1>Enter Password</h1><label for="passwordInput">Review password</label><input id="passwordInput" inputmode="numeric" autocomplete="off" type="password" placeholder="Password"><div class="gate-actions"><button class="btn primary" id="unlockBtn" type="button">Open</button><span class="status" id="gateStatus"></span></div></section><main class="app-view" id="appView"><section class="panel list-panel"><div class="toolbar"><div class="field"><label for="searchBox">Filter quotes</label><input class="search" id="searchBox" placeholder="Search quote, episode, series, date…"></div><button class="btn primary" id="exportCurationBtn" type="button">Export GitHub JSON</button></div><div class="cards" id="cards"></div></section></main></div><div class="toast" id="toast"></div><script>
const PASSWORD='1813';
const AUTH_KEYS=['cgbcQuoteReviewUnlocked','cgbc_quote_review_unlocked','cgbcQuoteReviewAuth'];
const AUTH_TTL_MS=12*60*60*1000;
const QUOTE_PATHS=['data/quotes/en/random-quotes.json','data/quotes/en/quote-bank.json','random-quotes.json','quote-bank.json'];
const CURATION_PATHS=['config/quote-curation.json','quote-curation.json'];
const $=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function clean(v){return String(v||'').replace(/\s+/g,' ').trim();}
function fmtDate(v){if(!v)return '';try{return new Date(v+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}catch(_){return v||'';}}
function fmtTime(s){s=Number(s||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;}
function toast(msg){const node=$('toast');if(!node)return;node.textContent=msg;node.classList.add('is-visible');clearTimeout(toast.t);toast.t=setTimeout(()=>node.classList.remove('is-visible'),2400);}
function siteBase(){const path=location.pathname.replace(/[^/]*$/,'');return location.origin+path;}
function playerLink(q){const id=q?.episode?.stableId||q?.episodeStableId||q?.episodeId||'';return `${siteBase()}index.html?mode=video&item=${encodeURIComponent(id)}`;}
function timeLink(q){const id=q?.episode?.stableId||q?.episodeStableId||q?.episodeId||'';const start=Math.max(0,Math.floor(q?.media?.start??q?.start??0));return `${siteBase()}index.html?mode=video&item=${encodeURIComponent(id)}${start?`&start=${start}`:''}`;}
function quoteSpeaker(q){return q?.speaker||q?.by||q?.episode?.speaker||q?.episode?.by||'Pastor Jacob Lannom';}
function quoteTitle(q){const ep=q?.episode||{};return ep.title||ep.episodeName||q?.episodeTitle||'Quote';}
function quoteDate(q){return q?.episode?.date||q?.date||'';}
function copyText(q){const text=clean(q?.approvedText||q?.displayText||q?.expandedText||q?.text||'');return `${text}\n${quoteSpeaker(q)} — ${quoteTitle(q)}${quoteDate(q)?`, ${fmtDate(quoteDate(q))}`:''}\n${playerLink(q)}`;}
function youtubeThumb(q){const id=q?.media?.youtubeId||q?.youtubeId||q?.episode?.youtubeId||'';return id?`https://i.ytimg.com/vi/${encodeURIComponent(id)}/hqdefault.jpg`:'';}
function markUnlocked(){const payload=JSON.stringify({ok:true,at:Date.now()});for(const key of AUTH_KEYS){try{localStorage.setItem(key,payload);sessionStorage.setItem(key,payload);}catch(_){}}}
function isUnlocked(){for(const key of AUTH_KEYS){try{const raw=sessionStorage.getItem(key)||localStorage.getItem(key);if(!raw)continue;if(raw==='yes'||raw==='true'||raw==='1813'){markUnlocked();return true;}const data=JSON.parse(raw);if(data?.ok&&(Date.now()-Number(data.at||0))<AUTH_TTL_MS){markUnlocked();return true;}}catch(_){}}return false;}
async function fetchFirst(paths,kind='data'){const errors=[];for(const path of paths){try{const res=await fetch(`${path}?v=${Date.now()}`,{cache:'no-store'});if(!res.ok){errors.push(`${path}: HTTP ${res.status}`);continue;}return await res.json();}catch(e){errors.push(`${path}: ${e.message||e}`);}}throw new Error(`Could not load ${kind}. ${errors.join(' | ')}`);}
async function loadQuotes(){const data=await fetchFirst(QUOTE_PATHS,'quote candidates');const quotes=Array.isArray(data?.quotes)?data.quotes:(Array.isArray(data)?data:[]);return quotes.slice().sort((a,b)=>(Number(!!b.publicSafe)-Number(!!a.publicSafe))||((b.searchBoost||0)-(a.searchBoost||0))||((b.quotePolishScore||0)-(a.quotePolishScore||0))||((b.score||0)-(a.score||0)));}
async function loadCuration(){try{const data=await fetchFirst(CURATION_PATHS,'curation');return Array.isArray(data?.reviews)?data.reviews:(Array.isArray(data)?data:[]);}catch(_){return [];}}
function localKey(action,q){return `cgbcQuoteReview:${action}:${q?.id||q?.quoteId||'unknown'}`;}
function readLocal(action,q){try{const raw=localStorage.getItem(localKey(action,q));return raw?JSON.parse(raw):null;}catch(_){return null;}}
function saveLocal(action,q,text){const row={quoteId:q?.id||q?.quoteId||'',status:action,approvedText:clean(text||q?.approvedText||q?.displayText||q?.text||''),episodeStableId:q?.episode?.stableId||q?.episodeStableId||'',episodeTitle:q?.episode?.title||q?.episode?.episodeName||q?.episodeTitle||'',start:q?.media?.start??q?.start??null,end:q?.media?.end??q?.end??null,siteDeepLink:timeLink(q),youtubeLink:q?.media?.youtubeId?`https://www.youtube.com/watch?v=${q.media.youtubeId}&t=${Math.floor(q?.media?.start??q?.start??0)}s`:'',source:'browser_review',savedAt:new Date().toISOString()};try{localStorage.setItem(localKey(action,q),JSON.stringify(row));}catch(e){console.warn(e);}return row;}
function removeLocalAll(q){for(const action of ['approved','featured','rejected']){try{localStorage.removeItem(localKey(action,q));}catch(_){}}}
function mergeQuotesWithReviews(quotes,reviews){const byId=new Map(quotes.map(q=>[q.id,{...q}]));for(const r of reviews||[]){if(!r?.quoteId)continue;const q=byId.get(r.quoteId)||{id:r.quoteId,episode:{stableId:r.episodeStableId,title:r.episodeTitle},media:{start:r.start,end:r.end}};byId.set(r.quoteId,{...q,repoReview:r});}const merged=[...byId.values()];for(const q of merged){let local=null;for(const action of ['featured','approved','rejected']){const row=readLocal(action,q);if(row)local=row;}q.localReview=local;const final=local||q.repoReview||null;q.finalReview=final;q.finalStatus=final?.status||q?.curation?.status||q.status||'candidate';if(final?.approvedText)q.approvedText=final.approvedText;}return merged;}
function allReviewEntries(quotes){const rows=new Map();for(const q of quotes||[]){if(q.repoReview?.quoteId)rows.set(q.repoReview.quoteId,{...q.repoReview,source:q.repoReview.source||'repo_curation'});if(q.localReview?.quoteId)rows.set(q.localReview.quoteId,{...q.localReview,source:q.localReview.source||'browser_review'});}return [...rows.values()];}
function exportCuration(quotes){const reviews=allReviewEntries(quotes);const payload={version:1,generatedAt:new Date().toISOString(),source:'cgbc_quote_review_browser',targetFile:'config/quote-curation.json',note:'Commit this file to config/quote-curation.json, then run the normal sermon library build workflow.',reviews};const json=JSON.stringify(payload,null,2);showExport(json,reviews.length);try{const blob=new Blob([json],{type:'application/json;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='quote-curation.json';a.rel='noopener';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},15000);}catch(e){console.warn(e);}}
function showExport(json,count){const old=$('exportPanel');if(old)old.remove();const wrap=document.createElement('div');wrap.id='exportPanel';wrap.className='export-panel';wrap.innerHTML=`<div class="export-head"><div><p class="eyebrow">GitHub export</p><h3 style="margin:0;font-family:Poppins,sans-serif">quote-curation.json ready</h3><p class="small">Upload this as <b>config/quote-curation.json</b>. ${count} review decision${count===1?'':'s'} included.</p></div><button class="btn" id="closeExport" type="button">Close</button></div><textarea id="exportText" readonly>${esc(json)}</textarea><div class="actions"><button class="btn primary" id="downloadExport" type="button">Download JSON</button><button class="btn" id="copyExport" type="button">Copy JSON</button><button class="btn" id="selectExport" type="button">Select All</button></div>`;document.body.appendChild(wrap);$('closeExport').onclick=()=>wrap.remove();$('downloadExport').onclick=()=>{const blob=new Blob([json],{type:'application/json;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='quote-curation.json';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},15000);};$('copyExport').onclick=async()=>{try{await navigator.clipboard.writeText(json);toast('Copied quote-curation.json.');}catch(_){$('exportText').select();document.execCommand('copy');}};$('selectExport').onclick=()=>{$('exportText').focus();$('exportText').select();};}
function bindGate(onOpen){const gate=$('gate'),app=$('appView'),input=$('passwordInput'),btn=$('unlockBtn'),status=$('gateStatus');async function open(){if(input.value.trim()!==PASSWORD){status.textContent='Wrong password.';return;}markUnlocked();status.textContent='Loading…';await onOpen();gate.style.display='none';app.classList.add('is-visible');}btn?.addEventListener('click',()=>open().catch(e=>{console.error(e);status.textContent=`Could not load: ${e.message||e}`;}));input?.addEventListener('keydown',e=>{if(e.key==='Enter')open().catch(err=>{console.error(err);status.textContent=`Could not load: ${err.message||err}`;});});if(isUnlocked()){status.textContent='Loading…';onOpen().then(()=>{gate.style.display='none';app.classList.add('is-visible');}).catch(e=>{console.error(e);status.textContent=`Could not load: ${e.message||e}`;});}}


const state={all:[],items:[],query:'',episodeFilter:'__all__'};function include(q){return q.finalStatus==='rejected';}function card(q){const img=youtubeThumb(q);return `<article class="quote-item" data-id="${esc(q.id)}">${img?`<img class="thumb" src="${esc(img)}" alt="">`:`<div class="thumb"></div>`}<div class="item-body"><div class="meta"><span class="pill">Rejected</span><span>${esc(fmtDate(quoteDate(q)))}</span><span>${esc(q?.episode?.series||'')}</span></div><h2 class="item-title">${esc(quoteTitle(q))}</h2><p class="item-quote">${esc(q.approvedText||q.displayText||q.text||'')}</p><div><p class="mini-label">Quote text</p><textarea data-edit="${esc(q.id)}">${esc(q.approvedText||q.displayText||q.text||'')}</textarea></div><div class="item-actions"><button class="btn primary" data-save="${esc(q.id)}">Save Edit</button><button class="btn" data-approve="${esc(q.id)}">Approve</button><button class="btn primary" data-feature="${esc(q.id)}">Feature</button><a class="btn" href="${esc(playerLink(q))}" target="_blank" rel="noopener">Open Site</a></div></div></article>`;}
function buildEpisodeFilter(){
  const groups=new Map();
  for(const q of state.items){
    const key=q?.episode?.stableId||q?.episodeStableId||'unknown';
    const label=quoteTitle(q);
    if(!groups.has(key))groups.set(key,{key,label,count:0});
    groups.get(key).count++;
  }
  if(!$('episodeFilter'))return;
  $('episodeFilter').innerHTML=[`<option value="__all__">All episodes — ${state.items.length}</option>`].concat([...groups.values()].sort((a,b)=>a.label.localeCompare(b.label,undefined,{numeric:true})).map(g=>`<option value="${esc(g.key)}">${esc(g.label)} — ${g.count}</option>`)).join('');
  if(!groups.has(state.episodeFilter)&&state.episodeFilter!=='__all__')state.episodeFilter='__all__';
  $('episodeFilter').value=state.episodeFilter;
}
function itemEpisodeMatch(item){
  return state.episodeFilter==='__all__'||(item?.episode?.stableId||item?.episodeStableId||'unknown')===state.episodeFilter;
}

function render(){const q=clean(state.query).toLowerCase();const list=state.items.filter(item=>itemEpisodeMatch(item)&&(!q||clean([item.approvedText,item.displayText,item.text,quoteTitle(item),item?.episode?.series,item?.episode?.date].join(' ')).toLowerCase().includes(q)));$('cards').innerHTML=list.length?list.map(card).join(''):`<div class="empty">No rejected quotes found.</div>`;}function byId(id){return state.all.find(q=>q.id===id);}function updateDecision(id,action,text){const q=byId(id);if(!q)return;removeLocalAll(q);saveLocal(action,q,text||q.approvedText||q.displayText||q.text||'');q.localReview=readLocal(action,q);q.finalReview=q.localReview;q.finalStatus=action;q.approvedText=q.localReview.approvedText;state.items=state.all.filter(include);render();}async function openApp(){const [quotes,reviews]=await Promise.all([loadQuotes(),loadCuration()]);state.all=mergeQuotesWithReviews(quotes,reviews);state.items=state.all.filter(include);render();}$('searchBox')?.addEventListener('input',()=>{state.query=$('searchBox').value;render();});
$('episodeFilter')?.addEventListener('change',()=>{state.episodeFilter=$('episodeFilter').value;render();});$('cards')?.addEventListener('click',e=>{const id=e.target.dataset.save||e.target.dataset.approve||e.target.dataset.feature;if(!id)return;const text=document.querySelector(`textarea[data-edit="${CSS.escape(id)}"]`)?.value||'';if(e.target.dataset.save){updateDecision(id,'rejected',text);toast('Saved.');}if(e.target.dataset.approve){updateDecision(id,'approved',text);toast('Approved.');}if(e.target.dataset.feature){updateDecision(id,'featured',text);toast('Featured.');}});$('exportCurationBtn')?.addEventListener('click',e=>{e.preventDefault();exportCuration(state.all);});bindGate(openApp);
</script></body></html>
