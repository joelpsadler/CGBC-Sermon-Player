<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>CGBC Denied Quotes</title><link rel="icon" type="image/jpeg" href="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228713/GCBC_ORIGWHT.png"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{--bg:#0f0f10;--text:#f4f4f4;--muted:rgba(255,255,255,.68);--muted2:rgba(255,255,255,.48);--accent:#8fae9d;--border:rgba(255,255,255,.09);--desktop-bg:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1230673/Desktop.jpg')}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,sans-serif}body{background:linear-gradient(180deg,rgba(8,8,9,.78),rgba(8,8,9,.92)),var(--desktop-bg) center/cover no-repeat fixed;background-blend-mode:multiply}button,input,textarea,select{font:inherit}button{border:none;background:none;color:inherit;cursor:pointer}a{color:inherit;text-decoration:none}.page{width:min(1680px,100%);margin:0 auto;padding:16px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 14px 18px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:16px;min-width:0}.brand img{width:240px;max-width:35vw;height:72px;object-fit:contain;object-position:left center;filter:drop-shadow(0 5px 14px rgba(0,0,0,.18))}.eyebrow{margin:0 0 5px;font-family:Poppins,sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2)}h1{margin:0;font-family:Poppins,sans-serif;font-size:clamp(30px,3.2vw,54px);line-height:.98;letter-spacing:-.03em}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn,.back-link{min-height:44px;display:inline-flex;align-items:center;justify-content:center;padding:0 15px;border-radius:16px;background:rgba(255,255,255,.055);border:1px solid var(--border);font-family:Poppins,sans-serif;font-weight:700}.btn.primary{background:linear-gradient(180deg,rgba(143,174,157,.24),rgba(143,174,157,.12));border-color:rgba(143,174,157,.28)}.btn.danger{background:rgba(255,90,90,.08);border-color:rgba(255,90,90,.22)}.btn svg{width:18px;height:18px;margin-right:8px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.gate{width:min(640px,calc(100vw - 32px));margin:10vh auto 0;padding:26px;border-radius:28px;background:linear-gradient(180deg,rgba(18,18,19,.92),rgba(10,10,11,.88));border:1px solid var(--border);box-shadow:0 28px 80px rgba(0,0,0,.44),inset 0 1px 0 rgba(255,255,255,.06)}.gate label{display:block;margin:20px 0 8px;font-family:Poppins,sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2)}.gate input{width:100%;height:56px;border-radius:18px;border:1px solid var(--border);background:rgba(0,0,0,.28);color:var(--text);padding:0 16px;outline:none;font-size:18px}.status{color:var(--muted);font-size:14px;line-height:1.45}.panel{border-radius:28px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(18,18,19,.88),rgba(10,10,11,.80));box-shadow:0 18px 60px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.055);overflow:hidden;backdrop-filter:blur(16px) saturate(1.04)}.panel-head{padding:20px 22px 14px;border-bottom:1px solid rgba(255,255,255,.07)}.panel-title{margin:0;font-family:Poppins,sans-serif;font-size:22px;line-height:1.05}.body{padding:18px;display:grid;gap:14px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar select{height:44px;min-width:240px;border-radius:15px;border:1px solid var(--border);background:rgba(0,0,0,.28);color:var(--text);padding:0 12px;outline:none}.pill{display:inline-flex;align-items:center;min-height:26px;padding:0 9px;border-radius:999px;background:rgba(255,255,255,.055);border:1px solid var(--border);font-family:Poppins,sans-serif;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.78);margin-top:8px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:20;display:none;max-width:min(720px,calc(100vw - 28px));padding:12px 16px;border-radius:999px;background:rgba(12,12,13,.94);border:1px solid rgba(255,255,255,.12);box-shadow:0 14px 32px rgba(0,0,0,.30);color:rgba(255,255,255,.88);font-size:13px}.toast.is-visible{display:block}@media(max-width:980px){.brand img{width:150px;height:54px}}
.app{display:none;grid-template-columns:minmax(360px,.75fr) minmax(520px,1.25fr);gap:16px;align-items:start}.app.is-visible{display:grid}.episode-list{display:grid;gap:12px;max-height:calc(100vh - 250px);overflow:auto;padding-right:4px}.episode-card{width:100%;text-align:left;display:grid;grid-template-columns:126px 1fr;gap:12px;padding:10px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--border)}.episode-card.active{background:linear-gradient(180deg,rgba(143,174,157,.20),rgba(143,174,157,.09));border-color:rgba(143,174,157,.25)}.thumb{width:126px;aspect-ratio:16/9;border-radius:14px;background:rgba(255,255,255,.05);object-fit:cover}.card-title{font-family:Poppins,sans-serif;font-weight:800;line-height:1.12;margin:2px 0 6px}.card-sub{color:var(--muted);font-size:13px;line-height:1.3}.quote-list{display:grid;gap:12px;max-height:calc(100vh - 260px);overflow:auto;padding-right:4px}.quote-card{border-radius:22px;border:1px solid var(--border);background:rgba(255,255,255,.035);padding:15px;display:grid;gap:10px}.quote-text{font-size:18px;line-height:1.45;color:rgba(255,255,255,.96)}.quote-meta{color:var(--muted);font-size:13px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.copy-box{width:100%;min-height:88px;resize:vertical;border-radius:16px;border:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.28);color:var(--text);padding:12px;line-height:1.45}.copy-box:not([readonly]){border-color:rgba(143,174,157,.28);background:rgba(143,174,157,.08)}.empty{padding:16px;border-radius:18px;background:rgba(255,255,255,.035);border:1px dashed rgba(255,255,255,.13);color:var(--muted);line-height:1.45}@media(max-width:980px){.app{grid-template-columns:1fr}.episode-list,.quote-list{max-height:none}.episode-card{grid-template-columns:110px 1fr}.thumb{width:110px}}</style></head><body><div class="page"><header class="topbar"><div class="brand"><img src="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1235337/Desktop-White-2-2.png" alt="CGBC"><div><p class="eyebrow">Hidden Review Desk</p><h1>Denied Quotes</h1></div></div><div class="actions"><a class="back-link" href="quote-review.html">Quote Review</a><a class="back-link" href="quote-review-approved.html">Approved Quotes</a><a class="back-link" href="approved-quotes-random.html">Quote Wall</a><button class="btn primary" id="exportCurationBtn" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path><path d="M5 17v4"></path><path d="M19 17v4"></path></svg>Export GitHub JSON</button><a class="back-link" href="index.html">Back to Media</a></div></header><section class="gate" id="gate"><p class="eyebrow">Private review</p><h1>Enter Password</h1><label for="passwordInput">Review password</label><input id="passwordInput" inputmode="numeric" autocomplete="off" type="password" placeholder="Password"><div class="toolbar" style="margin-top:14px"><button class="btn primary" id="unlockBtn" type="button">Open Denied Quotes</button><span class="status" id="gateStatus"></span></div></section><main class="app" id="app"><section class="panel"><header class="panel-head"><p class="eyebrow">Episodes</p><h2 class="panel-title">Quote Episodes</h2></header><div class="body"><div class="toolbar"><select id="episodeSelect"><option value="__all__">All episodes</option></select></div><div class="episode-list" id="episodeList"></div></div></section><section class="panel"><header class="panel-head"><p class="eyebrow">Denied / Rejected</p><h2 class="panel-title" id="quoteListTitle">Denied Quotes</h2></header><div class="body"><div class="toolbar"><button class="btn" id="copyAllBtn" type="button">Copy Visible Quotes</button><span class="status" id="summaryText"></span></div><div class="quote-list" id="quoteList"></div></div></section></main></div><div class="toast" id="toast"></div><script>
const PASSWORD='1813';
const AUTH_KEYS=['cgbcQuoteReviewUnlocked','cgbc_quote_review_unlocked','cgbcQuoteReviewAuth'];
const AUTH_TTL_MS=12*60*60*1000;
const QUOTE_PATHS=['data/quotes/en/quote-bank.json','data/quotes/en/random-quotes.json','data/quotes/random-quotes.json','random-quotes.json'];
const LIBRARY_PATHS=['data/library-resolved.json','library-resolved.json','public/library-resolved.json'];
const CURATION_PATHS=['config/quote-curation.json','quote-curation.json'];
const $=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function fmtDate(v){try{return new Date(String(v||'')+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}catch(_){return v||'';}}
function fmtTime(s){s=Number(s||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;}
function toast(msg){const el=$('toast'); if(!el)return; el.textContent=msg;el.classList.add('is-visible');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('is-visible'),2400);}
function markUnlocked(){const payload=JSON.stringify({ok:true,at:Date.now()});for(const key of AUTH_KEYS){try{localStorage.setItem(key,payload);sessionStorage.setItem(key,payload);}catch(_){}}}
function isUnlocked(){for(const key of AUTH_KEYS){try{const raw=sessionStorage.getItem(key)||localStorage.getItem(key);if(!raw)continue;if(raw==='yes'||raw==='true'||raw==='1813'){markUnlocked();return true;}const data=JSON.parse(raw);if(data?.ok && (Date.now()-Number(data.at||0))<AUTH_TTL_MS){markUnlocked();return true;}}catch(_){}}return false;}
async function fetchFirst(paths){let last=null;for(const path of paths){try{const res=await fetch(path,{cache:'no-store'});if(res.ok)return await res.json();}catch(e){last=e;}}throw last||new Error('Could not load '+paths.join(', '));}
async function loadQuotes(){const json=await fetchFirst(QUOTE_PATHS);return Array.isArray(json?.quotes)?json.quotes:[];}
async function loadLibrary(){try{const json=await fetchFirst(LIBRARY_PATHS);return new Map((json?.items||[]).map(i=>[i.stableId,i]));}catch(_){return new Map();}}
async function loadRepoCuration(){try{const json=await fetchFirst(CURATION_PATHS);return Array.isArray(json?.reviews)?json.reviews:[];}catch(_){return [];}}
function reviewKey(action,q){return `cgbcQuoteReview:${action}:${q?.id||'unknown'}`;}
function readLocalReview(action,q){try{const raw=localStorage.getItem(reviewKey(action,q));return raw?JSON.parse(raw):null;}catch(_){return null;}}
function writeReview(action,q,text){try{clearReview(q);localStorage.setItem(reviewKey(action,q),JSON.stringify({action,quoteId:q?.id||'',approvedText:(text||quoteText(q)||'').trim(),episode:q?.episode||null,media:q?.media||null,siteDeepLink:siteDeepLink(q),source:'browser_review',savedAt:new Date().toISOString()}));}catch(e){console.warn(e);}}
function clearReview(q){for(const action of ['approved','featured','rejected']){try{localStorage.removeItem(reviewKey(action,q));}catch(_){}}}
function repoReview(q){return (window.__repoReviews||new Map()).get(q?.id)||null;}
function effectiveReview(q){return readLocalReview('featured',q)||readLocalReview('approved',q)||readLocalReview('rejected',q)||repoReview(q)||null;}
function effectiveStatus(q){const local=readLocalReview('featured',q)?'featured':readLocalReview('approved',q)?'approved':readLocalReview('rejected',q)?'rejected':null;return local || repoReview(q)?.status || q?.curation?.status || q?.status || 'candidate';}
function quoteText(q){const saved=effectiveReview(q);return saved?.approvedText||q?.approvedText||q?.displayText||q?.expandedText||q?.text||'';}
function epKey(q){return q?.episode?.stableId||q?.episodeStableId||q?.episode?.title||'unknown';}
function epTitle(q){return q?.episode?.title||q?.episode?.episodeName||q?.episodeTitle||'Untitled episode';}
function epSub(q){const ep=q?.episode||{};return [ep.series,ep.subtitle,fmtDate(ep.date)].filter(Boolean).join(' • ');}
function mediaStart(q){return Number(q?.media?.start??q?.start??0)||0;}
function mediaEnd(q){return Number(q?.media?.end??q?.end??0)||0;}
function siteBase(){const path=location.pathname.replace(/[^/]*$/,'');return location.origin+path;}
function siteDeepLink(q){const item=encodeURIComponent(epKey(q));const start=Math.max(0,Math.floor(mediaStart(q)));return `${siteBase()}index.html?mode=video&item=${item}${start?`&start=${start}`:''}`;}
function youtubeLink(q){const id=q?.media?.youtubeId;const url=q?.media?.videoUrl || (id?`https://www.youtube.com/watch?v=${id}`:'');if(!url)return '';const sep=url.includes('?')?'&':'?';return `${url}${sep}t=${Math.floor(mediaStart(q))}s`;}
function artForEpisode(key,library,quotes=[]){const item=library.get(key);const fromQuote=quotes.find(q=>epKey(q)===key);const yt=item?.video?.youtubeId||fromQuote?.media?.youtubeId;return item?.art?.episode?.wide||item?.video?.thumbnail||item?.art?.series?.wide||item?.art?.study?.wide||item?.art?.episode?.square||item?.art?.series?.square||item?.art?.study?.square||(yt?`https://i.ytimg.com/vi/${yt}/maxresdefault.jpg`:'')||'';}
function copyTextFor(q){const ep=q.episode||{};const start=fmtTime(mediaStart(q));const link=siteDeepLink(q);return `${quoteText(q)}\n— ${ep.title||ep.episodeName||''}${start?` (${start})`:''}${ep.date?`, ${fmtDate(ep.date)}`:''}\n${link}`.trim();}
function allReviewEntries(quotes){const entries=[];for(const q of quotes||[]){const status=effectiveStatus(q);if(!['approved','featured','rejected'].includes(status))continue;const saved=effectiveReview(q)||{};entries.push({quoteId:q.id,status,approvedText:saved.approvedText||quoteText(q),episodeStableId:epKey(q),episodeTitle:epTitle(q),start:mediaStart(q),end:mediaEnd(q),siteDeepLink:siteDeepLink(q),youtubeLink:youtubeLink(q),source:saved.source||'browser_review',savedAt:saved.savedAt||new Date().toISOString()});}return entries;}
function exportCurationJson(quotes){const entries=allReviewEntries(quotes);const payload={version:1,generatedAt:new Date().toISOString(),source:'cgbc_quote_review_browser',targetFile:'config/quote-curation.json',note:'Commit this file to config/quote-curation.json, then run the normal sermon library build workflow.',reviews:entries};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='quote-curation.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast(`Exported ${entries.length} review decision${entries.length===1?'':'s'}.`);}
async function bootstrapAuth(openFn){const gate=$('gate'),password=$('passwordInput'),btn=$('unlockBtn'),status=$('gateStatus');async function unlock(){if(String(password.value||'').trim()!==PASSWORD){status.textContent='Wrong password.';return;}markUnlocked();status.textContent='Loading…';await openFn();}if(btn)btn.addEventListener('click',unlock);if(password)password.addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});if(isUnlocked()){if(status)status.textContent='Loading…';await openFn();}}
function buildRepoReviewMap(rows){const map=new Map();for(const r of rows||[]){if(r?.quoteId)map.set(r.quoteId,r);}return map;}

const PAGE_MODE='denied';
const PAGE_LABEL='denied';
const state={quotes:[],library:new Map(),episodeKey:'__all__'};
const els={gate:$('gate'),app:$('app'),passwordInput:$('passwordInput'),unlockBtn:$('unlockBtn'),gateStatus:$('gateStatus'),episodeSelect:$('episodeSelect'),episodeList:$('episodeList'),quoteList:$('quoteList'),quoteListTitle:$('quoteListTitle'),copyAllBtn:$('copyAllBtn'),summaryText:$('summaryText'),exportCurationBtn:$('exportCurationBtn')};
function pageQuotes(){return state.quotes.filter(q=>{const st=effectiveStatus(q);return PAGE_MODE==='approved'?['approved','featured'].includes(st):st==='rejected';});}
function groupedEpisodes(){const map=new Map();for(const q of state.quotes){const key=epKey(q);if(!map.has(key))map.set(key,{key,title:epTitle(q),sub:epSub(q),total:0,count:0});const g=map.get(key);g.total++;if(pageQuotes().includes(q))g.count++;}return Array.from(map.values()).filter(g=>g.count>0).sort((a,b)=>a.title.localeCompare(b.title,undefined,{numeric:true,sensitivity:'base'}));}
function visibleQuotes(){return pageQuotes().filter(q=>state.episodeKey==='__all__'||epKey(q)===state.episodeKey);}
function buildEpisodeSelect(){const groups=groupedEpisodes();const total=pageQuotes().length;els.episodeSelect.innerHTML=[`<option value="__all__">All episodes — ${total} ${PAGE_LABEL}</option>`,...groups.map(g=>`<option value="${esc(g.key)}">${esc(g.title)} — ${g.count}/${g.total}</option>`)].join('');els.episodeSelect.value=state.episodeKey;}
function renderEpisodes(){const groups=groupedEpisodes();if(!groups.length){els.episodeList.innerHTML=`<div class="empty">No ${PAGE_LABEL} quotes found yet.</div>`;return;}els.episodeList.innerHTML=groups.map(g=>{const art=artForEpisode(g.key,state.library,state.quotes);return `<button class="episode-card ${state.episodeKey===g.key?'active':''}" type="button" data-key="${esc(g.key)}">${art?`<img class="thumb" src="${esc(art)}" alt="">`:`<div class="thumb"></div>`}<div><div class="card-title">${esc(g.title)}</div><div class="card-sub">${esc(g.sub)}</div><span class="pill">${g.count}/${g.total} ${PAGE_LABEL}</span></div></button>`;}).join('');els.episodeList.querySelectorAll('[data-key]').forEach(btn=>btn.addEventListener('click',()=>{state.episodeKey=btn.dataset.key;els.episodeSelect.value=state.episodeKey;render();}));}
function saveEdit(q,text){const action=PAGE_MODE==='approved'?(effectiveStatus(q)==='featured'?'featured':'approved'):'rejected';writeReview(action,q,text);toast('Edit saved.');render();}
function moveQuote(q,action,text){writeReview(action,q,text);toast(action==='featured'?'Moved to featured.':action==='approved'?'Moved to approved.':'Moved to denied.');render();}
function renderQuotes(){const list=visibleQuotes();const groups=groupedEpisodes();const active=groups.find(g=>g.key===state.episodeKey);els.quoteListTitle.textContent=state.episodeKey==='__all__'?'Denied Quotes':active?.title||'Denied Quotes';els.summaryText.textContent=`${list.length} visible quote${list.length===1?'':'s'}.`;if(!list.length){els.quoteList.innerHTML='<div class="empty">No quotes for this selection.</div>';return;}els.quoteList.innerHTML=list.map(q=>{const ep=q.episode||{};const status=effectiveStatus(q);const start=fmtTime(mediaStart(q));const site=siteDeepLink(q);const yt=youtubeLink(q);const copy=copyTextFor(q);const deniedControls=PAGE_MODE==='denied'?`<button class="btn primary" type="button" data-approve="${esc(q.id)}">Approve</button><button class="btn primary" type="button" data-feature="${esc(q.id)}">Feature</button>`:`<button class="btn danger" type="button" data-reject="${esc(q.id)}">Move to Denied</button>`;return `<article class="quote-card"><div class="quote-text">${esc(quoteText(q))}</div><div class="quote-meta"><span class="pill">${esc(status)}</span><span>${esc(ep.title||ep.episodeName||'')}</span>${start?`<span>• ${esc(start)}</span>`:''}${ep.date?`<span>• ${esc(fmtDate(ep.date))}</span>`:''}${site?`<a class="pill" href="${esc(site)}" target="_blank" rel="noopener">Open Site</a>`:''}${yt?`<a class="pill" href="${esc(yt)}" target="_blank" rel="noopener">Open Video</a>`:''}</div><textarea class="copy-box" data-edit-text="${esc(q.id)}">${esc(copy)}</textarea><div class="actions"><button class="btn" type="button" data-copy="${esc(q.id)}">Copy Quote</button><button class="btn" type="button" data-save-edit="${esc(q.id)}">Save Edit</button>${deniedControls}</div></article>`;}).join('');els.quoteList.querySelectorAll('[data-copy]').forEach(btn=>btn.addEventListener('click',async()=>{const q=list.find(item=>item.id===btn.dataset.copy);if(!q)return;const box=els.quoteList.querySelector(`[data-edit-text="${CSS.escape(btn.dataset.copy)}"]`);await navigator.clipboard.writeText(box?.value||copyTextFor(q));toast('Copied quote.');}));els.quoteList.querySelectorAll('[data-save-edit]').forEach(btn=>btn.addEventListener('click',()=>{const q=list.find(item=>item.id===btn.dataset.saveEdit);const box=els.quoteList.querySelector(`[data-edit-text="${CSS.escape(btn.dataset.saveEdit)}"]`);if(q&&box)saveEdit(q,box.value);}));els.quoteList.querySelectorAll('[data-approve]').forEach(btn=>btn.addEventListener('click',()=>{const q=list.find(item=>item.id===btn.dataset.approve);const box=els.quoteList.querySelector(`[data-edit-text="${CSS.escape(btn.dataset.approve)}"]`);if(q&&box)moveQuote(q,'approved',box.value);}));els.quoteList.querySelectorAll('[data-feature]').forEach(btn=>btn.addEventListener('click',()=>{const q=list.find(item=>item.id===btn.dataset.feature);const box=els.quoteList.querySelector(`[data-edit-text="${CSS.escape(btn.dataset.feature)}"]`);if(q&&box)moveQuote(q,'featured',box.value);}));els.quoteList.querySelectorAll('[data-reject]').forEach(btn=>btn.addEventListener('click',()=>{const q=list.find(item=>item.id===btn.dataset.reject);const box=els.quoteList.querySelector(`[data-edit-text="${CSS.escape(btn.dataset.reject)}"]`);if(q&&box)moveQuote(q,'rejected',box.value);}));}
function render(){buildEpisodeSelect();renderEpisodes();renderQuotes();}
async function openApp(){const [quotes,library,repo]=await Promise.all([loadQuotes(),loadLibrary(),loadRepoCuration()]);state.quotes=quotes;state.library=library;window.__repoReviews=buildRepoReviewMap(repo);els.gate.style.display='none';els.app.classList.add('is-visible');render();}
els.episodeSelect.addEventListener('change',()=>{state.episodeKey=els.episodeSelect.value;render();});els.copyAllBtn.addEventListener('click',async()=>{await navigator.clipboard.writeText(visibleQuotes().map(copyTextFor).join('\n\n'));toast('Copied visible quotes.');});els.exportCurationBtn.addEventListener('click',()=>exportCurationJson(state.quotes));bootstrapAuth(openApp);
</script></body></html>
