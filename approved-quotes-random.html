<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>CGBC Approved Quotes</title><link rel="icon" type="image/jpeg" href="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1228713/GCBC_ORIGWHT.png"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{--bg:#0f0f10;--text:#f4f4f4;--muted:rgba(255,255,255,.68);--muted2:rgba(255,255,255,.48);--accent:#8fae9d;--border:rgba(255,255,255,.09);--desktop-bg:url('https://tithely-media-prod.s3.us-west-1.wasabisys.com/1230673/Desktop.jpg')}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,sans-serif}body{background:linear-gradient(180deg,rgba(8,8,9,.78),rgba(8,8,9,.92)),var(--desktop-bg) center/cover no-repeat fixed;background-blend-mode:multiply}button,input,textarea,select{font:inherit}button{border:none;background:none;color:inherit;cursor:pointer}a{color:inherit;text-decoration:none}.page{width:min(1680px,100%);margin:0 auto;padding:16px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 14px 18px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:16px;min-width:0}.brand img{width:240px;max-width:35vw;height:72px;object-fit:contain;object-position:left center;filter:drop-shadow(0 5px 14px rgba(0,0,0,.18))}.eyebrow{margin:0 0 5px;font-family:Poppins,sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2)}h1{margin:0;font-family:Poppins,sans-serif;font-size:clamp(30px,3.2vw,54px);line-height:.98;letter-spacing:-.03em}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn,.back-link{min-height:44px;display:inline-flex;align-items:center;justify-content:center;padding:0 15px;border-radius:16px;background:rgba(255,255,255,.055);border:1px solid var(--border);font-family:Poppins,sans-serif;font-weight:700}.btn.primary{background:linear-gradient(180deg,rgba(143,174,157,.24),rgba(143,174,157,.12));border-color:rgba(143,174,157,.28)}.btn.danger{background:rgba(255,90,90,.08);border-color:rgba(255,90,90,.22)}.btn svg{width:18px;height:18px;margin-right:8px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.gate{width:min(640px,calc(100vw - 32px));margin:10vh auto 0;padding:26px;border-radius:28px;background:linear-gradient(180deg,rgba(18,18,19,.92),rgba(10,10,11,.88));border:1px solid var(--border);box-shadow:0 28px 80px rgba(0,0,0,.44),inset 0 1px 0 rgba(255,255,255,.06)}.gate label{display:block;margin:20px 0 8px;font-family:Poppins,sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2)}.gate input{width:100%;height:56px;border-radius:18px;border:1px solid var(--border);background:rgba(0,0,0,.28);color:var(--text);padding:0 16px;outline:none;font-size:18px}.status{color:var(--muted);font-size:14px;line-height:1.45}.panel{border-radius:28px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(18,18,19,.88),rgba(10,10,11,.80));box-shadow:0 18px 60px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.055);overflow:hidden;backdrop-filter:blur(16px) saturate(1.04)}.panel-head{padding:20px 22px 14px;border-bottom:1px solid rgba(255,255,255,.07)}.panel-title{margin:0;font-family:Poppins,sans-serif;font-size:22px;line-height:1.05}.body{padding:18px;display:grid;gap:14px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar select{height:44px;min-width:240px;border-radius:15px;border:1px solid var(--border);background:rgba(0,0,0,.28);color:var(--text);padding:0 12px;outline:none}.pill{display:inline-flex;align-items:center;min-height:26px;padding:0 9px;border-radius:999px;background:rgba(255,255,255,.055);border:1px solid var(--border);font-family:Poppins,sans-serif;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.78);margin-top:8px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:20;display:none;max-width:min(720px,calc(100vw - 28px));padding:12px 16px;border-radius:999px;background:rgba(12,12,13,.94);border:1px solid rgba(255,255,255,.12);box-shadow:0 14px 32px rgba(0,0,0,.30);color:rgba(255,255,255,.88);font-size:13px}.toast.is-visible{display:block}@media(max-width:980px){.brand img{width:150px;height:54px}}
body{min-height:100vh;display:flex;align-items:center;justify-content:center}.quote-wall{width:min(980px,calc(100vw - 28px));padding:28px;border-radius:32px;background:linear-gradient(180deg,rgba(18,18,19,.90),rgba(10,10,11,.82));border:1px solid var(--border);box-shadow:0 28px 90px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.06);display:grid;gap:18px}.quote-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}.quote-brand{display:flex;align-items:center;gap:14px}.quote-brand img{width:150px;height:48px;object-fit:contain;object-position:left center}.quote-text{font-family:Poppins,sans-serif;font-size:clamp(30px,5vw,62px);font-weight:800;line-height:1.16;letter-spacing:-.03em;text-align:center;padding:16px 4px}.meta{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;color:var(--muted);font-size:14px}.tools{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.fade{animation:fadeIn .5s ease both}@keyframes fadeIn{from{opacity:.2;transform:translateY(6px)}to{opacity:1;transform:none}}@media(max-width:760px){body{align-items:flex-start}.quote-wall{margin:14px 0}.quote-text{text-align:left}}</style></head><body><main class="quote-wall"><div class="quote-head"><div class="quote-brand"><img src="https://tithely-media-prod.s3.us-west-1.wasabisys.com/1235337/Desktop-White-2-2.png" alt="CGBC"></div><div class="actions"><a class="back-link" href="index.html">Media</a></div></div><div id="quoteBox" class="fade"><div class="quote-text" id="quoteText">Loading approved quotes…</div><div class="meta" id="quoteMeta"></div></div><div class="tools"><button class="btn primary" id="nextBtn" type="button">Next Quote</button><button class="btn" id="copyBtn" type="button">Copy Quote</button><a class="btn" id="openLink" target="_blank" rel="noopener">Open Media</a></div><p class="status" id="statusText" style="text-align:center"></p></main><div class="toast" id="toast"></div><script>
const PASSWORD='1813';
const AUTH_KEYS=['cgbcQuoteReviewUnlocked','cgbc_quote_review_unlocked','cgbcQuoteReviewAuth'];
const AUTH_TTL_MS=12*60*60*1000;
const QUOTE_PATHS=['data/quotes/en/quote-bank.json','data/quotes/en/random-quotes.json','data/quotes/random-quotes.json','random-quotes.json'];
const LIBRARY_PATHS=['data/library-resolved.json','library-resolved.json','public/library-resolved.json'];
const CURATION_PATHS=['config/quote-curation.json','quote-curation.json'];
const $=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function fmtDate(v){try{return new Date(String(v||'')+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}catch(_){return v||'';}}
function fmtTime(s){s=Number(s||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;}
function toast(msg){const el=$('toast'); if(!el)return; el.textContent=msg;el.classList.add('is-visible');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('is-visible'),2400);}
function markUnlocked(){const payload=JSON.stringify({ok:true,at:Date.now()});for(const key of AUTH_KEYS){try{localStorage.setItem(key,payload);sessionStorage.setItem(key,payload);}catch(_){}}}
function isUnlocked(){for(const key of AUTH_KEYS){try{const raw=sessionStorage.getItem(key)||localStorage.getItem(key);if(!raw)continue;if(raw==='yes'||raw==='true'||raw==='1813'){markUnlocked();return true;}const data=JSON.parse(raw);if(data?.ok && (Date.now()-Number(data.at||0))<AUTH_TTL_MS){markUnlocked();return true;}}catch(_){}}return false;}
async function fetchFirst(paths){let last=null;for(const path of paths){try{const res=await fetch(path,{cache:'no-store'});if(res.ok)return await res.json();}catch(e){last=e;}}throw last||new Error('Could not load '+paths.join(', '));}
async function loadQuotes(){const json=await fetchFirst(QUOTE_PATHS);return Array.isArray(json?.quotes)?json.quotes:[];}
async function loadLibrary(){try{const json=await fetchFirst(LIBRARY_PATHS);return new Map((json?.items||[]).map(i=>[i.stableId,i]));}catch(_){return new Map();}}
async function loadRepoCuration(){try{const json=await fetchFirst(CURATION_PATHS);return Array.isArray(json?.reviews)?json.reviews:[];}catch(_){return [];}}
function reviewKey(action,q){return `cgbcQuoteReview:${action}:${q?.id||'unknown'}`;}
function readLocalReview(action,q){try{const raw=localStorage.getItem(reviewKey(action,q));return raw?JSON.parse(raw):null;}catch(_){return null;}}
function writeReview(action,q,text){try{clearReview(q);localStorage.setItem(reviewKey(action,q),JSON.stringify({action,quoteId:q?.id||'',approvedText:cleanQuoteOnly(text||quoteText(q)||'',q),episode:q?.episode||null,media:q?.media||null,siteDeepLink:siteDeepLink(q),source:'browser_review',savedAt:new Date().toISOString()}));}catch(e){console.warn(e);}}
function clearReview(q){for(const action of ['approved','featured','rejected']){try{localStorage.removeItem(reviewKey(action,q));}catch(_){}}}
function repoReview(q){return (window.__repoReviews||new Map()).get(q?.id)||null;}
function effectiveReview(q){return readLocalReview('featured',q)||readLocalReview('approved',q)||readLocalReview('rejected',q)||repoReview(q)||null;}
function effectiveStatus(q){const local=readLocalReview('featured',q)?'featured':readLocalReview('approved',q)?'approved':readLocalReview('rejected',q)?'rejected':null;return local || repoReview(q)?.status || q?.curation?.status || q?.status || 'candidate';}
function cleanQuoteOnly(value,q){let text=String(value||'').replace(/\r\n/g,'\n').trim();if(!text)return '';text=text.split(/https?:\/\/\S+/i)[0].trim();const ep=q?.episode||{};const escapeRx=v=>String(v).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');for(const title of [ep.title,ep.episodeName,q?.episodeTitle].filter(Boolean).map(escapeRx)){text=text.replace(new RegExp('\\s+—\\s+'+title+'.*$','is'),'').trim();}text=text.replace(/\n\s*—\s+.*$/s,'').trim();return text;}function quoteText(q){if(q?.__overrideText)return cleanQuoteOnly(q.__overrideText,q);const saved=effectiveReview(q);return cleanQuoteOnly(saved?.approvedText||q?.approvedText||q?.displayText||q?.expandedText||q?.text||'',q);}
function epKey(q){return q?.episode?.stableId||q?.episodeStableId||q?.episode?.title||'unknown';}
function epTitle(q){return q?.episode?.title||q?.episode?.episodeName||q?.episodeTitle||'Untitled episode';}
function epSub(q){const ep=q?.episode||{};return [ep.series,ep.subtitle,fmtDate(ep.date)].filter(Boolean).join(' • ');}
function mediaStart(q){return Number(q?.media?.start??q?.start??0)||0;}
function mediaEnd(q){return Number(q?.media?.end??q?.end??0)||0;}
function siteBase(){const path=location.pathname.replace(/[^/]*$/,'');return location.origin+path;}
function siteDeepLink(q){const item=encodeURIComponent(epKey(q));const start=Math.max(0,Math.floor(mediaStart(q)));return `${siteBase()}index.html?mode=video&item=${item}${start?`&start=${start}`:''}`;}
function youtubeLink(q){const id=q?.media?.youtubeId;const url=q?.media?.videoUrl || (id?`https://www.youtube.com/watch?v=${id}`:'');if(!url)return '';const sep=url.includes('?')?'&':'?';return `${url}${sep}t=${Math.floor(mediaStart(q))}s`;}
function artForEpisode(key,library,quotes=[]){const item=library.get(key);const fromQuote=quotes.find(q=>epKey(q)===key);const yt=item?.video?.youtubeId||fromQuote?.media?.youtubeId;return item?.art?.episode?.wide||item?.video?.thumbnail||item?.art?.series?.wide||item?.art?.study?.wide||item?.art?.episode?.square||item?.art?.series?.square||item?.art?.study?.square||(yt?`https://i.ytimg.com/vi/${yt}/maxresdefault.jpg`:'')||'';}
function copyTextFor(q){const ep=q.episode||{};const start=fmtTime(mediaStart(q));const link=siteDeepLink(q);return `${quoteText(q)}\n— ${ep.title||ep.episodeName||''}${start?` (${start})`:''}${ep.date?`, ${fmtDate(ep.date)}`:''}\n${link}`.trim();}
function allReviewEntries(quotes){const entries=[];for(const q of quotes||[]){const status=effectiveStatus(q);if(!['approved','featured','rejected'].includes(status))continue;const saved=effectiveReview(q)||{};entries.push({quoteId:q.id,status,approvedText:cleanQuoteOnly(saved.approvedText||quoteText(q),q),episodeStableId:epKey(q),episodeTitle:epTitle(q),start:mediaStart(q),end:mediaEnd(q),siteDeepLink:siteDeepLink(q),youtubeLink:youtubeLink(q),source:saved.source||'browser_review',savedAt:saved.savedAt||new Date().toISOString()});}return entries;}
function exportCurationJson(quotes){const entries=allReviewEntries(quotes);const payload={version:1,generatedAt:new Date().toISOString(),source:'cgbc_quote_review_browser',targetFile:'config/quote-curation.json',note:'Commit this file to config/quote-curation.json, then run the normal sermon library build workflow.',reviews:entries};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='quote-curation.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast(`Exported ${entries.length} review decision${entries.length===1?'':'s'}.`);}
async function bootstrapAuth(openFn){const gate=$('gate'),password=$('passwordInput'),btn=$('unlockBtn'),status=$('gateStatus');async function unlock(){if(String(password.value||'').trim()!==PASSWORD){status.textContent='Wrong password.';return;}markUnlocked();status.textContent='Loading…';await openFn();}if(btn)btn.addEventListener('click',unlock);if(password)password.addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});if(isUnlocked()){if(status)status.textContent='Loading…';await openFn();}}
function buildRepoReviewMap(rows){const map=new Map();for(const r of rows||[]){if(r?.quoteId)map.set(r.quoteId,r);}return map;}

let quotes=[],idx=0;
function approved(q){const st=effectiveStatus(q);return ['approved','featured'].includes(st);}
function chooseNext(){if(!quotes.length)return;idx=(idx+1)%quotes.length;renderQuote();}
function renderQuote(){const q=quotes[idx];const box=$('quoteBox');box.classList.remove('fade');void box.offsetWidth;box.classList.add('fade');$('quoteText').textContent=quoteText(q);const ep=q.episode||{};$('quoteMeta').innerHTML=[ep.speaker?`<span>${esc(ep.speaker)}</span>`:'',ep.title?`<span>${esc(ep.title)}</span>`:'',ep.date?`<span>${esc(fmtDate(ep.date))}</span>`:'',`<span>${esc(fmtTime(mediaStart(q)))}</span>`].filter(Boolean).join(' ');$('openLink').href=siteDeepLink(q);$('statusText').textContent=`${idx+1} of ${quotes.length}`;}
async function start(){const [all,repo]=await Promise.all([loadQuotes(),loadRepoCuration()]);window.__repoReviews=buildRepoReviewMap(repo);quotes=all.filter(approved);if(!quotes.length){$('quoteText').textContent='No approved quotes are published yet.';$('statusText').textContent='Export and commit config/quote-curation.json after approving quotes.';return;}idx=Math.floor(Math.random()*quotes.length);renderQuote();setInterval(()=>{idx=Math.floor(Math.random()*quotes.length);renderQuote();},12000);}
$('nextBtn').addEventListener('click',()=>{idx=Math.floor(Math.random()*quotes.length);renderQuote();});$('copyBtn').addEventListener('click',async()=>{if(!quotes.length)return;await navigator.clipboard.writeText(copyTextFor(quotes[idx]));toast('Copied quote.');});start();
</script></body></html>
