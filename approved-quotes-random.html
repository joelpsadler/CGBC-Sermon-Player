const AUTH_KEYS=['cgbcQuoteReviewUnlocked','cgbc_quote_review_unlocked','cgbcQuoteReviewAuth'];
const AUTH_TTL_MS=12*60*60*1000;
const QUOTE_PATHS=['data/quotes/en/quote-bank.json','data/quotes/en/random-quotes.json','data/quotes/random-quotes.json','random-quotes.json'];
const LIBRARY_PATHS=['data/library-resolved.json','library-resolved.json','public/library-resolved.json'];
const CURATION_PATHS=['config/quote-curation.json','quote-curation.json'];
const $=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function fmtDate(v){try{return new Date(String(v||'')+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}catch(_){return v||'';}}
function fmtTime(s){s=Number(s||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;}
function toast(msg){const el=$('toast'); if(!el)return; el.textContent=msg;el.classList.add('is-visible');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('is-visible'),2400);}
function markUnlocked(){const payload=JSON.stringify({ok:true,at:Date.now()});for(const key of AUTH_KEYS){try{localStorage.setItem(key,payload);sessionStorage.setItem(key,payload);}catch(_){}}}
function isUnlocked(){for(const key of AUTH_KEYS){try{const raw=sessionStorage.getItem(key)||localStorage.getItem(key);if(!raw)continue;if(raw==='yes'||raw==='true'||raw==='1813'){markUnlocked();return true;}const data=JSON.parse(raw);if(data?.ok && (Date.now()-Number(data.at||0))<AUTH_TTL_MS){markUnlocked();return true;}}catch(_){}}return false;}
async function fetchFirst(paths){let last=null;for(const path of paths){try{const res=await fetch(path,{cache:'no-store'});if(res.ok)return await res.json();}catch(e){last=e;}}throw last||new Error('Could not load '+paths.join(', '));}
async function loadQuotes(){const json=await fetchFirst(QUOTE_PATHS);return Array.isArray(json?.quotes)?json.quotes:[];}
async function loadLibrary(){try{const json=await fetchFirst(LIBRARY_PATHS);return new Map((json?.items||[]).map(i=>[i.stableId,i]));}catch(_){return new Map();}}

function reviewKey(action,q){return `cgbcQuoteReview:${action}:${q?.id||'unknown'}`;}
function readLocalReview(action,q){try{const raw=localStorage.getItem(reviewKey(action,q));return raw?JSON.parse(raw):null;}catch(_){return null;}}
function writeReview(action,q,text){try{clearReview(q);localStorage.setItem(reviewKey(action,q),JSON.stringify({action,quoteId:q?.id||'',approvedText:cleanQuoteOnly(text||quoteText(q)||'',q),episode:q?.episode||null,media:q?.media||null,siteDeepLink:siteDeepLink(q),source:'browser_review',savedAt:new Date().toISOString()}));}catch(e){console.warn(e);}}
function clearReview(q){for(const action of ['approved','featured','rejected']){try{localStorage.removeItem(reviewKey(action,q));}catch(_){}}}
function repoReview(q){return (window.__repoReviews||new Map()).get(q?.id)||null;}

/* QUOTE WALL SIMILARITY SPACING

const WALL_SIMILARITY_THRESHOLD = 0.86;
const WALL_RECENT_WINDOW = 8;
let recentWallQuotes = [];

function wallNormalizeQuoteText(text){
  return String(text||'')
    .toLowerCase()
    .replace(/[“”"']/g,'')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\b(the|a|an|and|or|but|so|to|of|in|on|for|with|that|this|is|are|was|were|be|been|being|we|you|they|it|he|she|i)\b/g,' ')

function wallQuoteTokens(text){
  const norm = wallNormalizeQuoteText(text);
  if(!norm) return [];
  const words = norm.split(/\s+/).filter(w=>w.length>2);
  if(words.length < 4) return words;
  const grams = [];
  for(let i=0;i<words.length-2;i++) grams.push(words.slice(i,i+3).join(' '));
  return grams.length ? grams : words;
}
function wallQuoteSimilarity(a,b){
  const A = new Set(wallQuoteTokens(a));
  const B = new Set(wallQuoteTokens(b));
  if(!A.size || !B.size) return 0;
  let hit = 0;
  for(const item of A){ if(B.has(item)) hit++; }

<script id="mobile-layout-stability">

(function(){

function stabilizeMobileQuoteSizing(){

  if(window.innerWidth > 760) return;

  const qt = document.getElementById('quoteText');
  if(!qt) return;

  const text = (qt.textContent || '').trim();
  const chars = text.length;

  let size =
    chars > 420 ? 2.7 :
    chars > 360 ? 3.0 :
    chars > 320 ? 3.25 :
    chars > 280 ? 3.55 :
    chars > 240 ? 3.9 :
    chars > 200 ? 4.25 :
    chars > 170 ? 4.7 :
    5.2;

  qt.style.fontSize = size + 'vw';

  requestAnimationFrame(() => {

    const maxHeight = window.innerHeight * 0.52;

    if(qt.scrollHeight > maxHeight){

      let current = size;

      while(qt.scrollHeight > maxHeight && current > 2.3){
        current -= 0.08;
        qt.style.fontSize = current + 'vw';
      }

    }

  });

}

const originalRenderQuoteStable = renderQuote;

renderQuote = function(){
  originalRenderQuoteStable();

  requestAnimationFrame(() => {
    stabilizeMobileQuoteSizing();
  });
};

window.addEventListener('resize', stabilizeMobileQuoteSizing);

})();
</script>
