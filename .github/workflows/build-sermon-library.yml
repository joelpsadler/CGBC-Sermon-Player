name: Build Sermon Library

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-sermon-library
  cancel-in-progress: false

jobs:
  build-library:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      PODBEAN_CLIENT_ID: ${{ secrets.PODBEAN_CLIENT_ID }}
      PODBEAN_CLIENT_SECRET: ${{ secrets.PODBEAN_CLIENT_SECRET }}
      AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
      AZURE_TRANSLATOR_ENDPOINT: ${{ secrets.AZURE_TRANSLATOR_ENDPOINT }}
      AZURE_TRANSLATOR_REGION: ${{ secrets.AZURE_TRANSLATOR_REGION }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Seed Podbean baseline
        shell: bash
        run: |
          node scripts/seed-podbean-baseline.js

      - name: Sync Podbean stats metadata
        shell: bash
        run: |
          node scripts/podbean-stats-sync.js

      - name: Mirror canonical stats file
        shell: bash
        run: |
          mkdir -p data public stats
          cp stats/stats.json data/stats.json
          cp stats/stats.json public/stats.json

      - name: Build resolved library
        shell: bash
        run: |
          npm run build:library

      - name: Reconcile stale renamed transcript files
        shell: bash
        run: |
          python scripts/reconcile_transcripts_from_manifest.py --apply --translated

      - name: Translate current display transcripts
        shell: bash
        env:
          FORCE_TRANSLATE: "false"
          SOURCE_PATH: ""
        run: |
          python scripts/translate_srt_azure.py \
            --targets es fr de nl pt \
            --source-lang en \
            --max-run-characters 750000

      - name: Commit generated files if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/raw-rss.json \
            data/raw-youtube-data.json \
            data/library-resolved.json \
            data/stats.json \
            data/transcripts \
            data/quotes \
            public/library-resolved.json \
            public/search-index.json \
            public/stats.json \
            stats/stats.json \
            stats/downloads_stats.csv \
            transcripts_clean \
            transcripts_display || true

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Refresh sermon library"
          git push
