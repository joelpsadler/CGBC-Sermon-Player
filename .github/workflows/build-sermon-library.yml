name: Build Sermon Library

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13,23 * * *"

jobs:
  build-library:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Seed stats.json if present
        run: |
          mkdir -p data
          if [ -f "stats/stats.json" ]; then
            cp stats/stats.json data/stats.json
          elif [ -f "stats.json" ]; then
            cp stats.json data/stats.json
          fi

      - name: Build resolved library
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          node scripts/fetch-rss.js
          node scripts/podbean-stats-sync.js
          node scripts/fetch-youtube-data.js
          node scripts/resolve-library.js
          node scripts/publish-library.js

      - name: Commit generated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json public/*.json
          git diff --cached --quiet || git commit -m "Update resolved sermon library"
          git push
