name: Sync Podbean Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * *"

permissions:
  contents: write

jobs:
  sync-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Podbean stats sync
        env:
          PODBEAN_CLIENT_ID: ${{ secrets.PODBEAN_CLIENT_ID }}
          PODBEAN_CLIENT_SECRET: ${{ secrets.PODBEAN_CLIENT_SECRET }}
          PODBEAN_STATS_DAYS: "3650"
          PODBEAN_LIMIT: "100"
        run: node scripts/podbean-stats-sync.js

      - name: Commit updated stats.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/stats.json
          git diff --staged --quiet || git commit -m "Update Podbean stats"
          git push
