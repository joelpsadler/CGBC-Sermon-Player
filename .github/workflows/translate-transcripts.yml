name: Translate transcripts with Azure

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Re-translate files even if translated SRT already exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      source_path:
        description: "Optional single English transcript file to translate"
        required: false
        default: ""
  push:
    paths:
      - "transcripts_display/en/**.srt"
      - "transcripts_display/en/**.json"
      - "transcripts_clean/en/**.srt"
      - "transcripts_clean/en/**.json"
      - "scripts/translate_srt_azure.py"
      - ".github/workflows/translate-transcripts.yml"

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Translate English transcripts
        env:
          AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
          AZURE_TRANSLATOR_ENDPOINT: ${{ secrets.AZURE_TRANSLATOR_ENDPOINT }}
          AZURE_TRANSLATOR_REGION: ${{ secrets.AZURE_TRANSLATOR_REGION }}
          FORCE_TRANSLATE: ${{ github.event.inputs.force || 'false' }}
          SOURCE_PATH: ${{ github.event.inputs.source_path || '' }}
        run: |
          python scripts/translate_srt_azure.py \
            --targets es fr de nl pt \
            --source-lang en \
            --max-run-characters 550000

      - name: Commit translated subtitles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add transcripts_display/es transcripts_display/fr transcripts_display/de transcripts_display/nl transcripts_display/pt || true
          git add transcripts_clean/es transcripts_clean/fr transcripts_clean/de transcripts_clean/nl transcripts_clean/pt || true
          if git diff --cached --quiet; then
            echo "No translated subtitle changes to commit."
          else
            git commit -m "Add translated sermon subtitles"
            git push
          fi
