name: Seed Podbean Baseline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seed-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Seed baseline from CSV + public pages
        env:
          PODBEAN_BASELINE_DELAY_MS: "700"
        run: node scripts/seed-podbean-baseline.js

      - name: Commit updated stats.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/stats.json
          git diff --staged --quiet || git commit -m "Seed Podbean baseline plays"
          git pull --rebase origin main
          git push origin main
