name: Save Quote Curation

on:
  workflow_dispatch:
    inputs:
      curation_json:
        description: 'Full quote-curation.json payload'
        required: true
        type: string

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and save quote curation
        shell: bash
        run: |
          mkdir -p config
          cat > /tmp/quote-curation-input.json <<'JSON'
          ${{ inputs.curation_json }}
          JSON
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/quote-curation-input.json','utf8')); if(!Array.isArray(data.reviews)) throw new Error('reviews must be an array'); fs.writeFileSync('config/quote-curation.json', JSON.stringify(data,null,2)+'\n');"
      - name: Commit curation file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/quote-curation.json
          if git diff --cached --quiet; then
            echo "No quote curation changes to commit."
          else
            git commit -m "Update quote curation"
            git push
          fi
