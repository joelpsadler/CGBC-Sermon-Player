name: Save Quote Curation

on:
  workflow_dispatch:
    inputs:
      curation_json:
        description: 'Full JSON contents for config/quote-curation.json'
        required: true
        type: string

permissions:
  contents: write

jobs:
  save-curation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Write curation file
        run: |
          mkdir -p config
          cat > config/quote-curation.json <<'JSON'
          ${{ inputs.curation_json }}
          JSON
          node -e "JSON.parse(require('fs').readFileSync('config/quote-curation.json','utf8')); console.log('quote-curation.json is valid JSON')"

      - name: Commit curation file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/quote-curation.json
          git diff --cached --quiet && echo "No curation changes to commit" || git commit -m "Update quote curation"
          git push
